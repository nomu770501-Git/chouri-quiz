<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="調理師試験">
<meta name="theme-color" content="#1a2744">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>調理師試験 練習問題（完成版・全600問）</title>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1a2744; --navy-light:#253461;
  --gold:#c8973a; --gold-light:#e8b85a;
  --cream:#fdf8f0; --cream-dark:#f5eddc;
  --red:#c0392b; --green:#1a7a4a; --teal:#1a6a7a;
  --warn:#e67e22;
  --text:#2c2c2c; --text-light:#666;
  --border:#ddd0b8;
  --shadow:0 4px 24px rgba(26,39,68,0.12);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ヘッダー */
header{
  background:var(--navy);padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
  position:sticky;top:0;z-index:100;flex-wrap:wrap;
}
.logo{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--gold);line-height:1.2;}
.subtitle{font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px;letter-spacing:.05em;}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbtn{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);
  color:white;border-radius:18px;padding:4px 10px;
  font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;
}
.hbtn:hover{background:rgba(255,255,255,0.2);}
.hbtn.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700;}
.hctrl{
  display:flex;align-items:center;gap:4px;
}
.hctrl label{font-size:10px;color:rgba(255,255,255,0.6);white-space:nowrap;}
.voice-select,.rate-select{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);
  color:white;border-radius:6px;padding:3px 6px;font-size:11px;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;
}
.voice-select{max-width:130px;}
.voice-select option,.rate-select option{background:#1a2744;}

/* ナビタブ */
.nav-tabs{
  background:white;border-bottom:2px solid var(--border);
  display:flex;
}
.nav-tab{
  flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;
  cursor:pointer;border:none;background:none;color:var(--text-light);
  transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px;
  font-family:'Noto Sans JP',sans-serif;
}
.nav-tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700;}
.nav-tab:hover{color:var(--navy);}

.container{max-width:820px;margin:0 auto;padding:20px 14px 60px;}
.screen{display:none;}
.screen.active{display:block;}

/* ===== 科目選択 ===== */
.page-title{
  font-family:'Noto Serif JP',serif;font-size:21px;font-weight:700;
  color:var(--navy);margin-bottom:6px;margin-top:4px;
}
.page-desc{color:var(--text-light);font-size:12px;margin-bottom:20px;line-height:1.7;}

.legend-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;font-size:11px;color:var(--text-light);}
.legend-item{display:flex;align-items:center;gap:5px;}

/* モード選択 */
.mode-section{
  background:white;border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:18px;
}
.mode-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.mode-list{display:grid;gap:8px;}
.mode-item{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  padding:8px;border:1.5px solid var(--border);border-radius:8px;
  transition:all .15s;
}
.mode-item:hover{border-color:var(--gold);background:var(--cream);}
.mode-item.selected{border-color:var(--navy);background:var(--cream-dark);}
.mode-item input[type=radio]{accent-color:var(--navy);}
.mode-label{flex:1;font-size:13px;font-weight:500;color:var(--navy);}
.mode-desc{font-size:10px;color:var(--text-light);margin-top:2px;}
.mode-count-select{
  border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;
  font-size:12px;font-family:'Noto Sans JP',sans-serif;background:white;
}

/* 科目グリッド */
.subjects-section-title{
  font-size:12px;font-weight:700;color:var(--navy);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px;}
.subject-card{
  background:white;border:2px solid var(--border);border-radius:var(--radius);
  padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  /* buttonタグのデフォルトスタイルをリセット */
  text-align:left;width:100%;font-family:'Noto Sans JP',sans-serif;
  -webkit-appearance:none;appearance:none;
}
.subject-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--border);transition:background .2s;
}
.subject-card:hover{border-color:var(--gold);box-shadow:var(--shadow);transform:translateY(-2px);}
.subject-card:hover::before{background:var(--gold);}
.subject-card.selected{border-color:var(--navy);background:var(--cream-dark);}
.subject-card.selected::before{background:var(--navy);}
.subject-card.disabled{opacity:0.4;cursor:not-allowed;pointer-events:none;}
.subject-card.cleared{border-color:var(--green);background:#f0faf3;}
.subject-card.cleared::before{background:var(--green);}
.subject-icon{font-size:22px;margin-bottom:4px;}
.subject-name{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.subject-meta{font-size:10px;color:var(--text-light);}
.subject-weak{font-size:10px;color:var(--warn);margin-top:2px;font-weight:700;}
.subject-cleared-badge{font-size:10px;color:var(--green);margin-top:2px;font-weight:700;}

.start-btn{
  display:block;width:100%;max-width:320px;margin:0 auto;
  background:var(--navy);color:white;border:none;
  padding:14px 28px;border-radius:50px;font-size:15px;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:.08em;transition:all .2s;
  box-shadow:0 4px 20px rgba(26,39,68,0.3);
}
.start-btn:hover{background:var(--navy-light);transform:translateY(-2px);}
.start-btn:disabled{background:#aaa;box-shadow:none;cursor:not-allowed;transform:none;}

/* ===== 問題画面 ===== */
.quiz-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.subject-badge{background:var(--navy);color:white;font-size:11px;padding:3px 11px;border-radius:18px;}
.progress-text{font-size:11px;color:var(--text-light);margin-left:auto;}
.progress-bar{width:100%;height:5px;background:var(--cream-dark);border-radius:3px;margin-bottom:18px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width .4s;}

.question-card{
  background:white;border-radius:var(--radius);padding:22px;
  box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border);
}
.q-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:11px;flex-wrap:wrap;}
.q-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.q-num{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.15em;}

/* バッジ */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:18px;}
.badge.freq-high{background:#fff3e0;color:#e65100;border:1px solid #ffcc80;}
.badge.freq-mid{background:#e8f4fd;color:#1565c0;border:1px solid #90caf9;}
.badge.freq-low{background:#f3f4f6;color:#666;border:1px solid #ddd;}
.badge.trend{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.badge.wrong-prev{background:#fff8e1;color:var(--warn);border:1px solid #ffe082;}

.speech-btn{
  background:none;border:1.5px solid var(--border);border-radius:18px;
  padding:3px 9px;font-size:10px;cursor:pointer;
  color:var(--text-light);transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:3px;
}
.speech-btn:hover{border-color:var(--teal);color:var(--teal);}
.speech-btn.speaking{background:var(--teal);color:white;border-color:var(--teal);}

.question-text{font-family:'Noto Serif JP',serif;font-size:15px;line-height:1.85;color:var(--navy);font-weight:600;}

.choices{display:grid;gap:8px;margin-bottom:13px;}
.choice-btn{
  background:white;border:2px solid var(--border);border-radius:var(--radius);
  padding:11px 14px;text-align:left;cursor:pointer;
  font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);
  line-height:1.55;transition:all .15s;display:flex;gap:9px;align-items:flex-start;
}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:var(--cream);transform:translateX(3px);}
.choice-btn:disabled{cursor:default;}
.choice-label{font-weight:700;font-size:12px;min-width:18px;}

@keyframes flash-correct{0%{box-shadow:0 0 0 0 rgba(26,122,74,0)}30%{box-shadow:0 0 0 16px rgba(26,122,74,.3)}100%{box-shadow:0 0 0 0 rgba(26,122,74,0)}}
@keyframes flash-wrong{0%{box-shadow:0 0 0 0 rgba(192,57,43,0)}30%{box-shadow:0 0 0 16px rgba(192,57,43,.3)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.choice-btn.correct{background:#e8f7ef;border-color:var(--green);color:var(--green);animation:flash-correct .6s ease-out;}
.choice-btn.wrong{background:#fde8e8;border-color:var(--red);color:var(--red);animation:flash-wrong .6s ease-out;}

.answer-feedback{display:none;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--radius);font-weight:700;font-size:12px;margin-bottom:11px;}
.answer-feedback.show{display:flex;}
.answer-feedback.correct-fb{background:#e8f7ef;color:var(--green);}
.answer-feedback.wrong-fb{background:#fde8e8;color:var(--red);}

.explanation-wrap{display:none;margin-bottom:13px;}
.explanation-wrap.show{display:block;}
.explanation-title{font-weight:700;font-size:12px;color:var(--navy);margin-bottom:6px;}
.explanation-body{
  background:var(--cream-dark);border-left:4px solid var(--gold);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:11px 15px;font-size:12.5px;line-height:1.75;
}

.nav-row{display:flex;gap:7px;justify-content:flex-end;}
.nbtn{
  padding:9px 20px;border-radius:50px;border:none;
  font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.nbtn.primary{background:var(--navy);color:white;box-shadow:0 4px 14px rgba(26,39,68,.25);}
.nbtn.primary:hover{background:var(--navy-light);}
.nbtn.secondary{background:white;color:var(--text-light);border:1.5px solid var(--border);}
.nbtn.secondary:hover{border-color:var(--navy);color:var(--navy);}
.nbtn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== 結果画面 ===== */
.result-card{background:white;border-radius:var(--radius);padding:30px 22px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:18px;}
.result-circle{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;}
.result-circle.pass{background:linear-gradient(135deg,#e8f7ef,#d4efdf);border:3px solid var(--green);}
.result-circle.fail{background:linear-gradient(135deg,#fde8e8,#f5c6c6);border:3px solid var(--red);}
.result-circle.perfect{background:linear-gradient(135deg,#fff8e1,#ffd54f);border:3px solid var(--gold);box-shadow:0 0 20px rgba(200,151,58,0.5);}
.result-pct{font-family:'Noto Serif JP',serif;font-size:30px;font-weight:700;line-height:1;}
.result-circle.pass .result-pct{color:var(--green);}
.result-circle.fail .result-pct{color:var(--red);}
.result-circle.perfect .result-pct{color:var(--navy);}
.result-sub{font-size:10px;color:var(--text-light);margin-top:3px;}
.result-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.result-detail{font-size:12px;color:var(--text-light);margin-bottom:14px;}
.stats-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.stat-chip{background:var(--cream-dark);border-radius:10px;padding:7px 12px;text-align:center;min-width:62px;}
.stat-num{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--navy);}
.stat-label{font-size:9px;color:var(--text-light);margin-top:2px;}
.score-bar-wrap{margin-bottom:14px;text-align:left;}
.score-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.score-bar{height:7px;background:var(--cream-dark);border-radius:4px;overflow:hidden;}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .8s;}
.result-message{font-size:11.5px;color:var(--text-light);line-height:1.7;margin-bottom:18px;}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* お祝いオーバーレイ */
.celebration{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);z-index:1000;display:none;
  align-items:center;justify-content:center;
  animation:fadeIn .3s ease-out;
}
.celebration.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.celeb-content{
  text-align:center;color:white;
  animation:bounceIn .6s ease-out;
}
@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0;}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}
.celeb-icon{font-size:80px;margin-bottom:14px;animation:wiggle .8s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
.celeb-title{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;margin-bottom:10px;color:var(--gold);}
.celeb-text{font-size:15px;line-height:1.7;margin-bottom:20px;}
.celeb-close-btn{
  background:var(--gold);color:var(--navy);border:none;
  padding:11px 28px;border-radius:50px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
}
.celeb-close-btn:hover{background:var(--gold-light);}

/* ===== 履歴画面 ===== */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.clear-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 11px;font-size:11px;color:var(--text-light);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
.history-empty{background:white;border-radius:var(--radius);padding:36px;text-align:center;color:var(--text-light);font-size:12px;border:1px solid var(--border);}
.history-list{display:grid;gap:9px;}
.history-item{
  background:white;border-radius:var(--radius);padding:13px;
  border:1px solid var(--border);box-shadow:0 2px 8px rgba(26,39,68,.06);
}
.history-top{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.history-date{font-size:10px;color:var(--text-light);}
.history-subject{font-size:11px;font-weight:700;color:var(--navy);}
.history-pass{font-size:9px;font-weight:700;padding:2px 7px;border-radius:18px;}
.history-pass.pass{background:#e8f7ef;color:var(--green);}
.history-pass.fail{background:#fde8e8;color:var(--red);}
.history-pass.perfect{background:#fff8e1;color:var(--gold);border:1px solid var(--gold);}
.history-score{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:700;color:var(--navy);margin-left:auto;}
.history-detail{display:flex;gap:5px;flex-wrap:wrap;}
.h-q-chip{
  font-size:9px;padding:2px 6px;border-radius:5px;
  border:1px solid var(--border);background:var(--cream);
}
.h-q-chip.correct{background:#e8f7ef;border-color:#a5d6b0;color:var(--green);}
.h-q-chip.wrong{background:#fde8e8;border-color:#f5b0a0;color:var(--red);}

/* 苦手リスト */
.weak-section{margin-top:20px;}
.section-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.weak-list{display:grid;gap:7px;}
.weak-item{
  background:white;border-radius:var(--radius);padding:11px 14px;
  border:1px solid var(--border);border-left:4px solid var(--warn);
  font-size:12px;line-height:1.55;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:flex-start;gap:8px;
}
.weak-item:hover{border-color:var(--warn);background:#fff8f0;transform:translateX(3px);box-shadow:0 2px 8px rgba(230,126,34,.15);}
.weak-item:active{transform:translateX(1px);}
.weak-item-body{flex:1;}
.weak-item-subject{font-size:9px;color:var(--text-light);margin-bottom:3px;}
.weak-item-arrow{font-size:14px;color:var(--warn);margin-top:1px;flex-shrink:0;}
.weak-shortcut-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:11px 16px;margin-bottom:12px;
  background:var(--warn);color:white;border:none;border-radius:50px;
  font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:.05em;transition:all .2s;
  box-shadow:0 4px 16px rgba(230,126,34,.35);
}
.weak-shortcut-btn:hover{background:#d35400;transform:translateY(-1px);}
.weak-count-badge{
  background:rgba(255,255,255,.25);border-radius:12px;
  padding:1px 8px;font-size:11px;
}

@media(max-width:600px){
  .subjects-grid{grid-template-columns:1fr 1fr;}
  .question-text{font-size:14px;}
  .question-card{padding:18px 14px;}
  .header-right{gap:4px;}
  .hctrl label{display:none;}
  .voice-select{max-width:90px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🍳 調理師試験 練習問題</div>
    <div class="subtitle">完成版 / 全6科目600問収録</div>
  </div>
  <div class="header-right">
    <button class="hbtn on" id="auto-speech-btn" onclick="toggleAutoSpeech()">🔊 自動読み</button>
    <div class="hctrl">
      <label>声:</label>
      <select class="voice-select" id="voice-select" onchange="onVoiceChange()">
        <option>読込中...</option>
      </select>
    </div>
    <div class="hctrl">
      <label>速度:</label>
      <select class="rate-select" id="rate-select" onchange="onRateChange()">
        <option value="1.0">1.0倍</option>
        <option value="1.2" selected>1.2倍</option>
        <option value="1.5">1.5倍</option>
        <option value="2.0">2.0倍</option>
      </select>
    </div>
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" id="tab-study" onclick="switchTab('study')">📖 学習</button>
  <button class="nav-tab" id="tab-history" onclick="switchTab('history')">📊 履歴・苦手</button>
</div>

<div class="container">
  <!-- ===== 学習タブ ===== -->
  <div id="tab-study-content">

    <!-- 科目選択 -->
    <div id="screen-select" class="screen active">
      <div class="page-title">📚 出題モードと科目を選んでスタート</div>
      <div class="page-desc">全6科目・各100問（計600問）収録。自分のレベルに合わせて練習しましょう。</div>

      <div class="legend-row">
        <div class="legend-item"><span class="badge freq-high">🔥 頻出</span> 頻出問題</div>
        <div class="legend-item"><span class="badge trend">📡 トレンド</span> 最新動向</div>
        <div class="legend-item"><span class="badge wrong-prev">⚠️ 前回ミス</span> 以前の間違い</div>
      </div>

      <!-- モード選択 -->
      <div class="mode-section">
        <div class="mode-title">出題モード</div>

const QUESTIONS = [{"id":"fh_001","subject":"食品衛生学","question":"HACCPシステムの7原則に含まれないものはどれか。","choices":["危害要因分析","重要管理点（CCP）の設定","改善措置の設定","原材料の産地表示"],"answer":3,"explanation":"HACCPの7原則は①危害要因分析②重要管理点の設定③管理基準の設定④モニタリング方法の設定⑤改善措置の設定⑥検証方法の設定⑦記録と文書化です。原材料の産地表示はHACCPの原則には含まれません。","frequency":"high","is_trend":true,"frequency_reason":"毎年1〜2問出題"},{"id":"fh_002","subject":"食品衛生学","question":"ノロウイルスによる食中毒の特徴として正しいものはどれか。","choices":["主な感染源は鶏肉である","潜伏期間は通常24〜48時間である","加熱しても感染力は失われない","夏季に発生が多い"],"answer":1,"explanation":"ノロウイルスの潜伏期間は24〜48時間です。主な感染源はカキなどの二枚貝で、85〜90℃・90秒以上の加熱で感染力を失います。冬季（12〜2月）に発生が多い特徴があります。","frequency":"high","is_trend":false,"frequency_reason":"最頻出テーマ"},{"id":"fh_003","subject":"食品衛生学","question":"サルモネラ属菌による食中毒の原因食品として最も関係が深いものはどれか。","choices":["鶏卵・食肉","二枚貝","鮮魚介類","缶詰食品"],"answer":0,"explanation":"サルモネラ属菌は鶏卵・食肉（特に鶏肉）が主な原因食品で、家畜・家禽の腸管内に常在します。二枚貝はノロウイルスや腸炎ビブリオ、鮮魚介類は腸炎ビブリオやアニサキス、缶詰食品はボツリヌス菌が問題となります。","frequency":"high","is_trend":false,"frequency_reason":"毎年出題の定番"},{"id":"fh_004","subject":"食品衛生学","question":"カンピロバクター食中毒の特徴として正しいものはどれか。","choices":["潜伏期間は2〜7日と長い","100℃で瞬時に死滅する","少量菌数では発症しない","主に夏季に多発する"],"answer":0,"explanation":"カンピロバクターの潜伏期間は2〜7日と他の食中毒菌より長いのが特徴です。少量（数百個）でも発症し、ギラン・バレー症候群の原因にもなります。主に鶏肉が原因で年間を通じて発生します。加熱（75℃1分以上）で死滅します。","frequency":"high","is_trend":true,"frequency_reason":"近年発生件数最多"},{"id":"fh_005","subject":"食品衛生学","question":"黄色ブドウ球菌食中毒に関する記述として正しいものはどれか。","choices":["菌そのものが感染して発症する","原因毒素は熱に強いエンテロトキシンである","潜伏期間は12〜24時間と長い","調理者の手指は感染源にならない"],"answer":1,"explanation":"黄色ブドウ球菌は毒素型食中毒で、産生するエンテロトキシンが原因です。この毒素は100℃30分の加熱でも失活しません。潜伏期間は1〜5時間と短く、調理者の手指の傷（化膿巣）が主な汚染源です。おにぎり・弁当などが原因食品となります。","frequency":"high","is_trend":false,"frequency_reason":"毒素型の代表例"},{"id":"fh_006","subject":"食品衛生学","question":"ウエルシュ菌食中毒の予防対策として最も適切なものはどれか。","choices":["加熱調理で完全に予防できる","調理後は速やかに小分けして冷却する","酸性食品では発生しない","冷凍保存では予防できない"],"answer":1,"explanation":"ウエルシュ菌は耐熱性芽胞を形成するため、通常の加熱では死滅しません。「給食病」とも呼ばれ、大量調理した煮込み料理（カレー・シチュー等）の常温放置で芽胞が発芽・増殖します。調理後は速やかに小分けして急速冷却（10℃以下）することが重要な予防策です。","frequency":"high","is_trend":false,"frequency_reason":"大量調理で頻出"},{"id":"fh_007","subject":"食品衛生学","question":"腸管出血性大腸菌O157の特徴として正しいものはどれか。","choices":["100個以下の少量菌でも発症する","加熱調理しても死滅しない","潜伏期間は1日以内である","溶血性尿毒症症候群（HUS）の合併症はない"],"answer":0,"explanation":"O157は感染力が強く、100個以下の少量でも発症します。潜伏期間は3〜8日と長く、ベロ毒素を産生し溶血性尿毒症症候群（HUS）を合併すると重症化・死亡することもあります。75℃1分以上の加熱で死滅します。","frequency":"high","is_trend":false,"frequency_reason":"重大食中毒の代表"},{"id":"fh_008","subject":"食品衛生学","question":"腸炎ビブリオ食中毒の予防として最も重要な対策はどれか。","choices":["低温保存と真水での洗浄","十分な塩分での保存","乾燥状態での保存","アルカリ性環境での保存"],"answer":0,"explanation":"腸炎ビブリオは海水中の細菌で、真水（低張液）に弱い性質があります。魚介類は真水でよく洗浄し、4℃以下で冷蔵保存することが予防の基本です。塩分を好む（好塩菌）ため、塩分での保存は逆効果です。","frequency":"high","is_trend":false,"frequency_reason":"頻出・魚介類関連"},{"id":"fh_009","subject":"食品衛生学","question":"ノロウイルスの不活化に最も有効な方法はどれか。","choices":["アルコール消毒","逆性石鹸","次亜塩素酸ナトリウム","エタノール"],"answer":2,"explanation":"ノロウイルスはエンベロープを持たないためアルコールや逆性石鹸の効果は限定的です。次亜塩素酸ナトリウム（200ppm以上）が最も有効で、加熱なら85〜90℃90秒以上で不活化できます。手洗いは流水と石けんによる物理的除去が基本です。","frequency":"high","is_trend":false,"frequency_reason":"実務に直結"},{"id":"fh_010","subject":"食品衛生学","question":"アニサキスによる食中毒の予防として有効でないものはどれか。","choices":["マイナス20℃で24時間以上の冷凍","60℃1分以上の加熱","酢じめ・塩漬け","内臓を速やかに除去する"],"answer":2,"explanation":"アニサキスは酢・塩・しょうゆ・わさびでは死滅しません。有効な予防は①マイナス20℃で24時間以上の冷凍②70℃以上または60℃1分以上の加熱③目視による除去です。魚の死後、内臓から筋肉に移動するため、速やかな内臓除去も重要です。","frequency":"high","is_trend":true,"frequency_reason":"近年急増・話題"},{"id":"fh_011","subject":"食品衛生学","question":"フグ毒（テトロドトキシン）に関する記述として正しいものはどれか。","choices":["卵巣・肝臓に多く含まれる","加熱すれば毒性は消える","解毒剤が確立している","食用部位は決められていない"],"answer":0,"explanation":"テトロドトキシンは主に卵巣・肝臓に多く含まれ、種類により筋肉・皮も有毒です。耐熱性が極めて高く加熱では分解されず、有効な解毒剤もありません。フグの種類ごとに食用可能部位が法令で定められ、フグ調理師の免許が必要です。","frequency":"high","is_trend":false,"frequency_reason":"自然毒の代表"},{"id":"fh_012","subject":"食品衛生学","question":"じゃがいもによる食中毒の原因物質はどれか。","choices":["アフラトキシン","ソラニン・チャコニン","テトラミン","アミグダリン"],"answer":1,"explanation":"じゃがいもの芽や緑色部分にはソラニン・チャコニン（配糖体アルカロイド）が含まれます。加熱では分解されにくく、芽や緑色部分を十分除去することが重要です。アフラトキシンはカビ毒、テトラミンは巻貝、アミグダリンは梅・アンズの種子に含まれます。","frequency":"high","is_trend":false,"frequency_reason":"家庭内中毒で頻出"},{"id":"fh_013","subject":"食品衛生学","question":"ボツリヌス菌食中毒の特徴として誤っているものはどれか。","choices":["嫌気性条件で増殖する","芽胞は120℃4分以上の加熱で死滅する","毒素は熱に強い","神経症状を呈する"],"answer":2,"explanation":"ボツリヌス毒素は熱に弱く、80℃30分または100℃数分の加熱で失活します。一方、芽胞は耐熱性が高く120℃4分以上の加熱が必要です。嫌気性菌で真空パック食品・缶詰・いずしなどで増殖し、ボツリヌス毒素は最強の自然毒で神経症状（眼瞼下垂・呼吸麻痺）を起こします。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_014","subject":"食品衛生学","question":"食中毒統計で発生件数が最も多い病因物質はどれか（近年の傾向）。","choices":["サルモネラ属菌","カンピロバクター","アニサキス","ノロウイルス"],"answer":2,"explanation":"近年（2018年以降）、食中毒の発生件数で最多なのは寄生虫のアニサキスです。カンピロバクターも上位ですが、アニサキスは届出制度の周知により報告数が急増しました。患者数ではノロウイルスが多い傾向にあります。","frequency":"medium","is_trend":true,"frequency_reason":"近年の統計傾向"},{"id":"fh_015","subject":"食品衛生学","question":"食品添加物の表示において、用途名と物質名の両方を表示しなければならないものはどれか。","choices":["乳化剤","保存料","膨張剤","増粘剤"],"answer":1,"explanation":"保存料・甘味料・着色料・漂白剤・防かび剤・酸化防止剤は用途名と物質名の両方の表示が義務付けられています。乳化剤・膨張剤・増粘剤は物質名のみの表示でよいとされています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_016","subject":"食品衛生学","question":"食物アレルギーの特定原材料として法令で定められていないものはどれか。","choices":["えび","そば","バナナ","小麦"],"answer":2,"explanation":"特定原材料（表示義務）は8品目：えび・かに・くるみ・小麦・そば・卵・乳・落花生です（2023年くるみ追加）。バナナは特定原材料に準ずるもの（推奨表示）に分類されます。","frequency":"high","is_trend":true,"frequency_reason":"法改正で出題増"},{"id":"fh_017","subject":"食品衛生学","question":"食品添加物の指定制度に関する記述として正しいものはどれか。","choices":["天然由来であれば全て使用可能である","指定添加物のみ使用が認められる","製造者の判断で添加できる","使用量に制限はない"],"answer":1,"explanation":"日本では指定添加物・既存添加物・天然香料・一般飲食物添加物の4分類のみ使用が認められています。安全性が評価されたもののみ厚生労働大臣が指定し、使用基準（対象食品・最大使用量）が定められています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_018","subject":"食品衛生学","question":"残留農薬のポジティブリスト制度に関する記述として正しいものはどれか。","choices":["全ての農薬の使用を禁止する制度である","基準が設定されていない農薬は0.01ppmを上限とする","輸入食品のみ対象である","日本独自の制度で世界に類はない"],"answer":1,"explanation":"ポジティブリスト制度（2006年導入）は、残留基準が設定されていない農薬等について一律基準（0.01ppm）を超えた食品の流通を原則禁止する制度です。全ての農薬・国内外の食品が対象で、欧米でも類似の制度があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_019","subject":"食品衛生学","question":"食品添加物のうち、保存料に分類されるものはどれか。","choices":["アスコルビン酸","安息香酸ナトリウム","カラギーナン","クエン酸"],"answer":1,"explanation":"安息香酸ナトリウムは代表的な保存料で、清涼飲料水・しょうゆ等に使用されます。アスコルビン酸（ビタミンC）は酸化防止剤、カラギーナンは増粘安定剤、クエン酸は酸味料・pH調整剤として使われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_020","subject":"食品衛生学","question":"食品衛生法の目的として最も適切なものはどれか。","choices":["食品産業の発展","食品の品質向上","食品の安全性確保による国民の健康保護","食料自給率の向上"],"answer":2,"explanation":"食品衛生法第1条は「食品の安全性の確保のために公衆衛生の見地から必要な規制その他の措置を講ずることにより、飲食に起因する衛生上の危害の発生を防止し、もつて国民の健康の保護を図ることを目的とする」と定めています。","frequency":"high","is_trend":false,"frequency_reason":"法令基本"},{"id":"fh_021","subject":"食品衛生学","question":"2021年6月から原則全ての食品等事業者に義務化されたものはどれか。","choices":["ISO22000の取得","HACCPに沿った衛生管理","有機JAS認証","栄養成分表示"],"answer":1,"explanation":"2021年6月1日から、食品衛生法改正により原則として全ての食品等事業者にHACCPに沿った衛生管理が完全義務化されました。事業規模により「HACCPに基づく衛生管理」と「HACCPの考え方を取り入れた衛生管理」に分かれます。","frequency":"high","is_trend":true,"frequency_reason":"重要法改正"},{"id":"fh_022","subject":"食品衛生学","question":"食品衛生責任者に関する記述として正しいものはどれか。","choices":["国家資格である","飲食店に配置義務がある","調理師資格と同じである","設置は任意である"],"answer":1,"explanation":"食品衛生責任者は飲食店等の営業許可施設に1名以上配置することが食品衛生法で義務付けられています。調理師・栄養士等の有資格者または都道府県の養成講習会受講者が就任できます。国家資格ではなく、調理師資格とは別の制度です。","frequency":"high","is_trend":false,"frequency_reason":"実務直結"},{"id":"fh_023","subject":"食品衛生学","question":"消費期限と賞味期限の違いとして正しいものはどれか。","choices":["消費期限は品質保持期限、賞味期限は安全性期限である","消費期限は品質劣化が早い食品に表示する","両者に違いはない","消費期限は賞味期限より長期間である"],"answer":1,"explanation":"消費期限は品質劣化が早く、期限を過ぎたら食べない方がよい食品（弁当・生菓子・食肉等）に表示します。賞味期限は品質が比較的長く保持される食品（缶詰・レトルト・スナック菓子等）に表示し、過ぎても直ちに食べられないわけではありません。","frequency":"high","is_trend":false,"frequency_reason":"消費者教育で頻出"},{"id":"fh_024","subject":"食品衛生学","question":"生食用食肉の規格基準として正しいものはどれか。","choices":["豚肉の生食用販売が認められている","牛レバーの生食提供が禁止されている","馬刺しは規格基準の対象外","鶏肉のたたきは規格基準で認可されている"],"answer":1,"explanation":"2012年7月から牛肝臓（レバー）、2015年6月から豚肉・豚レバーの生食用販売・提供が食品衛生法で禁止されています。生食用牛肉（ユッケ等）は厳格な規格基準のもとでのみ提供可能です。鶏肉の生食はカンピロバクター食中毒のリスクが高く規格基準はありません。","frequency":"high","is_trend":true,"frequency_reason":"重要規制"},{"id":"fh_025","subject":"食品衛生学","question":"大量調理施設衛生管理マニュアルにおける加熱調理の中心温度・時間の基準として正しいものはどれか。","choices":["65℃1分以上","75℃1分以上（ノロウイルス汚染食品は85〜90℃90秒以上）","85℃3分以上","100℃瞬間"],"answer":1,"explanation":"大量調理施設衛生管理マニュアルでは、加熱調理食品の中心温度を75℃で1分以上（ノロウイルス汚染のおそれがある食品は85〜90℃で90秒以上）と定めています。中心温度計で複数点測定することが求められます。","frequency":"high","is_trend":false,"frequency_reason":"実務必須知識"},{"id":"fh_026","subject":"食品衛生学","question":"危険温度帯（デンジャーゾーン）として正しいものはどれか。","choices":["0〜5℃","10〜60℃","60〜80℃","80℃以上"],"answer":1,"explanation":"危険温度帯（デンジャーゾーン）は10〜60℃で、この温度帯では細菌が活発に増殖します。特に20〜45℃で爆発的増殖が起こります。食品はこの温度帯に長時間置かないことが基本で、加熱後は速やかに60℃以上で保温するか10℃以下に冷却します。","frequency":"high","is_trend":false,"frequency_reason":"温度管理の基本"},{"id":"fh_027","subject":"食品衛生学","question":"冷蔵庫・冷凍庫の温度管理として正しいものはどれか。","choices":["冷蔵は10℃以下、冷凍はマイナス15℃以下","冷蔵は15℃以下、冷凍は0℃以下","冷蔵は20℃以下、冷凍はマイナス5℃以下","冷蔵庫の温度管理は不要"],"answer":0,"explanation":"食品衛生法および大量調理施設衛生管理マニュアルでは、冷蔵は10℃以下（食肉・魚介は5℃以下）、冷凍はマイナス15℃以下（マイナス18℃以下が望ましい）と定められています。庫内温度計で日々確認・記録が必要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fh_028","subject":"食品衛生学","question":"冷却作業の温度・時間管理として正しいものはどれか。","choices":["調理後30分以内に20℃まで冷却","調理後60分以内に20℃付近まで、または30分以内に10℃以下","常温で2時間以内","冷却基準はない"],"answer":1,"explanation":"大量調理施設衛生管理マニュアルでは、調理後の食品の中心温度を①30分以内に20℃付近まで、または②60分以内に10℃以下まで急速冷却することが推奨されます。これは細菌が増殖しやすい温度帯（10〜60℃の危険温度帯）を速やかに通過させるためです。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_029","subject":"食品衛生学","question":"調理従事者の手洗いとして最も適切なものはどれか。","choices":["出勤時に1回行えば十分である","石けんで30秒以上もみ洗いし流水で洗い流す","アルコール消毒だけでよい","使い捨て手袋を着用すれば手洗いは不要"],"answer":1,"explanation":"手洗いは石けんで30秒以上もみ洗いし、流水で十分すすぐのが基本です。トイレ後・調理開始前・原材料を扱った後・食肉/魚介類/卵を扱った後など、汚染リスクのある作業の都度実施します。手袋着用前にも手洗いが必要です。","frequency":"high","is_trend":false,"frequency_reason":"基本的衛生管理"},{"id":"fh_030","subject":"食品衛生学","question":"次亜塩素酸ナトリウムの使用に関する記述として正しいものはどれか。","choices":["酸性洗剤と混ぜると効果が高まる","野菜の消毒には200ppmを使用する","金属に対する腐食性はない","濃度が濃いほど安全である"],"answer":1,"explanation":"次亜塩素酸ナトリウムは野菜・果物の消毒には200ppm（0.02%）で5分間浸漬します。酸性洗剤と混ぜると有毒な塩素ガスが発生するため絶対に混ぜてはいけません。金属を腐食する性質があり、適切な濃度管理が安全に重要です。","frequency":"high","is_trend":false,"frequency_reason":"実務頻出"},{"id":"fh_031","subject":"食品衛生学","question":"検食（保存食）の保存に関する記述として正しいものはどれか。","choices":["原材料・調理済み食品を50g以上、マイナス20℃以下で2週間以上保存する","調理済み食品のみ100g保存する","常温で1週間保存する","保存は任意である"],"answer":0,"explanation":"大量調理施設衛生管理マニュアルでは、原材料及び調理済み食品を食品ごとに50g程度を清潔な容器に入れ、マイナス20℃以下で2週間以上保存することが定められています。食中毒発生時の原因究明のために重要です。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_032","subject":"食品衛生学","question":"食品取扱者の健康管理として誤っているものはどれか。","choices":["年1回以上の検便検査が必要","下痢・嘔吐症状時は調理従事しない","手指に傷がある場合は耐水性絆創膏で覆い手袋着用","検便で陽性でも症状がなければ調理を続けてよい"],"answer":3,"explanation":"検便でサルモネラ・腸管出血性大腸菌・赤痢菌等の病原菌が検出された場合、症状の有無に関わらず調理従事を中止し、医師の指示を受ける必要があります。また、検便は月1回以上実施することが大量調理施設では推奨されます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fh_033","subject":"食品衛生学","question":"クロスコンタミネーション（交差汚染）の防止策として誤っているものはどれか。","choices":["まな板・包丁の用途別使い分け","食材ごとに調理場所を分ける","加熱前後の食品を同じ容器に入れる","調理工程ごとの手洗いの徹底"],"answer":2,"explanation":"クロスコンタミネーション防止には、加熱前（汚染の可能性あり）と加熱後（無菌状態）の食品を絶対に同じ容器・器具で扱わないことが重要です。生肉を切ったまな板でサラダを切らない、菌を保持する可能性のある手指でクリーン食品を触らない、これらが基本原則です。","frequency":"high","is_trend":false,"frequency_reason":"実務頻出"},{"id":"fh_034","subject":"食品衛生学","question":"食品取扱者のユニフォーム・身だしなみとして適切でないものはどれか。","choices":["毛髪が出ないよう帽子・三角巾を着用する","作業着は毎日洗濯した清潔なものを着用する","マニキュア・指輪は着用したまま作業してよい","エプロンは作業ごとに使い分ける"],"answer":2,"explanation":"マニキュア・指輪・腕時計等は異物混入の原因となるため、調理作業中は外す必要があります。マニキュアは剥がれて食品に混入する恐れ、指輪は手洗いの妨げや細菌の温床となります。爪は短く切り、香水も避けます。","frequency":"high","is_trend":false,"frequency_reason":"基本マナー"},{"id":"fh_035","subject":"食品衛生学","question":"食中毒予防の三原則として正しいものはどれか。","choices":["加熱・冷却・洗浄","つけない・増やさない・やっつける","見る・嗅ぐ・味わう","早く・安く・うまく"],"answer":1,"explanation":"食中毒予防の三原則は「つけない（清潔・洗浄）」「増やさない（迅速・冷却）」「やっつける（加熱・殺菌）」です。ノロウイルス等のウイルス性食中毒では「持ち込まない」を加えた四原則とされることもあります。","frequency":"high","is_trend":false,"frequency_reason":"最重要基本"},{"id":"fh_036","subject":"食品衛生学","question":"微生物の増殖に必要な3要素として正しい組み合わせはどれか。","choices":["温度・水分・栄養","光・酸素・水分","圧力・温度・pH","水分・酸素・光"],"answer":0,"explanation":"微生物の増殖には「温度・水分・栄養」の3要素が必要で、これに「酸素」「pH」を加えて5要素ともいわれます。これらの条件をコントロールすることが食品保存の基本です。","frequency":"high","is_trend":false,"frequency_reason":"基本知識"},{"id":"fh_037","subject":"食品衛生学","question":"大腸菌群が衛生指標細菌として用いられる理由として最も適切なものはどれか。","choices":["食中毒の直接原因菌だから","検出が難しく専門技術が必要だから","糞便汚染の指標となるから","加熱調理で死滅しないから"],"answer":2,"explanation":"大腸菌群は腸内細菌のため、検出されると糞便汚染や加熱不足の可能性が示唆されます。検査が比較的容易で、衛生管理状態の指標として広く用いられます。大腸菌群自体が必ずしも病原性を持つわけではありません。","frequency":"high","is_trend":false,"frequency_reason":"衛生指標の基本"},{"id":"fh_038","subject":"食品衛生学","question":"水分活性（Aw）に関する記述として正しいものはどれか。","choices":["Aw値が高いほど微生物が増殖しにくい","一般的な細菌はAw 0.90以上で増殖する","Aw 0.65以下でもカビは増殖する","水分含量と水分活性は同じ意味である"],"answer":1,"explanation":"水分活性は微生物が利用できる自由水の割合を示します。一般細菌はAw 0.90以上、酵母は0.88以上、カビは0.80以上で増殖します。Aw 0.65以下ではほとんどの微生物の増殖が抑制されます。水分含量と水分活性は別の概念です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_039","subject":"食品衛生学","question":"HACCPシステムの「12手順」のうち、最初に行うべきものはどれか。","choices":["危害要因分析","HACCPチームの編成","フローダイアグラムの作成","重要管理点の決定"],"answer":1,"explanation":"HACCPの12手順では、まず①HACCPチームの編成からスタートし、②製品の特徴の確認、③意図する用途の確認、④フローダイアグラムの作成、⑤現場での確認、と進みます。手順6からが7原則の①危害要因分析です。","frequency":"high","is_trend":true,"frequency_reason":"HACCP義務化で重要"},{"id":"fh_040","subject":"食品衛生学","question":"CCP（重要管理点）の例として最も適切なものはどれか。","choices":["食材の購入","加熱殺菌工程","食器の保管","メニュー作成"],"answer":1,"explanation":"CCP（Critical Control Point）は危害要因をコントロールする決定的工程で、加熱殺菌・冷却・金属検出工程などが代表例です。温度・時間等の管理基準（CL）を設定し、モニタリングと記録が必要です。","frequency":"high","is_trend":true,"frequency_reason":"HACCPの中核"},{"id":"fh_041","subject":"食品衛生学","question":"食品の解凍方法として最も衛生的に適切なものはどれか。","choices":["常温（室温）で自然解凍する","冷蔵庫内で低温解凍する","直射日光下で解凍する","40℃の湯につけて解凍する"],"answer":1,"explanation":"解凍は冷蔵庫内（5℃以下）でゆっくり行うのが最も衛生的です。常温解凍は表面温度が上昇し細菌が増殖しやすく、特に夏季は危険です。流水解凍（21℃以下）も認められますが時間管理が必要です。電子レンジ解凍は急速調理用です。","frequency":"high","is_trend":false,"frequency_reason":"実務頻出"},{"id":"fh_042","subject":"食品衛生学","question":"卵の取扱いに関する記述として正しいものはどれか。","choices":["ヒビが入った卵でも加熱すれば使用可能である","賞味期限内であれば生食可能である","洗卵後は冷蔵保存する","卵殻表面のサルモネラ菌は洗浄で完全除去できる"],"answer":1,"explanation":"卵は賞味期限（生食可能期間）内であれば生食できます。期限後は十分加熱調理して使用します。ヒビ割れ卵はサルモネラ菌が内部に侵入する恐れがあり使用しません。卵殻汚染防止のため、ひびを避け、調理直前に割卵し、割った卵は速やかに使い切ることが重要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fh_043","subject":"食品衛生学","question":"食中毒予防における「中心温度の確認」が特に重要な食品はどれか。","choices":["果物","大型の塊肉・調理品","ナッツ類","乾物"],"answer":1,"explanation":"大型の塊肉（ローストビーフ・ハンバーグ等）や厚みのある調理品は表面と中心の温度差が大きく、表面が焼けても中心が生焼けになりやすいため、中心温度計による確認が特に重要です。中心温度75℃1分以上（ノロウイルス汚染懸念食品は85〜90℃90秒以上）を必ず確認します。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fh_044","subject":"食品衛生学","question":"手指の傷に関する対応として正しいものはどれか。","choices":["軽微な傷なら絆創膏のみで作業を続けてよい","耐水性の絆創膏を貼り使い捨て手袋を着用","傷の有無は調理に影響しない","化膿していなければ問題ない"],"answer":1,"explanation":"手指の傷（特に化膿巣）には黄色ブドウ球菌が多数存在し、食中毒の原因となります。傷がある場合は耐水性絆創膏で完全に覆い、その上から使い捨て手袋を着用して作業します。化膿巣がある場合は調理業務から外れるべきです。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fh_045","subject":"食品衛生学","question":"食物アレルギーの主要な発症機序はどれか。","choices":["Ⅰ型（IgE依存型）アレルギー反応","感染症","中毒反応","心因性反応"],"answer":0,"explanation":"食物アレルギーの多くはⅠ型（即時型・IgE依存型）アレルギー反応で、原因食物摂取後数分〜2時間以内に蕁麻疹・呼吸困難・アナフィラキシー等の症状が現れます。アナフィラキシーショックは生命に関わるため、エピペン®（アドレナリン自己注射）の準備等が重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_046","subject":"食品衛生学","question":"食品の自主回収（リコール）情報の届出に関する記述として正しいものはどれか。","choices":["全ての回収案件で届出が必要である","健康被害のおそれがある場合のみ届出する","食品表示法違反は対象外である","届出は任意である"],"answer":0,"explanation":"2021年6月の改正食品衛生法により、食品衛生法・食品表示法違反による自主回収（クラスⅠ・Ⅱ）は行政への届出が義務化されました。健康被害のおそれの有無に関わらず、対象案件は全て届出し、消費者庁・厚労省のウェブサイトで公表されます。","frequency":"medium","is_trend":true,"frequency_reason":"2021年制度化"},{"id":"fh_047","subject":"食品衛生学","question":"食品ロス削減推進法（2019年施行）に関する記述として正しいものはどれか。","choices":["食品事業者にのみ義務がある","国民一人ひとりの自主的取組を求める","罰則規定が中心である","飲食店の営業時間を制限する"],"answer":1,"explanation":"食品ロス削減推進法（2019年10月施行）は、国・地方公共団体・事業者・消費者一体となった取組を促進する基本法です。フードバンク活動支援・食品ロス削減月間（10月）の設定等が含まれます。罰則規定はなく、国民一人ひとりの自主的取組を求める性格の法律です。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs関連"},{"id":"fh_048","subject":"食品衛生学","question":"器具・容器包装に関する記述として正しいものはどれか。","choices":["一度使用したものを再使用しても問題ない","合成樹脂製は全て安全である","ポジティブリスト制度が導入された","色素の使用に制限はない"],"answer":2,"explanation":"2020年6月から、器具・容器包装にポジティブリスト制度が導入されました。これは安全性を評価して使用を認めた物質のみリスト化し、それ以外の使用を原則禁止する制度です。合成樹脂を中心に、溶出する化学物質の安全性管理が強化されました。","frequency":"medium","is_trend":true,"frequency_reason":"2020年制度導入"},{"id":"fh_049","subject":"食品衛生学","question":"食品トレーサビリティ制度の対象として現在義務化されているものはどれか。","choices":["牛肉・米","豚肉・鶏肉","野菜・果物","加工食品全般"],"answer":0,"explanation":"日本でトレーサビリティが法律で義務化されているのは①牛肉（牛トレーサビリティ法、2003年）と②米・米加工品（米トレーサビリティ法、2010年）です。BSE問題・米偽装事件を契機に導入され、生産から消費までの追跡を可能にしています。他の食品は任意です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_050","subject":"食品衛生学","question":"食中毒事件発生時の調理従事者の対応として誤っているものはどれか。","choices":["速やかに保健所に届け出る","原因究明のため検食を提供する","嘔吐物・下痢便は次亜塩素酸ナトリウムで処理する","症状のある従事者を業務継続させる"],"answer":3,"explanation":"食中毒の症状（下痢・嘔吐・発熱等）がある従事者は直ちに調理業務から外す必要があります。医師の診断を受け、原因菌が陰性化するまで業務復帰させてはいけません。発生時は速やかに保健所に届出し、検食提供・原因究明に協力します。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_001","subject":"食品学","question":"日本食品標準成分表における食品群の分類として、正しい群数はどれか。","choices":["12群","15群","18群","20群"],"answer":2,"explanation":"日本食品標準成分表（八訂）では食品を18群に分類しています：1穀類、2いも・でん粉類、3砂糖・甘味類、4豆類、5種実類、6野菜類、7果実類、8きのこ類、9藻類、10魚介類、11肉類、12卵類、13乳類、14油脂類、15菓子類、16し好飲料類、17調味料・香辛料類、18調理済み流通食品類。","frequency":"high","is_trend":false,"frequency_reason":"食品分類の基本"},{"id":"fs_002","subject":"食品学","question":"食品の三大栄養素として正しい組み合わせはどれか。","choices":["たんぱく質・脂質・炭水化物","ビタミン・ミネラル・水","糖質・脂質・食物繊維","たんぱく質・ビタミン・ミネラル"],"answer":0,"explanation":"三大栄養素はたんぱく質・脂質・炭水化物（糖質）で、エネルギー源となります。これにビタミン・ミネラルを加えて五大栄養素、さらに食物繊維・水を加えて七大栄養素と呼ぶこともあります。","frequency":"high","is_trend":false,"frequency_reason":"基本中の基本"},{"id":"fs_003","subject":"食品学","question":"食品の一般成分のうち、最も含量が多いものはどれか（多くの食品で）。","choices":["たんぱく質","脂質","炭水化物","水分"],"answer":3,"explanation":"多くの食品で最も多い成分は水分です。野菜・果物では80〜95%、肉・魚で60〜75%、卵で約75%が水分です。乾物（穀類・乾燥豆等）や油脂類は例外的に水分が少ない食品です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_004","subject":"食品学","question":"米の主成分であるでんぷんの構成として正しいものはどれか。","choices":["アミロースとアミロペクチン","グルコースとフルクトース","セルロースとペクチン","グリコーゲンとデキストリン"],"answer":0,"explanation":"米のでんぷんはアミロース（直鎖状）とアミロペクチン（分岐状）から構成されます。うるち米はアミロース約20%・アミロペクチン約80%、もち米はほぼ100%アミロペクチンで、アミロースが少ないほど粘りが強くなります。","frequency":"high","is_trend":false,"frequency_reason":"頻出基本知識"},{"id":"fs_005","subject":"食品学","question":"小麦粉の種類とたんぱく質含量の組み合わせとして正しいものはどれか。","choices":["薄力粉：11.5〜13.5%","中力粉：9〜10.5%","強力粉：7〜8.5%","全粒粉：6%以下"],"answer":1,"explanation":"小麦粉はたんぱく質（グルテン）含量で分類されます：薄力粉7〜8.5%（菓子・天ぷら）、中力粉9〜10.5%（うどん・お好み焼き）、強力粉11.5〜13.5%（パン・中華麺）。全粒粉は表皮ごと挽いたもので分類は別です。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fs_006","subject":"食品学","question":"米の精白度に関する記述として正しいものはどれか。","choices":["精白米はぬかと胚芽を残している","玄米はビタミンB1が豊富である","胚芽米は完全に精白した米である","分搗き米は7分搗きが最も白い"],"answer":1,"explanation":"玄米はぬかと胚芽を含み、ビタミンB1・食物繊維・ミネラルが豊富です。精白米はぬか・胚芽を除去したもの、胚芽米は胚芽を残した米、分搗き米は精白の度合いを示し3分搗き<5分搗き<7分搗きの順に白くなります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_007","subject":"食品学","question":"グルテンを形成する小麦のたんぱく質の組み合わせとして正しいものはどれか。","choices":["グリアジンとグルテニン","カゼインとアルブミン","グロブリンとアルブミン","コラーゲンとエラスチン"],"answer":0,"explanation":"グルテンは小麦に水を加えてこねることで、グリアジン（粘性）とグルテニン（弾性）が結合して形成されるたんぱく質網目構造です。パンの膨らみ・うどんのコシ・餃子の皮の伸びなど、様々な小麦食品の物性を生み出します。","frequency":"high","is_trend":false,"frequency_reason":"重要"},{"id":"fs_008","subject":"食品学","question":"そばの主要なたんぱく質のうちアレルギーの原因となるものはどれか。","choices":["グリアジン","カゼイン","ソバアレルゲン（Fag e 1等）","オボアルブミン"],"answer":2,"explanation":"そばのアレルゲンはFag e 1、Fag e 2等のたんぱく質で、特に重篤なアナフィラキシーを起こしやすい食物アレルギーです。そばは特定原材料8品目の一つで表示が義務化されています。打ち粉や同じ釜での茹で麺による交差汚染にも注意が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_009","subject":"食品学","question":"じゃがいもの主成分と特徴的な栄養素として正しいものはどれか。","choices":["脂質が主成分・ビタミンA豊富","でんぷんが主成分・ビタミンC豊富","たんぱく質が主成分・鉄分豊富","糖質が主成分・カルシウム豊富"],"answer":1,"explanation":"じゃがいもの主成分はでんぷんで、ビタミンCが比較的豊富です（生100g中35mg程度）。じゃがいものビタミンCはでんぷんに守られ加熱で失われにくい特徴があります。芽や緑色部分にはソラニン・チャコニンの毒素を含むため除去が必要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_010","subject":"食品学","question":"さつまいもの甘さに関する記述として正しいものはどれか。","choices":["β-アミラーゼがでんぷんを糖化することで甘くなる","加熱しても糖化は進まない","低温で甘くなる","さつまいもの甘さは元々の糖分による"],"answer":0,"explanation":"さつまいもは加熱中（特に65〜70℃で長時間）、内在するβ-アミラーゼがでんぷんを麦芽糖（マルトース）に分解して甘くなります。石焼き芋がふつうの蒸し芋より甘いのは、ゆっくり加熱されて糖化が進むためです。","frequency":"high","is_trend":false,"frequency_reason":"頻出・実技関連"},{"id":"fs_011","subject":"食品学","question":"こんにゃくの主成分として正しいものはどれか。","choices":["デキストリン","グルコマンナン（こんにゃくマンナン）","イヌリン","アガロース"],"answer":1,"explanation":"こんにゃくの主成分はグルコマンナン（こんにゃくマンナン）という水溶性食物繊維です。アルカリ（水酸化カルシウム等）を加えると凝固し、独特の弾力が生まれます。低カロリーで便通改善や血糖値上昇抑制効果があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_012","subject":"食品学","question":"大豆に含まれる成分として誤っているものはどれか。","choices":["イソフラボン（女性ホルモン様作用）","サポニン（抗酸化作用）","レシチン（脂質代謝関連）","ソラニン（毒性）"],"answer":3,"explanation":"ソラニンはじゃがいもの芽等に含まれる毒素で、大豆には含まれません。大豆にはイソフラボン（エストロゲン様作用）、サポニン（抗酸化）、レシチン（リン脂質、卵黄にも多い）、トリプシンインヒビター（加熱で失活）等の機能性成分が含まれます。","frequency":"high","is_trend":true,"frequency_reason":"機能性食品で注目"},{"id":"fs_013","subject":"食品学","question":"納豆を作るのに使用される微生物はどれか。","choices":["乳酸菌","納豆菌（Bacillus subtilis var. natto）","麹菌","酵母"],"answer":1,"explanation":"納豆は蒸した大豆に納豆菌（枯草菌の一種）を作用させて作る発酵食品です。納豆菌は耐熱性芽胞を形成し、ビタミンK2、ナットウキナーゼ等を産生します。糸引きはγ-ポリグルタミン酸とフラクタンによるものです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_014","subject":"食品学","question":"豆腐の凝固剤として伝統的に使われてきたものはどれか。","choices":["塩化マグネシウム（にがり）","クエン酸","重曹","寒天"],"answer":0,"explanation":"豆腐の凝固剤は塩化マグネシウム（にがり）が伝統的で、コクのある仕上がりになります。現代では硫酸カルシウム（すまし粉）、グルコノデルタラクトン（充填豆腐用）も使用されます。豆乳のたんぱく質（グリシニン等）が凝固して豆腐になります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_015","subject":"食品学","question":"種実類（ナッツ類）の特徴として正しいものはどれか。","choices":["脂質含量が低い","不飽和脂肪酸が豊富","ビタミンEが少ない","水分が多い"],"answer":1,"explanation":"ナッツ類（アーモンド・くるみ・カシューナッツ等）は脂質が50〜70%を占め、その多くが不飽和脂肪酸（リノール酸・オレイン酸）です。ビタミンE・ミネラル・食物繊維も豊富で、機能性食品として注目されます。くるみはn-3系脂肪酸が豊富で2023年から特定原材料に追加されました。","frequency":"medium","is_trend":true,"frequency_reason":"くるみ追加で注目"},{"id":"fs_016","subject":"食品学","question":"緑黄色野菜の定義として正しいものはどれか。","choices":["色が濃い野菜全般","可食部100g中カロテン600μg以上含む野菜","ビタミンCが豊富な野菜","葉物野菜全般"],"answer":1,"explanation":"緑黄色野菜は厚生労働省の定義で「可食部100g当たりカロテン含量600μg以上の野菜」とされます。ただしトマト・ピーマン等カロテンが600μg未満でも摂取量・頻度が多い野菜は緑黄色野菜に分類されます。にんじん・ほうれん草・ブロッコリー等が代表例です。","frequency":"high","is_trend":false,"frequency_reason":"定義頻出"},{"id":"fs_017","subject":"食品学","question":"野菜のアク（あく）の主な成分として誤っているものはどれか。","choices":["シュウ酸（ほうれん草等）","ホモゲンチジン酸（たけのこ等）","ポリフェノール（ごぼう・れんこん等）","カゼイン（牛乳由来）"],"answer":3,"explanation":"カゼインは乳たんぱく質で野菜のアクではありません。野菜のアクには①シュウ酸（ほうれん草・たけのこ）②ホモゲンチジン酸（たけのこ）③ポリフェノール類（ごぼう・れんこん・なすの褐変原因）④アルカロイド類等があり、適切なアク抜きで美味しく安全になります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_018","subject":"食品学","question":"にんじんに豊富な色素成分はどれか。","choices":["アントシアニン","クロロフィル","β-カロテン","リコピン"],"answer":2,"explanation":"にんじんのオレンジ色はβ-カロテンによるもので、体内でビタミンAに変換されます（プロビタミンA）。アントシアニンは紫色系（ブルーベリー・赤キャベツ）、クロロフィルは緑色（葉物野菜）、リコピンは赤色（トマト・スイカ）の代表色素です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_019","subject":"食品学","question":"トマトに豊富な機能性成分「リコピン」の主な作用はどれか。","choices":["抗酸化作用","抗菌作用","利尿作用","造血作用"],"answer":0,"explanation":"リコピンはカロテノイドの一種で強力な抗酸化作用を持ちます。β-カロテンの約2倍、ビタミンEの約100倍の抗酸化力があるとされ、生活習慣病予防に注目されています。脂溶性で加熱・油との調理で吸収率が高まります。","frequency":"medium","is_trend":true,"frequency_reason":"機能性で注目"},{"id":"fs_020","subject":"食品学","question":"たまねぎの辛味・涙の原因成分はどれか。","choices":["カプサイシン","硫化アリル（プロパンチアール-S-オキシド等）","イソチオシアネート","クルクミン"],"answer":1,"explanation":"たまねぎを切ると硫化アリル類（プロパンチアール-S-オキシド等）が発生し、目を刺激して涙が出ます。これらの含硫成分は加熱で甘みに変わり、抗血栓作用・血糖値改善作用も報告されています。カプサイシンは唐辛子、イソチオシアネートはわさび・大根の辛味成分です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_021","subject":"食品学","question":"キャベツに豊富で胃粘膜保護作用があるとされるビタミン様物質はどれか。","choices":["ビタミンU（キャベジン）","ビタミンP","ビタミンB17","ビタミンL"],"answer":0,"explanation":"ビタミンU（キャベジン、メチルメチオニンスルホニウム）はキャベツから発見されたビタミン様物質で、胃粘膜の修復・保護作用があるとされ、胃腸薬の原料にもなっています。水溶性・熱に弱いため、生食やさっと加熱が効果的です。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fs_022","subject":"食品学","question":"果実の追熟現象に関する記述として正しいものはどれか。","choices":["全ての果実が追熟する","エチレンガスが追熟を促進する","低温で追熟が進む","追熟により糖度は減少する"],"answer":1,"explanation":"バナナ・キウイ・アボカド・西洋なし等の果実はエチレンガスにより追熟が進みます。一方、いちご・ぶどう・かんきつ類は追熟しません（非クライマクテリック型）。エチレン産生果実と一緒に保管すると追熟が促進され、糖度上昇・軟化が起こります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_023","subject":"食品学","question":"いちごやかんきつ類に多く含まれるビタミンはどれか。","choices":["ビタミンA","ビタミンB1","ビタミンC","ビタミンD"],"answer":2,"explanation":"いちご・かんきつ類（みかん・レモン・グレープフルーツ等）・キウイフルーツはビタミンCが豊富です。ビタミンCは抗酸化作用・コラーゲン合成・鉄吸収促進等の機能を持ち、水溶性で熱に弱いため生食が効率的です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_024","subject":"食品学","question":"パイナップル・キウイ・パパイヤに含まれる肉を柔らかくする成分はどれか。","choices":["たんぱく質分解酵素（プロテアーゼ）","脂質分解酵素（リパーゼ）","糖分解酵素（アミラーゼ）","酸化酵素"],"answer":0,"explanation":"パイナップル（ブロメライン）、キウイ（アクチニジン）、パパイヤ（パパイン）、いちじく（フィシン）にはたんぱく質分解酵素が含まれ、肉を柔らかくする効果があります。ゼラチンを固める料理にこれらの生果実を入れると凝固を阻害するため注意が必要です（加熱で酵素は失活）。","frequency":"high","is_trend":false,"frequency_reason":"実技関連で頻出"},{"id":"fs_025","subject":"食品学","question":"きのこに豊富で、日光を浴びると活性化するビタミンはどれか。","choices":["ビタミンA","ビタミンD（エルゴカルシフェロール）","ビタミンE","ビタミンK"],"answer":1,"explanation":"きのこにはエルゴステロールが含まれ、紫外線（日光）を浴びるとビタミンD2（エルゴカルシフェロール）に変換されます。干ししいたけは生しいたけよりビタミンD含量が高く、調理前に日光に当てるとさらに増加します。ビタミンDは骨形成・カルシウム吸収に重要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_026","subject":"食品学","question":"しいたけのうまみ成分として正しいものはどれか。","choices":["イノシン酸","グルタミン酸","グアニル酸","コハク酸"],"answer":2,"explanation":"しいたけのうまみ成分はグアニル酸（核酸系うまみ）で、特に干ししいたけに豊富です。生しいたけよりも乾燥・水戻し過程でグアニル酸が増加します。昆布のグルタミン酸（アミノ酸系）と組み合わせると相乗効果でうまみが大幅に増します。","frequency":"high","is_trend":false,"frequency_reason":"うまみ成分頻出"},{"id":"fs_027","subject":"食品学","question":"昆布のうまみ成分として正しいものはどれか。","choices":["イノシン酸","グルタミン酸","グアニル酸","タウリン"],"answer":1,"explanation":"昆布のうまみ成分はグルタミン酸（アミノ酸系うまみ）で、池田菊苗博士が1908年に発見しました。鰹節のイノシン酸（核酸系）と合わせると相乗効果で約7倍のうまみとなり、これが日本の合わせだしの基本原理です。","frequency":"high","is_trend":false,"frequency_reason":"うまみの基本"},{"id":"fs_028","subject":"食品学","question":"海藻に含まれる粘質多糖類の組み合わせとして正しいものはどれか。","choices":["昆布：アルギン酸、寒天：アガロース、もずく：フコイダン","昆布：ペクチン、寒天：セルロース、もずく：イヌリン","全て同じ多糖類","海藻に多糖類は含まれない"],"answer":0,"explanation":"昆布・わかめ：アルギン酸（褐藻類）、寒天：アガロース（紅藻類のテングサ等）、もずく・めかぶ：フコイダン（褐藻類）が代表的な多糖類です。これらは水溶性食物繊維として整腸作用、コレステロール低下作用等が期待される機能性成分です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_029","subject":"食品学","question":"青魚（サバ・イワシ・サンマ等）に豊富な脂肪酸はどれか。","choices":["オレイン酸","リノール酸","EPA・DHA（n-3系多価不飽和脂肪酸）","飽和脂肪酸"],"answer":2,"explanation":"青魚にはEPA（エイコサペンタエン酸）・DHA（ドコサヘキサエン酸）等のn-3系多価不飽和脂肪酸が豊富です。EPAは血液サラサラ効果、DHAは脳・神経機能維持に有効とされ、生活習慣病予防に注目されています。酸化しやすいため新鮮なうちに摂取するのが望ましいです。","frequency":"high","is_trend":true,"frequency_reason":"機能性で注目"},{"id":"fs_030","subject":"食品学","question":"魚の鮮度低下の指標であるK値の説明として正しいものはどれか。","choices":["ATP分解産物の割合を示す","たんぱく質分解度を示す","脂質酸化度を示す","水分含量を示す"],"answer":0,"explanation":"K値はATP（アデノシン三リン酸）の分解産物（ヒポキサンチン・イノシン）が全体に占める割合を示し、低いほど鮮度が高いことを示します。即殺直後10%以下、刺身として食べられる目安20%以下、60%以上は鮮度低下が著しい状態です。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fs_031","subject":"食品学","question":"魚介類に特徴的に含まれる呈味成分でカルシウム代謝に関与するものはどれか。","choices":["イノシン酸","タウリン","コラーゲン","クレアチン"],"answer":1,"explanation":"タウリンはイカ・タコ・貝類・カキ等の魚介類に豊富な含硫アミノ酸様物質で、肝臓機能改善・心機能維持・コレステロール低下作用等が知られます。栄養ドリンク等の機能性成分としても利用されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_032","subject":"食品学","question":"鰹節のうまみ成分として正しいものはどれか。","choices":["グルタミン酸","イノシン酸","グアニル酸","コハク酸"],"answer":1,"explanation":"鰹節のうまみ成分はイノシン酸（核酸系うまみ）です。鰹節は世界一硬い食品とも言われ、製造過程で熟成・乾燥が進みうまみが凝縮されます。昆布（グルタミン酸）と合わせる「合わせだし」で相乗効果が生まれます。","frequency":"high","is_trend":false,"frequency_reason":"うまみ頻出"},{"id":"fs_033","subject":"食品学","question":"食肉の熟成（エイジング）の効果として誤っているものはどれか。","choices":["たんぱく質の分解によりうまみ成分（アミノ酸・ペプチド）が増加する","保水性が向上し柔らかくなる","色が鮮やかな赤色に保たれる","ATP分解によりイノシン酸が増加する"],"answer":2,"explanation":"熟成中、ミオグロビンが酸化してメトミオグロビンとなり、肉色は徐々に褐色を帯びます。色の鮮やかさは保たれません。一方、たんぱく質分解酵素によりアミノ酸・ペプチドが増加（うまみ向上）、保水性向上（柔らかく）、ATP分解でイノシン酸生成（うまみ増）等のメリットがあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_034","subject":"食品学","question":"食肉の色素タンパク質として正しいものはどれか。","choices":["ヘモグロビン","ミオグロビン","カゼイン","コラーゲン"],"answer":1,"explanation":"食肉の赤色はミオグロビン（筋肉色素タンパク質）によります。ヘモグロビンは血液色素で、放血により大部分は除去されます。ミオグロビンは加熱でメトミオクロモーゲン（褐色）に、亜硝酸塩処理でニトロソミオグロビン（鮮赤色、ハム・ソーセージ）に変化します。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fs_035","subject":"食品学","question":"卵白の主要なたんぱく質はどれか。","choices":["カゼイン","オボアルブミン","グリシニン","ゼイン"],"answer":1,"explanation":"卵白の主要たんぱく質はオボアルブミン（約54%）で、加熱凝固性を持ちます。他にコンアルブミン（鉄結合）、オボムコイド（トリプシン阻害）、リゾチーム（抗菌作用）等が含まれます。卵白は完全たんぱく質でアミノ酸スコア100です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_036","subject":"食品学","question":"卵黄に豊富で乳化性を持つ成分はどれか。","choices":["カゼイン","レシチン（リン脂質）","ペクチン","ゼラチン"],"answer":1,"explanation":"卵黄にはレシチン（フォスファチジルコリン等）が豊富で、強い乳化作用を持ちます。マヨネーズ製造の鍵となる成分で、水と油を均一に混ぜる役割を果たします。レシチンは脳・神経機能にも重要な栄養素です。","frequency":"high","is_trend":false,"frequency_reason":"マヨネーズ等で頻出"},{"id":"fs_037","subject":"食品学","question":"卵の鮮度判定法として正しいものはどれか。","choices":["食塩水（10%）に浮かせて確認","割卵してハウユニット測定","光の透過（透視検査）","以上すべて"],"answer":3,"explanation":"卵の鮮度判定には①比重法（10%食塩水で新鮮卵は沈み、古い卵は浮く）②ハウユニット（濃厚卵白の高さで判定）③透視検査（光を当てて気室・血斑等を確認）④割卵検査（卵黄の盛り上がり等）等が用いられ、目的に応じて使い分けます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_038","subject":"食品学","question":"牛乳の主要たんぱく質「カゼイン」の特徴として正しいものはどれか。","choices":["熱で凝固する","酸（pH4.6付近）で凝固する","乳清に多く含まれる","分子量が小さい"],"answer":1,"explanation":"カゼインは牛乳たんぱく質の約80%を占め、酸（pH4.6付近）や酵素（レンネット）で凝固する性質があります。これがチーズ製造の原理です。一方、乳清たんぱく質（β-ラクトグロブリン等）は熱で凝固し、湯葉のような薄い膜を作ります。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fs_039","subject":"食品学","question":"ヨーグルト製造に使用される代表的な微生物の組み合わせはどれか。","choices":["ブルガリア菌とサーモフィラス菌（乳酸菌）","麹菌と酵母","納豆菌のみ","酢酸菌"],"answer":0,"explanation":"ヨーグルトはブルガリア菌（Lactobacillus delbrueckii subsp. bulgaricus）とサーモフィラス菌（Streptococcus thermophilus）の共生発酵で作られます。乳酸菌が乳糖を分解して乳酸を産生し、pH低下によりカゼインが凝固して独特の食感が生まれます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_040","subject":"食品学","question":"バターの分類として正しいものはどれか。","choices":["発酵バターと非発酵バター、有塩バターと無塩バター","植物性バターと動物性バター","低脂肪バターと高脂肪バター","以上すべて該当しない"],"answer":0,"explanation":"バターは①発酵の有無（発酵バター・非発酵バター）②食塩添加の有無（有塩バター・無塩バター）で分類されます。日本では非発酵・有塩が主流、ヨーロッパでは発酵バターが主流です。「植物性バター」はマーガリンに近い概念で、本来のバターは乳脂肪のみです。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fs_041","subject":"食品学","question":"チーズの分類として正しいものはどれか。","choices":["ナチュラルチーズとプロセスチーズに大別される","全て長期熟成が必要","加熱処理されたものはチーズではない","日本独自の分類体系である"],"answer":0,"explanation":"チーズは①ナチュラルチーズ（乳を凝固・脱水・熟成、フレッシュ・白カビ・青カビ・ハード・セミハード等）と②プロセスチーズ（ナチュラルチーズを加熱溶融して再成形）に大別されます。日本ではプロセスチーズが普及し、長期保存が可能です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_042","subject":"食品学","question":"植物油と動物油の特徴の違いとして正しいものはどれか。","choices":["植物油は飽和脂肪酸が多い","動物油は不飽和脂肪酸が多く常温で液体","植物油は不飽和脂肪酸が多く常温で液体（やしを除く）","両者に化学的違いはない"],"answer":2,"explanation":"植物油（大豆油・菜種油・オリーブ油等）は不飽和脂肪酸が多く常温で液体です。動物油（バター・ラード・ヘット）は飽和脂肪酸が多く常温で固体です。例外として、やし油・パーム油は植物性ですが飽和脂肪酸が多く常温で固体です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_043","subject":"食品学","question":"トランス脂肪酸に関する記述として正しいものはどれか。","choices":["天然には全く存在しない","水素添加した加工油脂（マーガリン等）に含まれることがある","人体に必須の栄養素である","日本では使用が全面禁止されている"],"answer":1,"explanation":"トランス脂肪酸は植物油の水素添加（硬化油製造）過程で生成し、マーガリン・ショートニング・加工食品等に含まれることがあります。LDLコレステロール上昇・心疾患リスク増加が指摘され、欧米では規制が進んでいます。日本では現在規制はないものの、業界が低減に取り組んでいます。","frequency":"medium","is_trend":true,"frequency_reason":"健康課題で注目"},{"id":"fs_044","subject":"食品学","question":"油脂の酸化に関する記述として誤っているものはどれか。","choices":["不飽和脂肪酸ほど酸化されやすい","加熱・光・酸素・金属で酸化が促進される","酸化油脂の摂取は健康に問題ない","過酸化物価（POV）が酸化指標になる"],"answer":2,"explanation":"酸化油脂の摂取は下痢・嘔吐・動脈硬化リスク増加等の健康問題を起こします。油脂は不飽和度が高いほど酸化されやすく、加熱・光・酸素・金属（鉄・銅）が促進因子です。酸化指標として過酸化物価（POV）、酸価（AV）、カルボニル価（CV）等が用いられます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_045","subject":"食品学","question":"食品の保存法のうち、栄養価の損失が最も少ないものはどれか。","choices":["塩蔵法","糖蔵法","冷凍法","乾燥法"],"answer":2,"explanation":"冷凍法（マイナス18℃以下）は栄養成分の損失が最も少ない保存法とされます。乾燥・塩蔵・糖蔵は保存性が高い反面、ビタミン破壊や食感変化があります。急速冷凍では細胞破壊も少なく、解凍後も品質が保たれます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_046","subject":"食品学","question":"発酵食品と関与微生物の組み合わせとして誤っているものはどれか。","choices":["しょうゆ・みそ ─ 麹菌","ヨーグルト ─ 乳酸菌","清酒 ─ 麹菌・酵母","納豆 ─ 乳酸菌"],"answer":3,"explanation":"納豆は納豆菌（Bacillus subtilis var. natto、枯草菌の一種）による発酵で、乳酸菌は使用しません。しょうゆ・みそ・酒類は麹菌（Aspergillus oryzae）が中心、ヨーグルトは乳酸菌、酢は酢酸菌、パンは酵母（イースト）が主役です。","frequency":"high","is_trend":false,"frequency_reason":"発酵食品頻出"},{"id":"fs_047","subject":"食品学","question":"特定保健用食品（トクホ）に関する記述として正しいものはどれか。","choices":["国の許可を受けた食品である","医薬品である","効能を表示できない","栄養機能食品と同じである"],"answer":0,"explanation":"特定保健用食品（トクホ）は健康増進法に基づき、特定の保健の目的で摂取する食品として国（消費者庁）の個別審査・許可を受けたもので、保健の用途を表示できます。栄養機能食品（規格基準型）、機能性表示食品（届出制）と並ぶ保健機能食品の一つです。","frequency":"high","is_trend":true,"frequency_reason":"機能性食品で頻出"},{"id":"fs_048","subject":"食品学","question":"機能性表示食品制度（2015年開始）に関する記述として正しいものはどれか。","choices":["国の個別審査が必要である","事業者の責任で機能性を表示する届出制である","医薬品的効能を表示できる","加工食品のみ対象である"],"answer":1,"explanation":"機能性表示食品制度（2015年4月開始）は、事業者の責任で科学的根拠に基づく機能性を消費者庁に届け出る制度です。トクホと違い国の個別審査はありません。生鮮食品も対象で、機能性関与成分の含量・科学的根拠等の届出資料が公開されます。","frequency":"medium","is_trend":true,"frequency_reason":"比較的新しい制度"},{"id":"fs_049","subject":"食品学","question":"食品成分表における「灰分（かいぶん）」が示すものはどれか。","choices":["食物繊維量","無機質（ミネラル）の総量","たんぱく質量","炭水化物量"],"answer":1,"explanation":"灰分は食品を高温（550℃前後）で焼却した後に残る無機物（ミネラル）の総量を示します。カルシウム・鉄・ナトリウム・カリウム等のミネラル含量の概算指標として用いられます。食品成分表では水分・たんぱく質・脂質・灰分を測定し、残りを炭水化物として算出します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_050","subject":"食品学","question":"食品中の水分の状態として「自由水」と「結合水」の説明として正しいものはどれか。","choices":["自由水は微生物が利用でき、結合水は利用しにくい","結合水は微生物が利用できる","両者に違いはない","結合水は加熱で容易に蒸発する"],"answer":0,"explanation":"食品中の水分は自由水（食品成分と結合せず微生物・酵素が利用可能）と結合水（食品成分と強く結合し利用不可）に分けられます。微生物の増殖は自由水の量（水分活性Aw）に依存します。乾燥・塩蔵・糖蔵で自由水が減ると保存性が向上します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_001","subject":"栄養学","question":"三大栄養素のうち、1g当たりのエネルギー量が最も多いものはどれか。","choices":["たんぱく質","脂質","炭水化物","アルコール"],"answer":1,"explanation":"1g当たりのエネルギー量はたんぱく質4kcal、脂質9kcal、炭水化物4kcal、アルコール7kcalです（アトウォーターの係数）。脂質は最もエネルギー効率の高い栄養素で、少量で多くのエネルギーを供給します。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"nu_002","subject":"栄養学","question":"五大栄養素の組み合わせとして正しいものはどれか。","choices":["たんぱく質・脂質・炭水化物・水・食物繊維","たんぱく質・脂質・炭水化物・ビタミン・ミネラル","糖質・脂質・水・ビタミン・ミネラル","たんぱく質・糖質・食物繊維・ビタミン・水"],"answer":1,"explanation":"五大栄養素はたんぱく質・脂質・炭水化物・ビタミン・ミネラル（無機質）です。三大栄養素（たんぱく質・脂質・炭水化物）にビタミンとミネラルを加えたもので、生命維持と健康に必要な基本栄養素です。","frequency":"high","is_trend":false,"frequency_reason":"基本知識"},{"id":"nu_003","subject":"栄養学","question":"消化と吸収に関する記述として正しいものはどれか。","choices":["炭水化物の消化は胃から始まる","たんぱく質は小腸で初めて消化される","脂質の消化には胆汁が関与する","ビタミンは消化を必要としない"],"answer":2,"explanation":"脂質の消化には肝臓で生成される胆汁（胆汁酸）が必要で、脂質を乳化して消化酵素（リパーゼ）の働きを助けます。炭水化物消化は唾液（プチアリン）から、たんぱく質は胃（ペプシン）から始まり、ビタミンも一部は消化過程を経て吸収されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_004","subject":"栄養学","question":"栄養素の主な吸収部位として正しいものはどれか。","choices":["胃で大部分が吸収される","小腸で主に吸収される","大腸で全て吸収される","口腔内で完全吸収される"],"answer":1,"explanation":"栄養素の吸収は主に小腸（特に空腸）で行われます。小腸内壁の絨毛・微絨毛により表面積が広がり、効率的な吸収が可能です。胃ではアルコールや一部の薬物が吸収され、大腸では水分・電解質の吸収が中心です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_005","subject":"栄養学","question":"基礎代謝量（BMR）に関する記述として正しいものはどれか。","choices":["年齢とともに増加する","男性より女性の方が高い","安静時の最低エネルギー消費量である","運動量により大きく変動する"],"answer":2,"explanation":"基礎代謝量は生命維持に最低限必要なエネルギー消費量（覚醒・空腹・安静時）です。一般に男性が女性より高く（筋肉量が多い）、加齢とともに低下します（筋肉量減少）。生活活動による変動は基礎代謝とは別に計算します。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_006","subject":"栄養学","question":"炭水化物の分類として正しいものはどれか。","choices":["単糖類・二糖類・多糖類","飽和糖と不飽和糖","植物性糖と動物性糖","水溶性糖と脂溶性糖"],"answer":0,"explanation":"炭水化物は構成糖の数で①単糖類（ブドウ糖・果糖等）②少糖類（二糖類：ショ糖・乳糖等、オリゴ糖）③多糖類（でんぷん・グリコーゲン・食物繊維）に分類されます。栄養学的には消化吸収される糖質と、消化されない食物繊維に大別されます。","frequency":"high","is_trend":false,"frequency_reason":"基本"},{"id":"nu_007","subject":"栄養学","question":"血糖の調節に関与するホルモンとして正しいものはどれか。","choices":["インスリンとグルカゴン","アドレナリンと甲状腺ホルモン","エストロゲンとプロゲステロン","メラトニンとセロトニン"],"answer":0,"explanation":"血糖値の調節には膵臓のランゲルハンス島から分泌される①インスリン（β細胞、血糖を下げる）と②グルカゴン（α細胞、血糖を上げる）が中心的役割を果たします。糖尿病はインスリンの分泌不全または作用不全によって起こります。","frequency":"high","is_trend":true,"frequency_reason":"糖尿病関連で頻出"},{"id":"nu_008","subject":"栄養学","question":"食物繊維の生理作用として誤っているものはどれか。","choices":["便通の改善","血糖値上昇の抑制","血中コレステロール低下","エネルギー源として働く"],"answer":3,"explanation":"食物繊維は人の消化酵素で分解されないためエネルギー源とはなりません（一部は腸内細菌により短鎖脂肪酸に変換され微量のエネルギー源となる）。便通改善・血糖値上昇抑制・コレステロール低下・腸内環境改善等の機能があります。","frequency":"high","is_trend":true,"frequency_reason":"機能性で注目"},{"id":"nu_009","subject":"栄養学","question":"食物繊維の分類として正しいものはどれか。","choices":["動物性繊維と植物性繊維","水溶性食物繊維と不溶性食物繊維","可食性繊維と非可食性繊維","糖質性繊維と脂質性繊維"],"answer":1,"explanation":"食物繊維は水溶性食物繊維（ペクチン・グルコマンナン・アルギン酸等、果物・海藻に多い）と不溶性食物繊維（セルロース・ヘミセルロース・リグニン等、穀類・豆類に多い）に大別されます。両者とも整腸作用がありますが、機能は異なります。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_010","subject":"栄養学","question":"糖質の最終分解産物として吸収される形態はどれか。","choices":["でんぷん","ショ糖","ブドウ糖（グルコース）","グリコーゲン"],"answer":2,"explanation":"糖質は最終的に単糖類（ブドウ糖・果糖・ガラクトース）に分解されて小腸から吸収されます。最も多いのがブドウ糖（グルコース）で、血糖の主成分となり、全身の組織でエネルギー源として利用されます。脳はブドウ糖を主要エネルギー源とします。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_011","subject":"栄養学","question":"必須脂肪酸として正しいものはどれか。","choices":["オレイン酸とパルミチン酸","リノール酸とα-リノレン酸","ステアリン酸とミリスチン酸","酢酸と酪酸"],"answer":1,"explanation":"必須脂肪酸は体内で合成できず食事から摂取する必要がある脂肪酸で、リノール酸（n-6系）とα-リノレン酸（n-3系）が代表です。アラキドン酸も準必須脂肪酸とされます。これらから様々な生理活性物質（プロスタグランジン等）が合成されます。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_012","subject":"栄養学","question":"n-3系脂肪酸の代表として正しいものはどれか。","choices":["リノール酸","α-リノレン酸・EPA・DHA","オレイン酸","パルミチン酸"],"answer":1,"explanation":"n-3系（オメガ3）脂肪酸の代表はα-リノレン酸（植物油）、EPA・DHA（魚油）です。血液サラサラ効果・抗炎症作用・脳機能維持等の機能があります。n-6系（リノール酸等）との摂取バランスが重要で、現代食ではn-3系不足が指摘されます。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病予防"},{"id":"nu_013","subject":"栄養学","question":"コレステロールに関する記述として正しいものはどれか。","choices":["全て体内合成され食事から摂取する必要はない","細胞膜の構成成分・ステロイドホルモンの原料となる","植物油に多く含まれる","エネルギー源として利用される"],"answer":1,"explanation":"コレステロールは細胞膜の構成成分、ステロイドホルモン（性ホルモン・副腎皮質ホルモン）・ビタミンD・胆汁酸の原料となる重要な脂質です。約7〜8割は肝臓で合成され、約2〜3割を食事から摂取します。動物性食品に含まれ植物にはほとんどありません。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_014","subject":"栄養学","question":"飽和脂肪酸と不飽和脂肪酸に関する記述として正しいものはどれか。","choices":["飽和脂肪酸は植物油に多い","不飽和脂肪酸は常温で固体である","飽和脂肪酸の過剰摂取は動脈硬化のリスクを高める","両者の生理作用に違いはない"],"answer":2,"explanation":"飽和脂肪酸（動物性脂肪に多く、常温で固体）の過剰摂取はLDLコレステロール上昇・動脈硬化のリスクを高めます。不飽和脂肪酸（植物油・魚油に多く、常温で液体）は適量摂取で生活習慣病予防に有効です。バランスのよい摂取が重要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_015","subject":"栄養学","question":"脂質の最終消化産物として正しいものはどれか。","choices":["アミノ酸","脂肪酸とモノグリセリド","ブドウ糖","グリセロール"],"answer":1,"explanation":"脂質は胆汁で乳化された後、リパーゼにより脂肪酸とモノグリセリドに分解されて吸収されます。吸収後、小腸粘膜で再度トリグリセリドに合成され、リンパ管を経由して全身に運ばれます（カイロミクロン）。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_016","subject":"栄養学","question":"必須アミノ酸の数として正しいものはどれか。","choices":["7種類","9種類（成人）","11種類","15種類"],"answer":1,"explanation":"成人の必須アミノ酸は9種類（ヒスチジン・イソロイシン・ロイシン・リシン・メチオニン・フェニルアラニン・トレオニン・トリプトファン・バリン）です。乳幼児ではこれにアルギニンが加わるという考え方もあります。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_017","subject":"栄養学","question":"アミノ酸スコアの説明として正しいものはどれか。","choices":["食品の総アミノ酸量を示す","たんぱく質の質を評価する指標で、必須アミノ酸の充足度を示す","たんぱく質の量を示す","たんぱく質の消化率を示す"],"answer":1,"explanation":"アミノ酸スコアは食品中のたんぱく質の質を評価する指標で、必須アミノ酸の必要量に対する充足度を100点満点で示します。最も不足する必須アミノ酸（第一制限アミノ酸）で決定され、卵・肉・魚・大豆等は100点満点に近い良質たんぱく質です。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_018","subject":"栄養学","question":"たんぱく質の最終消化産物として正しいものはどれか。","choices":["ブドウ糖","アミノ酸","脂肪酸","グリセロール"],"answer":1,"explanation":"たんぱく質は胃のペプシン、膵臓のトリプシン・キモトリプシン、小腸のペプチダーゼ等により段階的に分解され、最終的にアミノ酸として小腸から吸収されます。一部はジペプチド・トリペプチドの形で吸収されます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_019","subject":"栄養学","question":"たんぱく質の補足効果に関する記述として正しいものはどれか。","choices":["異なる食品を組み合わせるとアミノ酸スコアが向上する","単一の食品で十分なたんぱく質を摂取できる","植物性たんぱく質のみで十分である","加熱により補足効果は消える"],"answer":0,"explanation":"たんぱく質の補足効果とは、不足するアミノ酸が異なる複数の食品を組み合わせることで、全体としてのアミノ酸バランスが向上することです。例：米（リジン不足）と大豆（リジン豊富）の組み合わせ。日本の伝統食「ご飯と味噌汁・納豆」は補足効果の好例です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_020","subject":"栄養学","question":"たんぱく質の主な働きとして誤っているものはどれか。","choices":["筋肉・臓器・皮膚等の構成","酵素・ホルモンの構成","エネルギー源（4kcal/g）","カルシウムの吸収阻害"],"answer":3,"explanation":"たんぱく質はカルシウム吸収を阻害しません（むしろ促進する場合もあります）。たんぱく質の主な働きは①身体構成（筋肉・臓器・皮膚・毛髪等）②機能性物質（酵素・ホルモン・抗体）③エネルギー源（4kcal/g、糖質・脂質不足時）④体液の浸透圧調節等です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_021","subject":"栄養学","question":"脂溶性ビタミンの組み合わせとして正しいものはどれか。","choices":["ビタミンA・D・E・K","ビタミンB1・B2・B6・B12","ビタミンC・葉酸・ナイアシン","ビタミンA・C・D・E"],"answer":0,"explanation":"脂溶性ビタミンはA・D・E・Kの4種類で、油と一緒に摂取すると吸収率が向上します。体内に蓄積されるため過剰症に注意が必要です。水溶性ビタミンはB群（B1・B2・B6・B12・ナイアシン・葉酸・パントテン酸・ビオチン）とCで、過剰分は尿中排泄されます。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"nu_022","subject":"栄養学","question":"ビタミンA欠乏症として正しいものはどれか。","choices":["脚気","壊血病","夜盲症","骨軟化症"],"answer":2,"explanation":"ビタミンA欠乏症は夜盲症（暗いところで物が見えにくい）、皮膚乾燥、感染症抵抗力低下等を起こします。脚気はビタミンB1欠乏、壊血病はビタミンC欠乏、骨軟化症はビタミンD欠乏（成人）の症状です。","frequency":"high","is_trend":false,"frequency_reason":"欠乏症頻出"},{"id":"nu_023","subject":"栄養学","question":"ビタミンB1の主な機能として正しいものはどれか。","choices":["糖質代謝の補酵素","コラーゲン合成","カルシウム吸収","血液凝固"],"answer":0,"explanation":"ビタミンB1（チアミン）は糖質代謝（解糖系・TCAサイクル）の補酵素として働きます。欠乏すると脚気（神経症状・心不全）、ウェルニッケ脳症を起こします。豚肉・玄米・豆類・うなぎ等に豊富で、白米中心の食生活では不足しやすいです。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_024","subject":"栄養学","question":"ビタミンCの主な機能として誤っているものはどれか。","choices":["コラーゲン合成","抗酸化作用","鉄の吸収促進","血液凝固"],"answer":3,"explanation":"血液凝固に関与するのはビタミンKです。ビタミンCの主な機能は①コラーゲン合成（結合組織・血管壁）②抗酸化作用③鉄（非ヘム鉄）の吸収促進④免疫機能の維持等です。欠乏すると壊血病（歯肉出血・貧血）を起こします。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_025","subject":"栄養学","question":"ビタミンD欠乏症として正しい組み合わせはどれか。","choices":["くる病（小児）と骨軟化症（成人）","脚気と壊血病","夜盲症と口角炎","貧血と神経症状"],"answer":0,"explanation":"ビタミンD欠乏症は小児ではくる病（骨の変形）、成人では骨軟化症（骨の脱灰・軟化）を起こします。ビタミンDはカルシウム吸収・骨代謝に必須で、日光紫外線により皮膚で合成されます。きのこ類・魚類に豊富です。","frequency":"high","is_trend":false,"frequency_reason":"欠乏症頻出"},{"id":"nu_026","subject":"栄養学","question":"ビタミンB群のうち、葉酸の重要な機能はどれか。","choices":["赤血球の形成と胎児の神経管形成","視覚機能の維持","カルシウム吸収","血液凝固"],"answer":0,"explanation":"葉酸はビタミンB群の一種で、DNA合成・赤血球形成（巨赤芽球性貧血予防）・胎児の神経管形成（妊娠初期）に重要です。妊娠を計画する女性・妊婦は十分な摂取（1日400μg以上）が推奨されます。緑葉野菜・レバー・豆類に豊富です。","frequency":"medium","is_trend":true,"frequency_reason":"妊婦栄養で注目"},{"id":"nu_027","subject":"栄養学","question":"プロビタミンA（ビタミンA前駆体）として正しいものはどれか。","choices":["β-カロテン","リコピン","アントシアニン","クロロフィル"],"answer":0,"explanation":"β-カロテンは緑黄色野菜（にんじん・ほうれん草・かぼちゃ等）に含まれるカロテノイドで、体内で必要に応じてビタミンAに変換されます（プロビタミンA）。過剰症のリスクが少なく安全に摂取できる利点があります。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_028","subject":"栄養学","question":"水溶性ビタミンの特徴として正しいものはどれか。","choices":["過剰摂取しても問題ない","体内に蓄積されにくく毎日の摂取が必要","加熱に強く調理損失が少ない","油に溶けやすい"],"answer":1,"explanation":"水溶性ビタミン（B群・C）は体内に蓄積されにくく尿中に排泄されるため、毎日の摂取が必要です。過剰分は排泄されるため過剰症は起きにくいですが、ビタミンB6等は大量摂取で副作用の報告もあります。加熱・水洗いで損失しやすい性質があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_029","subject":"栄養学","question":"カルシウムの主な機能として誤っているものはどれか。","choices":["骨・歯の構成","筋肉の収縮","神経伝達","酸素の運搬"],"answer":3,"explanation":"酸素運搬は鉄（ヘモグロビンの構成成分）の役割です。カルシウムの機能は①骨・歯の主要構成成分②筋肉の収縮③神経伝達④血液凝固⑤酵素活性化等です。日本人に不足しやすい栄養素で、乳製品・小魚・緑黄色野菜・大豆製品に豊富です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_030","subject":"栄養学","question":"カルシウムの吸収を促進する栄養素として正しいものはどれか。","choices":["ビタミンD","食物繊維","フィチン酸","シュウ酸"],"answer":0,"explanation":"カルシウムの吸収はビタミンDによって促進されます。逆に食物繊維・フィチン酸（穀類）・シュウ酸（ほうれん草等）・タンニン等は吸収を阻害します。ビタミンDは日光紫外線により皮膚で合成されるため、適度な日光浴も重要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_031","subject":"栄養学","question":"鉄の種類と吸収率に関する記述として正しいものはどれか。","choices":["ヘム鉄（動物性）の方が非ヘム鉄（植物性）より吸収率が高い","非ヘム鉄の方が吸収率が高い","両者の吸収率は同じ","植物性鉄が最も吸収しやすい"],"answer":0,"explanation":"ヘム鉄（肉・魚・レバー等動物性）は吸収率15〜25%、非ヘム鉄（野菜・豆・穀類等植物性）は2〜5%とヘム鉄の方が吸収率が高いです。非ヘム鉄はビタミンCや動物性たんぱく質と一緒に摂ると吸収率が向上します。","frequency":"high","is_trend":false,"frequency_reason":"貧血対策で頻出"},{"id":"nu_032","subject":"栄養学","question":"鉄欠乏性貧血の症状として誤っているものはどれか。","choices":["めまい・息切れ","疲労感","夜盲症","顔色の悪化"],"answer":2,"explanation":"夜盲症はビタミンA欠乏症の症状です。鉄欠乏性貧血の症状はめまい・息切れ・疲労感・顔色の悪化（顔面蒼白）・動悸・スプーン爪・異食症等です。月経のある女性・妊婦・成長期の子供で起こりやすく、適切な鉄分摂取が必要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_033","subject":"栄養学","question":"ナトリウムの過剰摂取と最も関連が深い疾患はどれか。","choices":["糖尿病","高血圧","骨粗鬆症","貧血"],"answer":1,"explanation":"ナトリウム（食塩）の過剰摂取は高血圧・脳卒中・心疾患・胃がん等のリスクを高めます。日本人の食塩摂取量は世界的に多く、減塩が公衆衛生上の重要課題です。日本人の食事摂取基準（2020年版）では男性7.5g/日未満、女性6.5g/日未満を目標としています。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病で頻出"},{"id":"nu_034","subject":"栄養学","question":"カリウムの主な機能として正しいものはどれか。","choices":["酸素の運搬","ナトリウムとともに体液の浸透圧調節","コラーゲン合成","視覚機能維持"],"answer":1,"explanation":"カリウムはナトリウムと協調して細胞内外の浸透圧調節・水分バランス・神経伝達・筋肉収縮等に関わります。ナトリウム過剰時の排泄を促進する作用があり、高血圧予防に重要です。野菜・果物・豆類・芋類等に豊富です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_035","subject":"栄養学","question":"ヨウ素を含む臓器・ホルモンとして正しいものはどれか。","choices":["副腎・コルチゾール","膵臓・インスリン","甲状腺・甲状腺ホルモン","卵巣・エストロゲン"],"answer":2,"explanation":"ヨウ素は甲状腺ホルモン（チロキシン・トリヨードチロニン）の構成成分です。甲状腺ホルモンは基礎代謝・成長・発達に重要で、欠乏すると甲状腺機能低下症・成長遅延を起こします。日本では海藻類（昆布・わかめ・のり）の摂取により欠乏は稀です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_036","subject":"栄養学","question":"体内の水分の働きとして誤っているものはどれか。","choices":["体温調節","栄養素・老廃物の運搬","エネルギー源として利用される","化学反応の場"],"answer":2,"explanation":"水分はエネルギー源として利用されません（0kcal/g）。水分の働きは①栄養素・老廃物・酸素の運搬②体温調節（発汗による熱放散）③化学反応の場（細胞内反応）④体液・関節液等の構成成分⑤消化吸収の媒体等です。成人体重の約60%を占めます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_037","subject":"栄養学","question":"1日に必要な水分摂取量の目安として正しいものはどれか（成人）。","choices":["約500mL","約1〜1.5L（飲料水として）","約3〜4L","約5L以上"],"answer":1,"explanation":"成人の1日水分必要量は約2〜2.5Lで、そのうち食事から約1L、飲料水として1〜1.5L程度の摂取が目安です。代謝水（栄養素分解時に生成）が約300mL加わります。発汗・運動時は更に増加し、高齢者は脱水に注意が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_038","subject":"栄養学","question":"エネルギー代謝に関する記述として正しいものはどれか。","choices":["全エネルギー消費量＝基礎代謝量のみ","身体活動量は加味されない","基礎代謝量＋身体活動量＋食事誘発性熱産生（DIT）","睡眠中はエネルギー消費がない"],"answer":2,"explanation":"1日の総エネルギー消費量は①基礎代謝量（約60〜70%）②身体活動量（約20〜30%）③食事誘発性熱産生DIT（約10%）の合計です。DITは食事摂取後の代謝亢進で、たんぱく質摂取で最も大きくなります。睡眠中も基礎代謝によりエネルギー消費は続きます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_039","subject":"栄養学","question":"BMI（体格指数）の計算式として正しいものはどれか。","choices":["体重(kg)÷身長(m)","体重(kg)÷身長(m)²","体重(kg)×身長(m)","身長(cm)÷体重(kg)"],"answer":1,"explanation":"BMI = 体重(kg) ÷ 身長(m)² で計算します。日本肥満学会基準では18.5未満が低体重、18.5〜25未満が普通体重、25以上が肥満（1〜4度に分類）。22前後が最も病気にかかりにくい標準体重とされます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_040","subject":"栄養学","question":"ライフステージ別の栄養特性として誤っているものはどれか。","choices":["乳幼児期：成長のためエネルギー・たんぱく質が体重当たり多く必要","妊娠期：葉酸・鉄分の需要増加","高齢期：低栄養・サルコペニア予防のためたんぱく質摂取が重要","成人期：エネルギーの過剰摂取は問題ない"],"answer":3,"explanation":"成人期はエネルギー過剰摂取が肥満・生活習慣病（糖尿病・脂質異常症・高血圧）のリスクを高めるため、適正摂取が重要です。各ライフステージで栄養必要量は異なり、特に妊娠期・成長期・高齢期は注意が必要です。","frequency":"high","is_trend":true,"frequency_reason":"高齢化で重要"},{"id":"nu_041","subject":"栄養学","question":"日本人の食事摂取基準に関する記述として正しいものはどれか。","choices":["10年ごとに改定される","5年ごとに改定される","改定はされない","内閣府が策定する"],"answer":1,"explanation":"日本人の食事摂取基準は厚生労働省が5年ごとに改定し、現在は2020年版（2020〜2024年使用）が最新です。2025年版が予定されています。エネルギー・栄養素の摂取量基準（推定平均必要量・推奨量・目安量・耐容上限量・目標量）を示します。","frequency":"high","is_trend":true,"frequency_reason":"5年ごと改定"},{"id":"nu_042","subject":"栄養学","question":"食事摂取基準で示される指標として誤っているものはどれか。","choices":["推定平均必要量（EAR）","推奨量（RDA）","目安量（AI）","禁止量"],"answer":3,"explanation":"食事摂取基準の指標は①推定平均必要量EAR②推奨量RDA③目安量AI④耐容上限量UL⑤目標量DG（生活習慣病予防）の5つです。「禁止量」という指標はありません。これらは性別・年齢・身体活動レベル別に設定されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_043","subject":"栄養学","question":"PFCバランスの理想とされる比率として正しいものはどれか（成人）。","choices":["P:F:C = 50:30:20","P:F:C = 13〜20:20〜30:50〜65","P:F:C = 30:40:30","P:F:C = 10:10:80"],"answer":1,"explanation":"食事摂取基準2020年版のエネルギー産生栄養素バランス（PFCバランス）は、たんぱく質13〜20%、脂質20〜30%、炭水化物50〜65%（％エネルギー）が目標とされます。バランスのとれた食事の指標として重要です。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_044","subject":"栄養学","question":"生活習慣病の代表的なものとして誤っているものはどれか。","choices":["糖尿病","高血圧症","感染症","脂質異常症"],"answer":2,"explanation":"感染症は病原体によるもので生活習慣病ではありません。生活習慣病は食習慣・運動・喫煙・飲酒・ストレス等の生活習慣が原因となる疾患群で、糖尿病・高血圧症・脂質異常症・肥満・がん・脳卒中・心疾患等が含まれます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_045","subject":"栄養学","question":"メタボリックシンドロームの診断基準として、必須項目はどれか。","choices":["BMI25以上","内臓脂肪型肥満（腹囲：男性85cm以上、女性90cm以上）","血圧130/85mmHg以上","空腹時血糖110mg/dL以上"],"answer":1,"explanation":"メタボリックシンドロームの診断基準では、内臓脂肪型肥満（腹囲：男性85cm以上、女性90cm以上）が必須項目で、これに加えて①脂質異常②高血圧③高血糖のうち2項目以上該当で診断されます。動脈硬化性疾患のリスクが高まるため早期介入が重要です。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病"},{"id":"nu_046","subject":"栄養学","question":"糖尿病の食事療法で重要な点として誤っているものはどれか。","choices":["総エネルギー量の管理","炭水化物・脂質・たんぱく質のバランス","食物繊維の積極摂取","糖質を完全に除去する"],"answer":3,"explanation":"糖尿病の食事療法で糖質を完全除去する必要はありません（極端な糖質制限は脳のエネルギー不足等を招く）。重要なのは①総エネルギー適正化②栄養バランス③規則正しい食事④食物繊維摂取（血糖値上昇抑制）⑤適度な運動の併用です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_047","subject":"栄養学","question":"高血圧症の食事療法における重要点として正しいものはどれか。","choices":["食塩摂取量を1日6g未満に制限","水分摂取を制限する","たんぱく質を制限する","糖質を増やす"],"answer":0,"explanation":"高血圧症の食事療法では食塩摂取量を1日6g未満（理想は3g）に制限することが最重要です。あわせてカリウム摂取（野菜・果物）、適正体重の維持、適度な運動、節酒・禁煙が推奨されます。DASH食（高血圧予防食）も有効です。","frequency":"high","is_trend":true,"frequency_reason":"減塩重要"},{"id":"nu_048","subject":"栄養学","question":"脂質異常症（高脂血症）の食事療法として誤っているものはどれか。","choices":["飽和脂肪酸の摂取を控える","コレステロールの摂取を適正化する","食物繊維を積極的に摂る","糖分を多く摂取する"],"answer":3,"explanation":"糖分の多量摂取は中性脂肪を増加させ、脂質異常症を悪化させます。脂質異常症の食事療法は①飽和脂肪酸（動物性脂肪）の制限②コレステロール適正化③不飽和脂肪酸（魚油・植物油）の適度な摂取④食物繊維の摂取⑤糖分・アルコールの控えめが基本です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_049","subject":"栄養学","question":"高齢者の低栄養（フレイル）予防として最も重要なものはどれか。","choices":["食事量の制限","十分なたんぱく質摂取と適度な運動","水分制限","糖質制限"],"answer":1,"explanation":"高齢者の低栄養・フレイル（虚弱）・サルコペニア（筋肉減少）予防には、十分なたんぱく質摂取（1.0〜1.2g/kg体重/日）と適度な運動の併用が最も重要です。高齢者は若年者より多くのたんぱく質が必要とされます。バランスのよい食事と社会参加も重要です。","frequency":"high","is_trend":true,"frequency_reason":"超高齢社会の課題"},{"id":"nu_050","subject":"栄養学","question":"食生活指針（厚生労働省・農林水産省・文部科学省）の項目として誤っているものはどれか。","choices":["食事を楽しみましょう","野菜・果物・牛乳・乳製品・豆類・魚なども組み合わせて","食塩は多めに","食料資源を大切に、無駄や廃棄の少ない食生活を"],"answer":2,"explanation":"食生活指針には「食塩は控えめに、脂肪は質と量を考えて」とあり、食塩を多めにとは指導していません。食生活指針10項目は2000年策定（2016年改定）で、食事の楽しみ・主食/主菜/副菜のバランス・適正体重・野菜摂取・減塩・食文化・食料資源の大切さ等を示しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_001","subject":"公衆衛生学","question":"WHO（世界保健機関）による健康の定義として正しいものはどれか。","choices":["病気でない状態","身体的・精神的・社会的に完全に良好な状態","長寿であること","体力があること"],"answer":1,"explanation":"WHO憲章前文（1948年）の健康の定義は「健康とは、病気でないとか、弱っていないということではなく、肉体的・精神的・社会的に完全に良好な状態（well-being）にあること」です。1998年には「霊的（spiritual）」「動的（dynamic）」を加える改正案が提案されましたが採択には至っていません。","frequency":"high","is_trend":false,"frequency_reason":"公衆衛生の基本"},{"id":"ph_002","subject":"公衆衛生学","question":"公衆衛生の3つの予防として誤っているものはどれか。","choices":["一次予防（健康増進・疾病予防）","二次予防（早期発見・早期治療）","三次予防（リハビリテーション・再発防止）","四次予防（延命治療）"],"answer":3,"explanation":"公衆衛生の予防は3段階で①一次予防：健康増進・疾病予防（生活習慣改善・予防接種等）②二次予防：早期発見・早期治療（健康診断・がん検診等）③三次予防：リハビリ・再発防止・社会復帰です。「四次予防」という分類はありません。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"ph_003","subject":"公衆衛生学","question":"プライマリ・ヘルス・ケア（PHC）の理念を提唱した会議はどれか。","choices":["アルマ・アタ宣言（1978年）","オタワ憲章（1986年）","バンコク憲章（2005年）","東京宣言（2017年）"],"answer":0,"explanation":"プライマリ・ヘルス・ケア（PHC）はWHO・ユニセフ共催のアルマ・アタ会議（1978年）で提唱され「2000年までにすべての人に健康を」を目標としました。地域住民参加・社会経済発展との結びつき・包括的サービス提供が特徴です。オタワ憲章はヘルスプロモーションの理念です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_004","subject":"公衆衛生学","question":"ヘルスプロモーションの概念を提唱した憲章はどれか。","choices":["アルマ・アタ宣言","オタワ憲章（1986年）","ストックホルム宣言","京都議定書"],"answer":1,"explanation":"ヘルスプロモーションは1986年WHOオタワ会議で採択された「オタワ憲章」で提唱された概念で、「人々が自らの健康をコントロールし、改善することができるようにするプロセス」と定義されました。健康的な公共政策・支援的環境・地域活動・個人技術等が活動領域です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_005","subject":"公衆衛生学","question":"健康日本21（第三次、2024年〜）の基本方向として誤っているものはどれか。","choices":["全ての国民が健やかで心豊かに生活できる持続可能な社会の実現","個人の行動と健康状態の改善","社会環境の質の向上","医療費の増額"],"answer":3,"explanation":"健康日本21（第三次）は2024年度から開始された国の健康づくり施策で、医療費増額は目的ではありません。基本方向は①全国民の健やか生活②個人行動・健康状態の改善③社会環境の質の向上④ライフコースアプローチを踏まえた健康づくり、です。","frequency":"medium","is_trend":true,"frequency_reason":"2024年新計画"},{"id":"ph_006","subject":"公衆衛生学","question":"平均寿命と健康寿命の違いとして正しいものはどれか。","choices":["平均寿命は健康寿命より短い","健康寿命は健康上の問題なく日常生活を送れる期間","両者は同じである","健康寿命は平均寿命の2倍である"],"answer":1,"explanation":"健康寿命は「健康上の問題で日常生活が制限されることなく生活できる期間」で、平均寿命より短くなります。日本人の差は男性約9年、女性約12年です。健康寿命の延伸が公衆衛生の重要課題で、平均寿命との差を縮めることが目標とされます。","frequency":"high","is_trend":true,"frequency_reason":"高齢化で重要"},{"id":"ph_007","subject":"公衆衛生学","question":"日本の出生率の指標として正しいものはどれか（2022年）。","choices":["合計特殊出生率：約1.26（2022年）","約2.5","約3.0","約0.5"],"answer":0,"explanation":"2022年の合計特殊出生率は1.26で、過去最低を更新しました。人口維持には2.07程度が必要とされ、現状は大幅に下回っています。少子化は社会保障・労働力等に影響する重要課題で、政府が様々な対策を講じています。","frequency":"high","is_trend":true,"frequency_reason":"少子化問題"},{"id":"ph_008","subject":"公衆衛生学","question":"日本の死因順位（2022年）で第1位はどれか。","choices":["心疾患","悪性新生物（がん）","老衰","脳血管疾患"],"answer":1,"explanation":"2022年の日本人死因順位は①悪性新生物（がん）②心疾患③老衰④脳血管疾患⑤肺炎の順です。がんは1981年から第1位を維持しています。老衰は近年急増しており第3位になっています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"ph_009","subject":"公衆衛生学","question":"日本の人口動態に関する記述として正しいものはどれか（2022年）。","choices":["人口は増加している","超高齢社会（65歳以上が21%超）に該当する","少子化は進んでいない","出生数は増加傾向にある"],"answer":1,"explanation":"日本は2007年から超高齢社会（65歳以上人口割合21%超）となり、2022年は29.0%に達しています。一方、人口は2008年をピークに減少が続き、出生数も減少を続けています。世界で最も高齢化が進んだ国の一つです。","frequency":"high","is_trend":true,"frequency_reason":"超高齢社会"},{"id":"ph_010","subject":"公衆衛生学","question":"乳児死亡率の説明として正しいものはどれか。","choices":["出生1000対の生後1年未満の死亡数","人口1000対の死亡数","妊娠中の死亡数","5歳未満児の死亡数"],"answer":0,"explanation":"乳児死亡率は出生1000対の生後1年未満（生後0日〜364日）の死亡数で表されます。日本は2022年で1.8と世界最低水準で、母子保健の充実度を示す重要指標です。新生児死亡率は生後28日未満の死亡を指します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_011","subject":"公衆衛生学","question":"国民健康・栄養調査の主管省庁はどれか。","choices":["農林水産省","文部科学省","厚生労働省","内閣府"],"answer":2,"explanation":"国民健康・栄養調査は厚生労働省が健康増進法に基づき毎年11月に実施し、国民の身体状況・栄養摂取量・生活習慣等を調査します。健康増進・生活習慣病対策の基礎資料となり、食事摂取基準策定の根拠データとなります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_012","subject":"公衆衛生学","question":"感染症成立の3要因として正しいものはどれか。","choices":["病原体・感染経路・感受性宿主","空気・水・食物","温度・湿度・気圧","医師・看護師・検査技師"],"answer":0,"explanation":"感染症は①病原体（細菌・ウイルス・寄生虫等）②感染経路（接触・飛沫・空気・媒介物等）③感受性宿主（免疫のない人）の3要因が揃って成立します。感染対策はこれらのいずれかを断つことが基本です。","frequency":"high","is_trend":false,"frequency_reason":"感染症の基本"},{"id":"ph_013","subject":"公衆衛生学","question":"感染経路として誤っているものはどれか。","choices":["接触感染","飛沫感染","空気感染","遺伝感染"],"answer":3,"explanation":"「遺伝感染」という感染経路はありません。主な感染経路は①接触感染（直接・間接）②飛沫感染（5μm超の飛沫）③空気感染（飛沫核、結核・麻疹等）④経口感染（食品・水）⑤媒介物感染（蚊等）⑥血液・体液感染等です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ph_014","subject":"公衆衛生学","question":"感染症法の感染症類型のうち、最も危険度が高いものはどれか。","choices":["一類感染症（エボラ出血熱・痘そう等）","二類感染症","三類感染症","四類感染症"],"answer":0,"explanation":"感染症法では一類〜五類および新型インフルエンザ等感染症等に分類されます。一類（エボラ出血熱・クリミア・コンゴ出血熱・痘そう・ペスト・ラッサ熱等）が最も危険度が高く、原則入院措置等が取られます。三類は腸管出血性大腸菌・コレラ等の消化器系感染症です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_015","subject":"公衆衛生学","question":"結核に関する記述として正しいものはどれか。","choices":["日本では既に根絶されている","空気感染（飛沫核感染）する","潜伏期間はない","治療には1週間で十分"],"answer":1,"explanation":"結核は結核菌による空気感染（飛沫核感染）する感染症で、二類感染症に指定されています。日本は先進国の中では罹患率が高く、毎年新規患者が発生しています。潜伏期間が長く（数週間〜数十年）、治療には6〜9ヶ月以上の長期服薬が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_016","subject":"公衆衛生学","question":"予防接種法に基づく定期予防接種の対象疾病として誤っているものはどれか。","choices":["ジフテリア・百日咳・破傷風（DPT）","麻疹・風疹（MR）","日本脳炎","インフルエンザ（健康成人）"],"answer":3,"explanation":"健康な成人のインフルエンザは定期接種ではなく任意接種です。定期接種A類（公費・努力義務あり）：DPT-IPV、BCG、MR、水痘、Hib、肺炎球菌、HPV、日本脳炎等。B類（高齢者対象、努力義務なし）：高齢者インフルエンザ、高齢者肺炎球菌等が対象です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_017","subject":"公衆衛生学","question":"新型コロナウイルス感染症（COVID-19）の主な感染経路として正しいものはどれか。","choices":["経口感染のみ","飛沫感染・エアロゾル感染・接触感染","蚊による媒介","遺伝感染"],"answer":1,"explanation":"COVID-19は飛沫感染・エアロゾル（マイクロ飛沫）感染・接触感染が主な感染経路です。2023年5月から感染症法上の5類感染症に位置づけが変更されました。マスク着用・手洗い・換気・ワクチン接種等の対策が継続されています。","frequency":"medium","is_trend":true,"frequency_reason":"最近の感染症"},{"id":"ph_018","subject":"公衆衛生学","question":"食中毒と感染症の違いとして正しいものはどれか。","choices":["食中毒は食品が原因、感染症は人から人への感染が中心","両者に違いはない","感染症は食品でのみ起こる","食中毒は遺伝性疾患"],"answer":0,"explanation":"食中毒は飲食物に起因する健康障害で食品衛生法管轄、感染症は人から人への感染も含む病原体による疾患で感染症法管轄です。腸管出血性大腸菌・ノロウイルス等は両法の対象となる重複した疾患もあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_019","subject":"公衆衛生学","question":"人獣共通感染症（ズーノーシス）として正しいものはどれか。","choices":["麻疹","インフルエンザ（鳥・豚由来）・狂犬病・E型肝炎・サルモネラ症等","風疹","水痘"],"answer":1,"explanation":"人獣共通感染症（ズーノーシス）は人と動物の間で伝播する感染症で、鳥/豚インフルエンザ・狂犬病・E型肝炎・サルモネラ症・トキソプラズマ症・結核・ブルセラ症等があります。WHOはOne Healthアプローチの重要性を強調しており、約200種類が知られています。","frequency":"medium","is_trend":true,"frequency_reason":"One Health"},{"id":"ph_020","subject":"公衆衛生学","question":"飲料水の水質基準を定める法律はどれか。","choices":["食品衛生法","水道法","建築基準法","下水道法"],"answer":1,"explanation":"飲料水の水質基準は水道法に基づき定められ、現在51項目（一般細菌・大腸菌・各種化学物質等）の基準値が設定されています。水道事業者は定期検査の実施義務があり、安全な水道水の供給を確保しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_021","subject":"公衆衛生学","question":"飲料水の塩素消毒の遊離残留塩素の基準として正しいものはどれか。","choices":["給水栓で0.1mg/L以上","給水栓で1.0mg/L以上","給水栓で5.0mg/L以上","基準はない"],"answer":0,"explanation":"水道法では給水栓での遊離残留塩素を0.1mg/L以上保持することが定められています（病原微生物の汚染防止のため）。上限は1mg/L程度を目安とし、過剰な塩素はトリハロメタン等の副生成物のリスクがあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_022","subject":"公衆衛生学","question":"環境基本法における7つの典型公害として誤っているものはどれか。","choices":["大気汚染・水質汚濁","土壌汚染・騒音・振動","地盤沈下・悪臭","放射能汚染"],"answer":3,"explanation":"環境基本法の7典型公害は①大気汚染②水質汚濁③土壌汚染④騒音⑤振動⑥地盤沈下⑦悪臭です。放射能汚染は別途、原子力災害対策特別措置法等で扱われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_023","subject":"公衆衛生学","question":"PM2.5に関する記述として正しいものはどれか。","choices":["粒径2.5mm以下の粒子状物質","粒径2.5μm（マイクロメートル）以下の微小粒子状物質","水質汚濁の指標","騒音レベルの指標"],"answer":1,"explanation":"PM2.5は粒径2.5μm以下の微小粒子状物質で、肺の奥深くまで到達して呼吸器・循環器に影響します。中国大陸からの越境汚染等が問題となり、環境基準（年平均15μg/m³以下、日平均35μg/m³以下）が設定されています。","frequency":"medium","is_trend":true,"frequency_reason":"環境問題"},{"id":"ph_024","subject":"公衆衛生学","question":"廃棄物処理に関する記述として正しいものはどれか。","choices":["一般廃棄物は事業者が処理","産業廃棄物は市町村が処理","産業廃棄物は排出事業者の責任","廃棄物に分類はない"],"answer":2,"explanation":"廃棄物処理法では、産業廃棄物（事業活動に伴う廃棄物のうち法定20種類）は排出事業者の責任で適正処理することが原則です。一般廃棄物（家庭ごみ・事業系一般廃棄物）は市町村が処理責任を持ちます。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"ph_025","subject":"公衆衛生学","question":"地球規模の環境問題として誤っているものはどれか。","choices":["地球温暖化","オゾン層破壊","生物多様性の喪失","人口減少"],"answer":3,"explanation":"人口減少は地球規模の環境問題ではありません（むしろ世界人口は増加傾向）。地球規模の環境問題は①地球温暖化（気候変動）②オゾン層破壊③酸性雨④海洋汚染（プラスチック等）⑤生物多様性喪失⑥砂漠化⑦熱帯林減少⑧有害廃棄物越境移動等です。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs関連"},{"id":"ph_026","subject":"公衆衛生学","question":"室内空気汚染の原因と健康影響の組み合わせとして誤っているものはどれか。","choices":["ホルムアルデヒド ─ シックハウス症候群","一酸化炭素 ─ 中毒（不完全燃焼）","たばこの煙 ─ 受動喫煙による健康被害","酸素 ─ 中毒症状"],"answer":3,"explanation":"酸素は通常の濃度では中毒を起こしません（高圧酸素環境では別）。室内空気汚染の代表として①ホルムアルデヒド・揮発性有機化合物（シックハウス症候群）②一酸化炭素（中毒）③たばこの煙（受動喫煙、肺がん・心疾患リスク）④ハウスダスト（アレルギー）等があります。","frequency":"medium","is_trend":false,"frequenc
