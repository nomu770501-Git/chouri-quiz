y_reason":""},{"id":"ph_027","subject":"公衆衛生学","question":"母子健康手帳の交付者として正しいものはどれか。","choices":["国（厚生労働大臣）","都道府県知事","市町村長","医師"],"answer":2,"explanation":"母子健康手帳は母子保健法に基づき、妊娠届を提出した妊婦に市町村長が交付します。妊娠中の経過・出産・乳幼児の成長・予防接種等を記録する重要な手帳で、母子保健サービスを受ける際の基本ツールです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_028","subject":"公衆衛生学","question":"乳幼児の発育・発達に関する記述として正しいものはどれか。","choices":["新生児期は生後4週まで","離乳開始は通常生後12ヶ月から","乳幼児健診は任意である","母乳育児は推奨されていない"],"answer":0,"explanation":"新生児期は出生後4週（28日）未満を指します。離乳開始は通常生後5〜6ヶ月から始まります。乳幼児健診（1歳半・3歳児健診等）は母子保健法に基づく市町村事業で原則無料で受診できます。母乳育児はWHO等が推奨しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_029","subject":"公衆衛生学","question":"学校給食の目的として誤っているものはどれか（学校給食法）。","choices":["適切な栄養の摂取","食事の重要性・食生活の理解","学習への集中促進のため","望ましい食習慣の形成"],"answer":2,"explanation":"学校給食法（2008年改正）の目的は食育推進で、①適切な栄養摂取②食事の重要性・食事の喜び・楽しさの理解③健康保持増進④望ましい食習慣の形成⑤学校生活の楽しさと明るい社交性・協同精神の養成⑥食料生産・流通・消費の理解⑦勤労の重要性・地域社会の理解⑧食文化の理解の8項目です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_030","subject":"公衆衛生学","question":"食育基本法（2005年制定）の主管はどれか。","choices":["厚生労働省","農林水産省","文部科学省","環境省"],"answer":1,"explanation":"食育基本法（2005年制定）は食育を推進する基本法で、内閣府主管でしたが2016年に農林水産省に移管されました。健全な食生活実践のための国民運動として推進され、食育推進基本計画が5年ごとに策定されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_031","subject":"公衆衛生学","question":"児童の食物アレルギー対応として誤っているものはどれか（学校給食）。","choices":["アレルゲン除去食の提供","個別の対応マニュアル整備","アナフィラキシーショック時のエピペン®使用準備","症状が出るまで通常食を提供"],"answer":3,"explanation":"食物アレルギーのある児童には通常食ではなく、個別の対応（除去食・代替食）が必要です。学校給食における食物アレルギー対応指針（文部科学省）では、安全第一の対応・個別の対応マニュアル・アナフィラキシー対応訓練等が定められています。","frequency":"high","is_trend":true,"frequency_reason":"重要対応"},{"id":"ph_032","subject":"公衆衛生学","question":"労働衛生の3管理として正しい組み合わせはどれか。","choices":["作業環境管理・作業管理・健康管理","労務管理・財務管理・人事管理","上司管理・部下管理・自己管理","時間管理・経費管理・品質管理"],"answer":0,"explanation":"労働衛生の3管理は①作業環境管理（環境測定・改善）②作業管理（作業方法の改善）③健康管理（健康診断・事後措置）です。さらに労働衛生教育・総括管理を加えて5管理とすることもあります。労働者の健康保持増進の基本枠組みです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_033","subject":"公衆衛生学","question":"労働基準法における労働時間の原則として正しいものはどれか。","choices":["週40時間・1日8時間","週60時間・1日12時間","週30時間・1日6時間","制限はない"],"answer":0,"explanation":"労働基準法第32条では、労働時間を週40時間・1日8時間以内と定めています（法定労働時間）。これを超える場合は36協定（時間外・休日労働協定）の締結と割増賃金の支払いが必要です。働き方改革で時間外労働の上限規制も導入されています。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"ph_034","subject":"公衆衛生学","question":"ストレスチェック制度に関する記述として正しいものはどれか。","choices":["労働者数に関わらず実施義務","常時50人以上の労働者を使用する事業場で年1回実施","希望者のみ実施","医療機関で受診する"],"answer":1,"explanation":"ストレスチェック制度は2015年12月から施行され、常時50人以上の労働者を使用する事業場で年1回の実施が義務付けられました。労働者のメンタルヘルス不調を未然に防ぐ一次予防が目的で、結果は本人にのみ通知されます。","frequency":"medium","is_trend":true,"frequency_reason":"メンタルヘルス"},{"id":"ph_035","subject":"公衆衛生学","question":"特定健康診査・特定保健指導の対象者として正しいものはどれか。","choices":["全国民","40〜74歳の医療保険加入者","75歳以上の高齢者","学生のみ"],"answer":1,"explanation":"特定健康診査（メタボ健診）・特定保健指導は2008年から開始され、40〜74歳の医療保険加入者が対象です。メタボリックシンドロームに着目し、内臓脂肪型肥満を予防・改善することで生活習慣病を減少させる施策です。","frequency":"high","is_trend":false,"frequency_reason":"生活習慣病対策"},{"id":"ph_036","subject":"公衆衛生学","question":"がん検診で対策型検診として実施されているものはどれか。","choices":["胃がん・子宮頸がん・肺がん・乳がん・大腸がん検診","全部位のがん検診","遺伝子検査のみ","PET検査のみ"],"answer":0,"explanation":"対策型がん検診（住民検診）は5つのがん（胃・子宮頸・肺・乳・大腸）について科学的根拠に基づき市町村が実施します。死亡率減少効果が証明されており、対象年齢・受診間隔・検査方法が定められています。任意型検診（人間ドック等）とは区別されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_037","subject":"公衆衛生学","question":"介護保険制度の保険者として正しいものはどれか。","choices":["国","都道府県","市町村（広域連合等含む）","健康保険組合"],"answer":2,"explanation":"介護保険制度（2000年施行）の保険者は市町村及び特別区（広域連合等含む）です。被保険者は40歳以上で、第1号（65歳以上）と第2号（40〜64歳の医療保険加入者）に分かれます。要介護認定後に介護サービスが受けられます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_038","subject":"公衆衛生学","question":"地域包括ケアシステムの構成要素として誤っているものはどれか。","choices":["医療・介護・予防・住まい・生活支援","地域内での切れ目ないケア提供","市町村中心の取り組み","病院での長期入院重視"],"answer":3,"explanation":"地域包括ケアシステムは「住み慣れた地域で自分らしい生活を続けられるよう、医療・介護・予防・住まい・生活支援が一体的に提供される仕組み」で、病院での長期入院ではなく在宅・地域でのケアを重視します。2025年（団塊の世代が75歳以上）を目途に各市町村で構築が進められています。","frequency":"high","is_trend":true,"frequency_reason":"高齢化対策"},{"id":"ph_039","subject":"公衆衛生学","question":"ロコモティブシンドローム（運動器症候群）の主な原因として正しいものはどれか。","choices":["筋力低下・関節疾患・骨粗鬆症等の運動器障害","糖尿病","高血圧","脂質異常症"],"answer":0,"explanation":"ロコモティブシンドローム（ロコモ）は運動器（筋肉・関節・骨等）の障害により移動機能が低下した状態で、要介護リスクが高まります。原因は筋力低下（サルコペニア）、変形性関節症、骨粗鬆症、脊柱管狭窄症等で、運動・栄養（特にたんぱく質）の対策が重要です。","frequency":"medium","is_trend":true,"frequency_reason":"高齢者問題"},{"id":"ph_040","subject":"公衆衛生学","question":"認知症高齢者の食事における注意点として誤っているものはどれか。","choices":["食事時間を一定に保つ","食事環境を整える","一度に大量の食事を出す","嚥下機能に応じた食事形態の提供"],"answer":2,"explanation":"認知症高齢者には食欲・集中力低下、誤嚥リスクの観点から、一度に大量の食事は不適切です。少量を複数回、時間をかけて食べやすい形態で提供することが推奨されます。食事環境の整備（騒音・刺激の制限）、食事時間の規則性、本人の好みを反映する等の工夫も重要です。","frequency":"medium","is_trend":true,"frequency_reason":"認知症対応"},{"id":"ph_041","subject":"公衆衛生学","question":"高齢者の嚥下障害（飲み込みの障害）の予防・対応として誤っているものはどれか。","choices":["食事姿勢を正す","とろみをつける","一口量を少なくする","水分摂取を制限する"],"answer":3,"explanation":"高齢者の水分摂取制限は脱水症のリスクを高めるため不適切です。嚥下障害対応の基本は①正しい姿勢（やや前屈の座位）②食事形態の調整（とろみ付け・刻み食・ペースト食）③一口量の調整④誤嚥予防の食事介助⑤口腔ケアの徹底等です。とろみをつけて水分も適切に摂取します。","frequency":"high","is_trend":true,"frequency_reason":"介護現場必須"},{"id":"ph_042","subject":"公衆衛生学","question":"喫煙の健康影響として誤っているものはどれか。","choices":["肺がん・心疾患のリスク増加","受動喫煙による周囲への影響","妊婦の喫煙による胎児への影響","カルシウム吸収促進"],"answer":3,"explanation":"喫煙はカルシウム吸収を促進しません（むしろ骨密度低下のリスク）。喫煙は能動喫煙でがん（肺・喉頭・口腔・食道等）・循環器疾患・呼吸器疾患・糖尿病等のリスクを高め、受動喫煙でも肺がん・心疾患リスクが増加します。妊婦喫煙は早産・低出生体重児等のリスクとなります。","frequency":"high","is_trend":false,"frequency_reason":"重要健康課題"},{"id":"ph_043","subject":"公衆衛生学","question":"健康増進法による受動喫煙対策として正しいものはどれか。","choices":["屋内禁煙の努力義務のみ","2020年4月から多くの施設で原則屋内禁煙","制限なし","屋外のみ禁煙"],"answer":1,"explanation":"2020年4月から改正健康増進法が全面施行され、多くの施設(学校・病院・行政機関・飲食店等)で原則屋内禁煙となりました。喫煙する場合は喫煙専用室等の設置が必要で、20歳未満の立入禁止・標識の設置等も義務化されています。","frequency":"medium","is_trend":true,"frequency_reason":"2020年法改正"},{"id":"ph_044","subject":"公衆衛生学","question":"飲酒の健康影響に関する記述として正しいものはどれか。","choices":["少量ならば全く問題ない","過剰摂取は肝臓・膵臓・消化器系のリスクを高める","適量の基準はない","女性は男性より多く飲める"],"answer":1,"explanation":"過剰なアルコール摂取は肝硬変・肝がん・膵炎・食道がん・高血圧・脳卒中等のリスクを高めます。健康日本21では節度ある適度な飲酒を「純アルコール換算で1日約20g程度（ビール中瓶1本相当）」とし、女性・高齢者・少量で顔が赤くなる人はより少量にすべきとしています。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ph_045","subject":"公衆衛生学","question":"運動不足の解消として推奨されている運動量はどれか（健康日本21）。","choices":["週1回30分のみ","1日合計60分以上の身体活動・週60分以上の運動（成人）","1日5時間以上の運動","運動は不要"],"answer":1,"explanation":"健康日本21（第二次・第三次）では身体活動・運動の指標として、20〜64歳は1日歩数8000歩・週60分以上の運動、65歳以上は1日歩数6000歩・週40分以上の身体活動等が目標です。運動不足は生活習慣病・ロコモ・認知症のリスクを高めます。","frequency":"medium","is_trend":true,"frequency_reason":"生活習慣"},{"id":"ph_046","subject":"公衆衛生学","question":"睡眠と健康に関する記述として正しいものはどれか。","choices":["睡眠時間は短いほど健康によい","成人は7時間程度の睡眠が推奨される","睡眠の質は問題ない","不眠症は健康に影響しない"],"answer":1,"explanation":"成人の推奨睡眠時間は7時間程度（個人差あり）で、慢性的な睡眠不足は生活習慣病・うつ病・免疫低下・事故リスク増加等を招きます。睡眠の質（深い眠り・中途覚醒なし）も重要で、健康づくりのための睡眠指針2014（厚労省）では12項目の指針が示されています。","frequency":"medium","is_trend":true,"frequency_reason":"睡眠と健康"},{"id":"ph_047","subject":"公衆衛生学","question":"ストレスと健康に関する記述として誤っているものはどれか。","choices":["過度のストレスは身体・精神の不調を招く","ストレスは全て有害である","適度なストレスは生活の活力となる","ストレス対処法（コーピング）が重要"],"answer":1,"explanation":"ストレスには有害（ディストレス）と有益（ユーストレス）の両面があり、適度なストレスは活力・成長の源となります。過度・慢性的なストレスは心身の不調（うつ病・不安障害・心血管疾患等）を招くため、適切なストレス対処法（コーピング）が重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_048","subject":"公衆衛生学","question":"食塩摂取の目標量（健康日本21・第三次）として正しいものはどれか（成人）。","choices":["1日10g","1日7g","1日5g","制限なし"],"answer":1,"explanation":"健康日本21（第三次）では成人の食塩摂取量の目標を1日7g（男女とも）と定めています。日本人の食事摂取基準2020年版では男性7.5g/日未満、女性6.5g/日未満ですが、高血圧予防の観点から更なる減塩が推奨されます。WHOは1日5g未満を推奨しています。","frequency":"high","is_trend":true,"frequency_reason":"減塩重要課題"},{"id":"ph_049","subject":"公衆衛生学","question":"野菜摂取の目標量（健康日本21・第三次）として正しいものはどれか（成人）。","choices":["1日200g","1日350g","1日500g","1日100g"],"answer":1,"explanation":"健康日本21（第三次）では成人の野菜摂取量の目標を1日350g（うち緑黄色野菜120g以上）と定めています。日本人の現状は約280g/日と目標を下回っており、生活習慣病予防のため野菜摂取増加が推奨されます。「ベジファースト」等の啓発も行われています。","frequency":"high","is_trend":true,"frequency_reason":"食生活改善"},{"id":"ph_050","subject":"公衆衛生学","question":"公衆衛生に関わる主要な国際機関として正しいものはどれか。","choices":["WHO（世界保健機関）","FAO（国連食糧農業機関）","ユニセフ（国連児童基金）","以上すべて"],"answer":3,"explanation":"公衆衛生の国際機関は①WHO（世界保健機関）：国際保健の中核②FAO（国連食糧農業機関）：食料・農業③ユニセフ（国連児童基金）：子供の権利・健康④UNAIDS（国連エイズ合同計画）等が連携して活動しています。コーデックス委員会はFAO・WHO合同で食品規格を策定します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_001","subject":"調理理論","question":"調理操作の分類として正しいものはどれか。","choices":["非加熱調理操作と加熱調理操作","和食と洋食","料理人と素人","早い・遅い"],"answer":0,"explanation":"調理操作は大きく①非加熱調理操作（洗う・切る・混ぜる・浸す・絞る等）と②加熱調理操作（焼く・煮る・炒める・揚げる・蒸す等）に分類されます。さらに調味操作・成形操作等を加える分類もあります。","frequency":"high","is_trend":false,"frequency_reason":"基本分類"},{"id":"ck_002","subject":"調理理論","question":"湿式加熱調理として誤っているものはどれか。","choices":["ゆでる","煮る","蒸す","焼く"],"answer":3,"explanation":"焼くは乾式加熱（水を媒体としない加熱）に分類されます。湿式加熱は水・水蒸気を媒体とする加熱で、ゆでる・煮る・蒸す・炊くが該当します。乾式加熱には焼く・揚げる・炒めるが含まれます（揚げるは油を媒体とする）。","frequency":"high","is_trend":false,"frequency_reason":"頻出分類"},{"id":"ck_003","subject":"調理理論","question":"調理の目的として誤っているものはどれか。","choices":["消化吸収を高める","嗜好性（味・香り・外観）を向上させる","安全性（殺菌・有害物除去）を確保する","食品の栄養価を完全に保つ"],"answer":3,"explanation":"調理では加熱・洗浄等により一部の栄養素（特に水溶性ビタミン）は損失します。完全に保つことは困難です。調理の主な目的は①消化吸収性向上②嗜好性向上③安全性確保④保存性向上⑤食文化の継承等で、栄養損失を最小化する工夫が重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_004","subject":"調理理論","question":"包丁の使い方として正しいものはどれか。","choices":["押し切り（前に押す）","引き切り（後ろに引く）","上下押し切り","以上すべて適切な切り方"],"answer":3,"explanation":"切り方は食材により使い分けます。押し切りは硬いもの（根菜・かぼちゃ等）、引き切りは刺身等繊細なもの、上下押し切りは葉物野菜等に適します。包丁の刃元・中央・先端の使い分けも重要で、刃を立てる角度・力の加減も技術の一部です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_005","subject":"調理理論","question":"食塩水での野菜の処理として正しいものはどれか。","choices":["浸透圧により細胞内の水分が出て萎れる","細胞壁が硬化する","栄養素が増加する","色が鮮やかになる"],"answer":0,"explanation":"食塩水（高張液）に野菜を浸すと浸透圧により細胞内の水分が外に出て、野菜が萎れます。きゅうり・キャベツの塩もみで水分を抜く操作はこの原理を利用したものです。一方、低張液（真水）に浸すと細胞内に水が入り、シャキッとします。","frequency":"high","is_trend":false,"frequency_reason":"実技関連"},{"id":"ck_006","subject":"調理理論","question":"隠し包丁を入れる目的として誤っているものはどれか。","choices":["火の通りを均一にする","味を染みやすくする","食べやすくする","栄養価を高める"],"answer":3,"explanation":"隠し包丁は食材の表面に浅い切り込みを入れる技法で、栄養価を高める効果はありません。目的は①火の通りを均一化②味の浸透促進③食べやすさ向上④加熱時の収縮防止等です。なすの煮浸し・鶏の照り焼き等で活用されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_007","subject":"調理理論","question":"熱の伝わり方の3要素として正しいものはどれか。","choices":["伝導・対流・放射","拡散・浸透・蒸発","酸化・還元・中和","溶解・凝固・気化"],"answer":0,"explanation":"熱は①伝導（接触による直接伝達、フライパン等）②対流（液体・気体の循環、煮物・オーブン）③放射（赤外線等、グリル・炭火）の3要素で伝わります。電子レンジは誘電加熱という特殊な方式で、食品中の水分子を直接振動させて発熱させます。","frequency":"high","is_trend":false,"frequency_reason":"基本原理"},{"id":"ck_008","subject":"調理理論","question":"電子レンジ加熱の原理として正しいものはどれか。","choices":["食品の表面から熱が伝わる","マイクロ波が食品中の水分子を振動させて発熱する","遠赤外線で加熱する","油が熱を伝える"],"answer":1,"explanation":"電子レンジはマイクロ波（2450MHz）を発生させ、食品中の水分子を激しく振動させて摩擦熱で加熱します（誘電加熱）。水分の多い部分から早く温まり、水分のない油や乾燥食品は温まりにくい特徴があります。容器の選択も重要です。","frequency":"high","is_trend":false,"frequency_reason":"実用知識"},{"id":"ck_009","subject":"調理理論","question":"IH（電磁誘導加熱）の特徴として正しいものはどれか。","choices":["鍋自体が発熱する","炎で加熱する","遠赤外線で加熱する","蒸気で加熱する"],"answer":0,"explanation":"IH調理器は電磁誘導により鍋自体に渦電流を発生させ、鍋を直接発熱させる方式です。熱効率が高く、火を使わないため安全性が高い特徴があります。鉄・ステンレス等の磁性体の鍋でないと使用できず、銅・アルミは原則使用不可（IH対応品を除く）です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_010","subject":"調理理論","question":"蒸し物の特徴として正しいものはどれか。","choices":["100℃の水蒸気で加熱する","栄養素の流出が少ない","食材の形が崩れにくい","以上すべて正しい"],"answer":3,"explanation":"蒸し物は約100℃の水蒸気で加熱する湿式加熱で、①栄養素・水溶性成分の流出が少ない②形が崩れにくい③焦げない④加熱むらが少ない⑤食感が柔らかく仕上がる等の特徴があります。茶碗蒸し・しゅうまい・蒸し魚等で活用されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_011","subject":"調理理論","question":"圧力鍋の特徴として正しいものはどれか。","choices":["100℃以下で調理する","120℃前後の高温・短時間で調理","常圧で時間をかける","蒸気を逃がしながら調理"],"answer":1,"explanation":"圧力鍋は密閉して内圧を高め、約120℃の高温で短時間調理する器具です。豆類・骨付き肉・玄米等の硬い食材を短時間で柔らかくでき、エネルギー効率も良いです。蒸気が逃げないため水分・栄養素の流出も少なく、近年再注目されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_012","subject":"調理理論","question":"真空調理法（低温調理）の特徴として正しいものはどれか。","choices":["100℃以上の高温で調理","60℃前後の低温で長時間加熱","短時間の高温調理","加熱しない"],"answer":1,"explanation":"真空調理法（スーヴィード）は食材を真空パックして60〜90℃の湯煎で長時間加熱する調理法です。低温長時間調理により肉が柔らかく仕上がり、栄養素・うまみが流出しにくく、衛生的でもあります。フランスで開発され、近年家庭用調理器も普及しています。","frequency":"medium","is_trend":true,"frequency_reason":"近年注目"},{"id":"ck_013","subject":"調理理論","question":"米飯の炊飯における加水量の標準として正しいものはどれか（うるち米）。","choices":["米重量の0.5倍","米重量の1.5倍（容量比1.2倍）","米重量の3倍","米重量の0.3倍"],"answer":1,"explanation":"うるち米の標準的な加水量は米重量の1.5倍（容量比では米：水＝1：1.2）です。新米はやや少なめ、古米・玄米はやや多めにします。米は浸水（30分〜1時間）でデンプンに水を吸収させてから炊くと美味しく炊きあがります。","frequency":"high","is_trend":false,"frequency_reason":"実技必須"},{"id":"ck_014","subject":"調理理論","question":"でんぷんの糊化（α化）が起こる温度として最も適切なものはどれか。","choices":["40〜50℃","60〜80℃","90〜100℃","100℃以上"],"answer":1,"explanation":"でんぷんの糊化（α化）は一般的に60〜80℃で起こります。でんぷん粒に水と熱が加わることで膨潤・崩壊し、粘性が生じる現象です。種類によって糊化温度は異なりますが、この温度帯が目安です。","frequency":"high","is_trend":false,"frequency_reason":"調理理論の基本"},{"id":"ck_015","subject":"調理理論","question":"でんぷんの老化（β化）に関する記述として正しいものはどれか。","choices":["糊化したでんぷんが冷えて硬くなる現象","加熱で起こる","糖度が上がる現象","酸化反応である"],"answer":0,"explanation":"でんぷんの老化（β化）は糊化（α化）したでんぷんが冷却により再び結晶化して硬くなる現象です。冷やご飯が硬くなるのはこのため。0〜5℃で最も進行しやすく、60℃以上または冷凍では進みにくくなります。砂糖を加えると老化が抑制されます（求肥・羊羹等）。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ck_016","subject":"調理理論","question":"もち米の特徴として正しいものはどれか。","choices":["アミロースが多い","アミロペクチンがほぼ100%である","うるち米より粘りがない","糊化しにくい"],"answer":1,"explanation":"もち米はアミロペクチンがほぼ100%でアミロースをほとんど含まないため、強い粘りが生まれます。うるち米はアミロース約20%・アミロペクチン約80%です。もち米は赤飯・餅・おこわ・ちまき等に使用されます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ck_017","subject":"調理理論","question":"うどんのコシを生み出す主要因はどれか。","choices":["グルテンの形成","でんぷんの糊化","脂肪の凝固","糖の結晶化"],"answer":0,"explanation":"うどんのコシは小麦粉のたんぱく質（グリアジン・グルテニン）が水と結合してできるグルテンの網目構造によります。塩を加えるとグルテン形成が促進され、よく練り・寝かせることでコシが強くなります。中力粉が最適です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ck_018","subject":"調理理論","question":"緑色野菜を鮮やかに茹でる方法として正しいものはどれか。","choices":["たっぷりの湯で短時間茹で、すぐに冷水に取る","少量の水で長時間茹でる","蓋をして弱火で煮る","酢を加える"],"answer":0,"explanation":"緑色野菜（クロロフィル）を鮮やかに保つコツは①たっぷりの湯（沸騰時の温度低下を防ぐ）②短時間茹で③茹で上がりすぐに冷水（色止め・酵素失活）④塩を加える（マグネシウム保持）です。酢・酸性条件下ではクロロフィルが褐色のフェオフィチンに変化し色が悪くなります。","frequency":"high","is_trend":false,"frequency_reason":"実技基本"},{"id":"ck_019","subject":"調理理論","question":"根菜類のあく抜きとして適切な方法はどれか。","choices":["ごぼう・れんこんは酢水に浸す","ほうれん草は熱湯で茹でる","たけのこは米ぬかと一緒に茹でる","以上すべて適切"],"answer":3,"explanation":"食材ごとに適切なあく抜き法があります。①ごぼう・れんこん：酢水（ポリフェノール酸化抑制で変色防止）②ほうれん草：熱湯で茹でて水に放つ（シュウ酸除去）③たけのこ：米ぬか・赤唐辛子と一緒に茹でる（ホモゲンチジン酸・シュウ酸除去）。それぞれの成分に応じた方法です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_020","subject":"調理理論","question":"にんじんに含まれる酵素「アスコルビナーゼ」の影響として正しいものはどれか。","choices":["他の食品のビタミンCを破壊する","たんぱく質を分解する","脂質を分解する","糖を増やす"],"answer":0,"explanation":"にんじんにはビタミンCを酸化分解するアスコルビナーゼ（アスコルビン酸オキシダーゼ）が含まれます。生のにんじんを大根おろしに混ぜると大根のビタミンCが破壊されます。加熱・酸（酢・レモン汁）で酵素は失活するので、調理法を工夫すれば問題ありません。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"ck_021","subject":"調理理論","question":"野菜の褐変防止策として正しいものはどれか。","choices":["切ったらすぐ水・塩水に浸す","酸（レモン汁等）をかける","加熱して酵素を失活させる","以上すべて有効"],"answer":3,"explanation":"野菜の褐変（じゃがいも・りんご・ごぼう等）はポリフェノールオキシダーゼ等の酵素的褐変反応によります。防止策は①酸素遮断（水・塩水に浸す）②酵素阻害（酸性環境、レモン汁等）③酵素失活（加熱、ブランチング）④還元剤（ビタミンC）等で、いずれも有効です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_022","subject":"調理理論","question":"野菜の調理による栄養素の損失として最も大きいものはどれか。","choices":["脂溶性ビタミン（A・D・E・K）","水溶性ビタミン（B群・C）の茹で汁への流出","たんぱく質","炭水化物"],"answer":1,"explanation":"水溶性ビタミン（特にビタミンC・ビタミンB1等）は茹で汁への流出が大きい栄養素です。蒸す・電子レンジ加熱・短時間調理・茹で汁の利用で損失を最小化できます。脂溶性ビタミンは熱・水での損失は比較的少ないですが、油と一緒に摂ると吸収率が向上します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_023","subject":"調理理論","question":"肉のうまみを引き出す調理法として正しいものはどれか。","choices":["加熱前に塩をふる","常温に戻してから焼く","焼き目をつける（メイラード反応）","以上すべて"],"answer":3,"explanation":"肉のうまみを引き出すコツは①加熱前の塩振り（浸透圧・たんぱく質変性で水分保持）②常温に戻す（中心と表面の温度差軽減）③強火で焼き目（メイラード反応で香ばしさ）④休ませる（肉汁の落ち着き）等が有効です。","frequency":"high","is_trend":false,"frequency_reason":"実技重要"},{"id":"ck_024","subject":"調理理論","question":"メイラード反応（褐変反応）に関する記述として正しいものはどれか。","choices":["酵素が関与する反応である","アミノ酸と糖が反応して起こる","低温ほど反応が促進される","水分が多いほど反応が速い"],"answer":1,"explanation":"メイラード反応（アミノカルボニル反応）は、アミノ酸と還元糖が加熱により反応して褐色物質（メラノイジン）を生成する非酵素的褐変反応です。高温・低水分・アルカリ性で促進されます。パンの焼き色・肉の焦げ目・コーヒー豆の焙煎等で生じる重要な反応です。","frequency":"high","is_trend":false,"frequency_reason":"頻出反応"},{"id":"ck_025","subject":"調理理論","question":"肉を柔らかくする方法として正しくないものはどれか。","choices":["たたいて筋繊維をほぐす","酵素入り液（パイナップル・キウイ）に漬ける","長時間煮込む（コラーゲンのゼラチン化）","冷凍庫で凍らせて結晶化させる"],"answer":3,"explanation":"冷凍は細胞を破壊して食感が悪化するため、肉を柔らかくする方法ではありません。柔らかくする方法は①物理的（たたく・繊維を切る）②酵素的（パイナップル・キウイのプロテアーゼ）③化学的（重曹・塩こうじ）④加熱（コラーゲンのゼラチン化、長時間煮込み）等が有効です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ck_026","subject":"調理理論","question":"肉の加熱時のたんぱく質変化として正しいものはどれか。","choices":["加熱でたんぱく質は溶ける","加熱でたんぱく質は変性・凝固する","加熱でたんぱく質は増える","加熱しても変化しない"],"answer":1,"explanation":"肉のたんぱく質は加熱（60〜70℃以上）で変性・凝固します。これにより肉汁が出て収縮し、食感が変化します。コラーゲン（結合組織）は75〜85℃以上で長時間加熱するとゼラチンに変化して柔らかくなる（牛すじ・煮込み料理）特性があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_027","subject":"調理理論","question":"食肉の部位と適切な調理法の組み合わせとして正しいものはどれか。","choices":["ヒレ ─ ステーキ・カツレツ","バラ ─ 角煮・煮込み","すね ─ 長時間煮込み（シチュー等）","以上すべて適切"],"answer":3,"explanation":"肉の部位ごとに適した調理法があります。①柔らかい部位（ヒレ・ロース）：ステーキ・カツレツ等の短時間加熱②脂肪が多い部位（バラ）：角煮・煮込み③硬い部位（すね・肩・もも）：長時間煮込みでコラーゲンをゼラチン化。部位特性を活かした調理が美味しさの鍵です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ck_028","subject":"調理理論","question":"ハンバーグをふっくら仕上げるコツとして誤っているものはどれか。","choices":["玉ねぎは炒めて冷ましてから加える","卵・パン粉でつなぐ","よくこねて粘りを出す","水分を多く入れすぎる"],"answer":3,"explanation":"水分が多すぎると形が崩れたり、加熱時に肉汁とともに流出して固くなります。ハンバーグのコツは①玉ねぎは炒めて冷ます（生では水分が出る）②卵・パン粉でつなぐ③粘りが出るまでこねる④空気を抜いて成形⑤強火で表面焼き→弱火で中まで⑥休ませる等です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_029","subject":"調理理論","question":"魚の煮付けで「煮汁が沸騰してから魚を入れる」理由として正しいものはどれか。","choices":["表面のたんぱく質を凝固させてうまみの流出を防ぐ","色をつけるため","早く煮るため","栄養を増やすため"],"answer":0,"explanation":"魚を煮付ける際、煮汁を先に沸騰させてから魚を入れる理由は、魚の表面のたんぱく質を瞬時に凝固させ、内部のうまみ成分が煮汁に流出するのを防ぐためです。同様に肉の煮込みも同じ原理です（霜降り・湯通し）。","frequency":"high","is_trend":false,"frequency_reason":"実技重要"},{"id":"ck_030","subject":"調理理論","question":"魚の三枚おろしの順序として正しいものはどれか。","choices":["頭を落とす→内臓除去→洗浄→おろす","内臓除去→頭を落とす→おろす→洗浄","洗浄→おろす→内臓除去→頭を落とす","どの順序でもよい"],"answer":0,"explanation":"魚の三枚おろしは①ウロコ取り②頭を落とす③腹を裂いて内臓除去④水で洗浄（血合いも除去）⑤水気を拭く⑥三枚におろす（中骨に沿って身を切り離す）の順で進めます。鮮度保持のため手早く行い、扱いに応じて熟成させます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_031","subject":"調理理論","question":"魚の鮮度を示すK値の説明として正しいものはどれか。","choices":["K値が高いほど鮮度が高い","K値20%以下が刺身として使える目安である","K値はたんぱく質の分解程度を示す","K値は死後硬直の強さを示す"],"answer":1,"explanation":"K値はATPの分解産物（HxRとHx）の割合を示す鮮度指標で、低いほど鮮度が高い。K値20%以下が刺身の目安、60%以上は鮮度低下が著しいとされます。K値はATP（核酸関連物質）の分解程度を示します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_032","subject":"調理理論","question":"魚の臭み消しに有効な方法として正しいものはどれか。","choices":["塩をふって水分・トリメチルアミンを出す","酒・ワインに漬ける","しょうが・ねぎ・ハーブの香味野菜を使う","以上すべて有効"],"answer":3,"explanation":"魚の臭み（トリメチルアミン等の揮発性アミン類）を消す方法は①塩振り（浸透圧で水分・臭み成分を抽出）②酒・ワイン（アルコールで揮発・打ち消し）③酸（酢・レモン）④香味野菜（しょうが・ねぎ・にんにく・ハーブ）⑤牛乳（アミン吸着）等が有効です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_033","subject":"調理理論","question":"刺身の盛り付けの基本として誤っているものはどれか。","choices":["白身魚・赤身魚をバランスよく","つま（大根のけん等）を添える","けんを多めに、刺身を少なくする","色彩・季節感を意識する"],"answer":2,"explanation":"刺身は主役で、つま・けん（大根の千切り等）・薬味（わさび・しょうが等）は添え物です。けんを多くする必要はなく、刺身が映える適量を盛ります。基本は①種類のバランス②色彩③季節感④見栄え（左右・高低・奇数）⑤食べやすさ等を意識します。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"ck_034","subject":"調理理論","question":"卵白の起泡性を生かした調理として正しいものはどれか。","choices":["メレンゲ・スポンジケーキ・スフレ","茶碗蒸し","卵黄ソース（マヨネーズ）","プリン"],"answer":0,"explanation":"卵白には強い起泡性（泡立ち）があり、攪拌すると気泡を抱え込んで体積が増加します。メレンゲ・スポンジケーキ・スフレ・ムース・エンゼルケーキ等で活用されます。砂糖は安定性を高め、油脂・水分は泡立ちを阻害します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_035","subject":"調理理論","question":"卵黄の乳化性を生かした調理として正しいものはどれか。","choices":["マヨネーズ","メレンゲ","卵焼き","茶碗蒸し"],"answer":0,"explanation":"卵黄に豊富なレシチン（リン脂質）は強い乳化作用を持ち、水と油を均一に混ぜます。マヨネーズの製造原理がこれで、酢・油・卵黄を撹拌することで安定した水中油滴型エマルションを作ります。オランデーズソース・カスタードクリーム等にも応用されます。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"ck_036","subject":"調理理論","question":"温泉卵の作り方として正しいものはどれか。","choices":["100℃で5分加熱","約65〜70℃で30分前後加熱","沸騰させて瞬間調理","冷蔵庫で1時間"],"answer":1,"explanation":"温泉卵は卵黄（凝固温度65〜70℃）と卵白（凝固温度70〜80℃）の凝固温度差を利用した調理で、約65〜70℃で30分前後加熱すると卵黄は半熟、卵白は半流動の状態になります。完全沸騰では普通のゆで卵になります。","frequency":"high","is_trend":false,"frequency_reason":"実技関連"},{"id":"ck_037","subject":"調理理論","question":"茶碗蒸しに「す」が入る原因として正しいものはどれか。","choices":["加熱温度が高すぎ・加熱時間が長すぎる","卵が新鮮すぎる","だしを使わない","器が大きい"],"answer":0,"explanation":"茶碗蒸しの「す」（すだち）は加熱温度が高すぎる・時間が長すぎる場合に、たんぱく質が過剰凝固して気泡が抜けずに残ったものです。蒸し器の蓋をずらしたり、85〜90℃前後の弱火でじっくり加熱することで防げます。","frequency":"high","is_trend":false,"frequency_reason":"実技頻出"},{"id":"ck_038","subject":"調理理論","question":"生クリームの泡立てに関する記述として正しいものはどれか。","choices":["冷やしてから泡立てる","室温で泡立てる","沸かしてから泡立てる","凍らせてから泡立てる"],"answer":0,"explanation":"生クリームは脂肪分が多く（30〜50%）、冷やすことで脂肪球が結晶化して泡立ちやすくなります。ボウル・泡立て器・クリーム自体を5〜10℃に冷やすのがコツです。砂糖は泡立ち始め、香料は最後に加えます。過剰泡立てはバター化します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_039","subject":"調理理論","question":"揚げ物調理における適切な油の温度として正しいものはどれか。","choices":["素揚げ：120〜130℃","フライ：160〜170℃","天ぷら：180〜200℃","唐揚げ：220〜230℃"],"answer":2,"explanation":"天ぷらの適温は180〜200℃です。素揚げは160〜180℃、フライ（とんかつ等）は160〜180℃、唐揚げは170〜180℃が基本です。温度が低すぎると衣が油っぽくなり、高すぎると表面が焦げて中まで火が通りません。","frequency":"high","is_trend":false,"frequency_reason":"実技試験関連で頻出"},{"id":"ck_040","subject":"調理理論","question":"天ぷらの衣を作る際のコツとして正しいものはどれか。","choices":["冷水を使う・混ぜすぎない","熱湯を使う・よく混ぜる","常温で時間をかけて練る","油を加える"],"answer":0,"explanation":"天ぷらの衣は冷水を使い、グルテン形成を抑えるため混ぜすぎないことがコツです。グルテンが形成されると衣が硬く粘りが出てサクサク感が失われます。卵を加えて軽く混ぜ、ダマが残る程度で使用します。揚げる直前に作ることも重要です。","frequency":"high","is_trend":false,"frequency_reason":"実技関連"},{"id":"ck_041","subject":"調理理論","question":"炒め物のコツとして正しいものはどれか。","choices":["食材を一度にたくさん入れる","強火・短時間で手早く調理","弱火でゆっくり","水を多く入れる"],"answer":1,"explanation":"炒め物は強火・短時間で手早く調理することで、食材の色・食感・栄養素を保ちます。一度に大量に入れると温度が下がり「煮る」状態になります。食材は均一の大きさに切る、火の通りにくい順に入れる、調味料は最後の方で加える等のコツがあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_042","subject":"調理理論","question":"油の劣化に関する記述として誤っているものはどれか。","choices":["色が濃くなる","粘度が増す","泡立ちが激しくなる","保存性が向上する"],"answer":3,"explanation":"劣化油は保存性が低下し、加熱で酸化が進行しやすくなります。劣化のサインは①色の濃化（茶褐色化）②粘度増加③泡立ちの増加④煙の発生（発煙点低下）⑤異臭⑥酸価・過酸化物価の上昇等です。劣化油の摂取は健康被害（下痢等）を起こすため定期的な交換が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_043","subject":"調理理論","question":"5基本味として正しい組み合わせはどれか。","choices":["甘味・酸味・塩味・苦味・うま味","辛味・甘味・酸味・塩味・苦味","甘味・酸味・塩味・苦味・渋味","甘味・酸味・塩味・苦味・冷味"],"answer":0,"explanation":"5基本味は甘味・酸味・塩味・苦味・うま味（旨味）です。うま味は1908年に池田菊苗博士により発見され、2000年にUmamiの専用受容体が発見され国際的に認められました。辛味・渋味は痛覚や触覚として感じる感覚で、味覚とは区別されます。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"ck_044","subject":"調理理論","question":"うま味の相乗効果として正しい組み合わせはどれか。","choices":["グルタミン酸（昆布）＋イノシン酸（鰹節）","グルタミン酸＋アルギニン","イノシン酸＋アスパラギン酸","グアニル酸＋アスパラギン酸"],"answer":0,"explanation":"うま味の相乗効果は、アミノ酸系（グルタミン酸・昆布）と核酸系（イノシン酸・鰹節、グアニル酸・干ししいたけ）を組み合わせると単独の数倍〜数十倍のうま味が感じられる現象です。日本の合わせだし（昆布＋鰹節）の科学的根拠です。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"ck_045","subject":"調理理論","question":"調味料を加える「さしすせそ」の順序として正しいものはどれか。","choices":["さ（砂糖）→し（塩）→す（酢）→せ（しょうゆ）→そ（みそ）","し（塩）→さ（砂糖）→す（酢）→せ（しょうゆ）→そ（みそ）","す→さ→し→せ→そ","順序は気にしない"],"answer":0,"explanation":"調味料を加える基本順は「さしすせそ」：①さ（砂糖、分子大きく浸透が遅い）②し（塩、たんぱく質を固める前に砂糖を）③す（酢、加熱で香りが飛ぶので後）④せ（醤油・しょうゆ、香りを残すため）⑤そ（味噌、香りを飛ばさない）。素材に味を染み込ませるための順序です。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"ck_046","subject":"調理理論","question":"食塩が食品に与える効果として誤っているものはどれか。","choices":["グルテンの形成を促進する","野菜の細胞壁を強化する","タンパク質を変性させる","微生物の繁殖を抑制する"],"answer":1,"explanation":"食塩は浸透圧により野菜から水分を引き出し、細胞壁を柔軟にしたり、野菜を萎れさせたりします（細胞壁を強化するのは誤り）。グルテン形成促進、タンパク質変性、静菌効果はいずれも正しい食塩の効果です。","frequency":"high","is_trend":false,"frequency_reason":"調理基礎として頻出"},{"id":"ck_047","subject":"調理理論","question":"砂糖の調理性として誤っているものはどれか。","choices":["甘味付与","保水性（パン・菓子のしっとり感）","防腐効果（高濃度）","たんぱく質の凝固を促進する"],"answer":3,"explanation":"砂糖はたんぱく質の凝固を遅らせる（柔らかく仕上げる）作用があります。プリン・茶碗蒸し等で砂糖を加えると凝固温度が上がり、滑らかな食感になります。砂糖の主な調理性は①甘味②保水性③防腐性④メイラード反応・カラメル化⑤起泡安定性⑥老化防止等です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_048","subject":"調理理論","question":"昆布だしの取り方として最も適切なものはどれか。","choices":["沸騰した湯に長時間入れる","水から入れて沸騰直前に取り出す","酢を加えて煮る","電子レンジで加熱する"],"answer":1,"explanation":"昆布だしは水から入れ、沸騰直前（約60℃）で取り出すのが最適です。沸騰させると昆布のぬめり・えぐみが出てしまい、雑味になります。30分〜1時間水に浸けてから加熱するとうま味が十分に抽出されます。鰹節は熱湯で短時間が基本です。","frequency":"high","is_trend":false,"frequency_reason":"実技基本"},{"id":"ck_049","subject":"調理理論","question":"寒天とゼラチンの違いとして正しいものはどれか。","choices":["寒天は植物性（テングサ）、ゼラチンは動物性（コラーゲン）","両者とも同じ原料","寒天は動物性、ゼラチンは植物性","原料に違いはない"],"answer":0,"explanation":"寒天は植物性（紅藻類のテングサ等）でアガロースが主成分、80℃以上で溶け30〜40℃で固まります。ゼラチンは動物性（牛骨・豚皮等のコラーゲン）で、50℃前後で溶け15〜20℃で固まります。寒天は弾力なくサクッと、ゼラチンは弾力ありプルッとした食感です。","frequency":"high","is_trend":false,"frequency_reason":"頻出比較"},{"id":"ck_050","subject":"調理理論","question":"調理による食品の色の変化として誤っているものはどれか。","choices":["緑黄色野菜：加熱・酸でクロロフィルがフェオフィチンに変化（褐色化）","肉：加熱でミオグロビンが変性（赤→灰褐色）","エビ・カニ：加熱でアスタキサンチンが遊離（青灰→赤）","じゃがいも：加熱で白色から青色に変化"],"answer":3,"explanation":"じゃがいもは加熱により白色のままです（青色には変化しません）。色の変化は①緑黄色野菜：クロロフィル→フェオフィチン（褐色）②肉：オキシミオグロビン→メトミオグロビン→メトミオクロモーゲン（赤→褐色）③甲殻類：アスタキサンチン-たんぱく質結合→遊離（青灰→赤）等が代表的です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_001","subject":"食文化概論","question":"2013年にユネスコ無形文化遺産に登録されたものはどれか。","choices":["日本料理","和食 ─ 日本人の伝統的な食文化","寿司","懐石料理"],"answer":1,"explanation":"2013年12月、「和食 ─ 日本人の伝統的な食文化」がユネスコ無形文化遺産に登録されました。特徴として①多様で新鮮な食材②栄養バランスのよい食事構成③自然の美しさ・季節感の表現④年中行事との関わり、の4つが挙げられています。","frequency":"high","is_trend":true,"frequency_reason":"最頻出・重要"},{"id":"fc_002","subject":"食文化概論","question":"和食の基本構成「一汁三菜」の組み合わせとして正しいものはどれか。","choices":["主食・汁物・主菜・副菜・副々菜","主食・主菜・副菜・デザート・飲み物","汁物のみ","主食と汁物のみ"],"answer":0,"explanation":"一汁三菜は和食の基本構成で①主食（ご飯）②汁物（味噌汁等）③主菜（魚・肉・卵・大豆等のたんぱく質）④副菜（野菜・海藻等）⑤副々菜（小鉢・漬物等）から成ります。栄養バランスがよく、日本食の理想的な食事形式とされています。","frequency":"high","is_trend":false,"frequency_reason":"和食の基本"},{"id":"fc_003","subject":"食文化概論","question":"懐石料理の起源として正しいものはどれか。","choices":["宮中料理","武家料理","茶の湯（茶懐石）","寺院料理"],"answer":2,"explanation":"懐石料理は茶の湯の席で出される料理「茶懐石」が起源です。「懐石」は禅宗の僧が空腹をしのぐため温石を懐に入れた故事に由来します。一方「会席料理」は酒席のための料理で別系統です。茶懐石は一汁三菜が基本で、千利休によって体系化されました。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_004","subject":"食文化概論","question":"本膳料理の特徴として正しいものはどれか。","choices":["日本料理の正式な饗応料理（武家社会の儀式食）","茶事の料理","禅宗の料理","庶民の日常食"],"answer":0,"explanation":"本膳料理は室町時代に武家の饗応料理として確立した日本料理の正式形式です。本膳・二の膳・三の膳と複数の膳を出し、儀式的・形式的な側面が強い料理です。明治以降簡略化され、現代の正式な和食の基礎となりました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_005","subject":"食文化概論","question":"精進料理の特徴として誤っているものはどれか。","choices":["動物性食品を使わない","植物性食品（野菜・豆・穀類）が中心","五葷（ねぎ・にんにく等）も避ける","魚介類は使用する"],"answer":3,"explanation":"精進料理は仏教の「不殺生戒」に基づき、魚介類を含む動物性食品を一切使用しません。植物性食品（野菜・豆・穀類・海藻・きのこ等）を使用し、五葷（ごくん：ねぎ・にら・にんにく・らっきょう・あさつき）も修行の妨げとして避けます。鎌倉時代に道元によって体系化されました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_006","subject":"食文化概論","question":"会席料理の特徴として正しいものはどれか。","choices":["茶事の料理","酒席の料理（宴会料理）","禅宗の精進料理","武家の儀式料理"],"answer":1,"explanation":"会席料理は酒席（宴会）のための日本料理で、江戸時代に料亭文化の中で発展しました。先付・椀物・向付・焼物・煮物・揚物・蒸物・酢の物・食事・水菓子等の流れで、現代の日本料理店の基本形式となっています。茶懐石（懐石料理）とは目的・内容が異なります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_007","subject":"食文化概論","question":"江戸時代の食文化として正しいものはどれか。","choices":["寿司・天ぷら・そばが屋台で普及","洋食が主流","和食が完成","米食が初めて始まった"],"answer":0,"explanation":"江戸時代（特に後期）には握り寿司・天ぷら・そば等が屋台で広まり、現代の和食文化の基礎が形成されました。江戸っ子のファストフードとも言える存在で、にぎり寿司は華屋与兵衛、江戸前天ぷらは広く屋台で発展しました。料亭文化も江戸時代に確立しました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_008","subject":"食文化概論","question":"明治時代の食文化に関する記述として正しいものはどれか。","choices":["肉食が解禁され洋食化が進んだ","和食のみで洋食は入らなかった","米食が禁止された","すべての伝統食が消滅した"],"answer":0,"explanation":"明治時代（1868〜）には文明開化により肉食解禁（1872年明治天皇による）・洋食導入が進みました。すき焼き・カレーライス・コロッケ・とんかつ・あんパン等の和洋折衷料理が誕生し、現在の日本食文化の多様性の基礎が築かれました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_009","subject":"食文化概論","question":"おせち料理に込められた意味として誤っているものはどれか。","choices":["黒豆 ─ まめに（健康に）暮らす","数の子 ─ 子孫繁栄","昆布巻き ─ 喜ぶ","栗きんとん ─ 健康長寿"],"answer":3,"explanation":"栗きんとんは「金団（きんとん）」が「金の団子」を意味し、金運・財産・繁栄を願う料理です。健康長寿の意味は持ちません。おせち料理は新年を祝う祝い膳で、それぞれの料理に縁起のよい意味が込められており、家族の幸せを祈ります。","frequency":"high","is_trend":false,"frequency_reason":"年中行事頻出"},{"id":"fc_010","subject":"食文化概論","question":"節句と食べ物の組み合わせとして誤っているものはどれか。","choices":["人日の節句（1/7） ─ 七草がゆ","上巳の節句（3/3） ─ ひしもち・ちらし寿司","端午の節句（5/5） ─ ちまき・柏餅","重陽の節句（9/9） ─ おはぎ"],"answer":3,"explanation":"重陽の節句（9月9日・菊の節句）の代表的な食べ物は菊酒・栗ご飯です。おはぎはお彼岸（春・秋）の食べ物です。五節句は①人日（1/7・七草）②上巳（3/3・桃）③端午（5/5・菖蒲）④七夕（7/7・笹）⑤重陽（9/9・菊）で、それぞれに行事食があります。","frequency":"high","is_trend":false,"frequency_reason":"年中行事頻出"},{"id":"fc_011","subject":"食文化概論","question":"土用の丑の日に食べるものとして正しいものはどれか。","choices":["うなぎ","そば","もち","ぜんざい"],"answer":0,"explanation":"土用の丑の日（夏の土用、7月下旬〜8月上旬）にはうなぎを食べる習慣があります。江戸時代に蘭学者・平賀源内が「丑の日にうなぎ」を広めたと伝えられ、夏バテ防止の滋養食として現代まで続いています。土用は四季それぞれにあり「う」のつく食べ物（梅干し・うどん等）も食されました。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_012","subject":"食文化概論","question":"冬至の食べ物として伝統的なものはどれか。","choices":["かぼちゃ・あずきがゆ","うなぎ・梅干し","そば・もち","ぜんざい・おはぎ"],"answer":0,"explanation":"冬至（12月22日頃）にはかぼちゃ（南瓜・なんきん）を食べると風邪を引かない・無病息災となるとされ、あずきがゆも食されます。「ん」のつく食べ物（なんきん・れんこん・にんじん・ぎんなん・きんかん・かんてん・うんどん）を食べると運がよくなる「運盛り」の習慣もあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_013","subject":"食文化概論","question":"お盆の伝統的な食べ物として正しいものはどれか。","choices":["精進料理（殺生を避けた料理）","すき焼き","焼肉","寿司"],"answer":0,"explanation":"お盆（8月13〜16日頃）は先祖の霊を迎える仏教行事で、伝統的に精進料理（動物性食品を避けた料理）が供えられます。精霊馬（きゅうり・なすに割り箸を刺したもの）・そうめん・お団子・季節の野菜等が代表的です。地域により様々な習慣があります。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fc_014","subject":"食文化概論","question":"お祝い事と食べ物の組み合わせとして誤っているものはどれか。","choices":["お食い初め ─ 鯛の塩焼き","七五三 ─ 千歳飴","成人式 ─ 赤飯","還暦 ─ 茶"],"answer":3,"explanation":"還暦（60歳）の祝いには赤いちゃんちゃんこ・赤い座布団等が伝統で、特定の食事はありませんが祝い膳として赤飯・鯛等を用意する習慣があります。「茶」は還暦と関連付けられた特別な食材ではありません。日本では人生の節目ごとに祝い膳を用意する文化があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_015","subject":"食文化概論","question":"北海道の郷土料理として正しいものはどれか。","choices":["石狩鍋・ジンギスカン・ちゃんちゃん焼き","きりたんぽ・いぶりがっこ","深川めし・もんじゃ焼き","明石焼き・たこ焼き"],"answer":0,"explanation":"北海道の代表的な郷土料理は①石狩鍋（鮭・野菜の味噌仕立て）②ジンギスカン（羊肉の焼肉、北海道発祥）③ちゃんちゃん焼き（鮭と野菜の味噌焼き）④三平汁（塩鮭の汁物）等です。海産物・乳製品が豊富で、開拓の歴史を反映した料理が特徴です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_016","subject":"食文化概論","question":"秋田県の郷土料理として正しいものはどれか。","choices":["きりたんぽ鍋・しょっつる鍋・いぶりがっこ","ふぐ料理・もつ鍋","深川めし・佃煮","沖縄そば・ゴーヤチャンプルー"],"answer":0,"explanation":"秋田県の郷土料理は①きりたんぽ鍋（つぶしたご飯を棒に巻き付けて焼いたものの鍋）②しょっつる鍋（ハタハタの魚醤を使った鍋）③いぶりがっこ（燻製大根の漬物）④稲庭うどん（細麺の手延べうどん）等です。米どころの特性を活かした料理が特徴です。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fc_017","subject":"食文化概論","question":"京都の郷土料理として正しいものはどれか。","choices":["京懐石・湯豆腐・賀茂なす料理","水炊き・もつ鍋","深川めし・どじょう鍋","石狩鍋・ジンギスカン"],"answer":0,"explanation":"京都は京料理（京懐石）の発祥地で、湯豆腐・湯葉・京野菜（賀茂なす・聖護院かぶら・京たけのこ等）・おばんざい・西京焼き等の上品で繊細な料理が特徴です。宮中料理・茶の湯・寺院料理の影響を受け、出汁文化が発達しました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_018","subject":"食文化概論","question":"大阪の郷土料理として正しいものはどれか。","choices":["たこ焼き・お好み焼き・きつねうどん・船場汁","ちゃんぽん・皿うどん","深川めし・もんじゃ焼き","水炊き・もつ鍋"],"answer":0,"explanation":"大阪は「天下の台所」と呼ばれた商業都市で、粉もん文化（たこ焼き・お好み焼き）、きつねうどん、船場汁（魚のあらの汁物）、箱寿司、串カツ等の庶民的料理が発達しました。出汁文化（昆布だし）も京都と並んで重要です。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"fc_019","subject":"食文化概論","question":"福岡県（博多）の郷土料理として正しいものはどれか。","choices":["水炊き・もつ鍋・博多ラーメン・明太子","沖縄そば・ゴーヤチャンプルー","深川めし・もんじゃ焼き","石狩鍋・ジンギスカン"],"answer":0,"explanation":"福岡県（博多）の郷土料理は①水炊き（鶏の白濁スープ鍋）②もつ鍋③博多ラーメン（豚骨スープ細麺）④明太子（からし明太子）⑤呼子のいかの活造り等が代表的です。海と山に恵まれ、屋台文化も発達しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_020","subject":"食文化概論","question":"沖縄の郷土料理として正しいものはどれか。","choices":["ゴーヤチャンプルー・沖縄そば・ラフテー","深川めし・もんじゃ焼き","水炊き・もつ鍋","きりたんぽ・しょっつる"],"answer":0,"explanation":"沖縄の郷土料理は①ゴーヤチャンプルー（ゴーヤと豆腐・卵・豚肉の炒め物）②沖縄そば（小麦麺と豚骨だし）③ラフテー（豚の角煮）④ソーキそば⑤海ぶどう⑥タコライス等が特徴です。中国・東南アジア・本土の影響を受けた独自の食文化「琉球料理」が発達しました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_021","subject":"食文化概論","question":"地域の食文化に関する記述として誤っているものはどれか。","choices":["東日本は鰹節中心、西日本は昆布中心の出汁文化","東日本は濃口醤油、西日本は薄口醤油","東日本は丸餅、西日本は角餅","地域による食文化の違いは大きい"],"answer":2,"explanation":"もちは東日本が角餅（切り餅）、西日本が丸餅（手で丸める）が一般的です（逆になっています）。出汁・醤油・もちの形等、東西で食文化に違いがあるのは正しい記述です。これは江戸と上方（京都・大阪）の文化的背景の違いに由来します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_022","subject":"食文化概論","question":"郷土料理が形成された主な要因として誤っているものはどれか。","choices":["気候・風土","地域の食材","宗教・歴史","テレビ番組の影響"],"answer":3,"explanation":"テレビ番組の影響は近現代の現象で、郷土料理形成の主要因ではありません。郷土料理は①気候・風土（寒冷地は煮込み料理・温暖地は生食）②地域の食材③歴史・文化④宗教・信仰⑤交易・他地域との交流等が長い年月をかけて形成したものです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_023","subject":"食文化概論","question":"世界三大料理として一般的に挙げられるものはどれか。","choices":["フランス料理・中国料理・トルコ料理","日本料理・イタリア料理・タイ料理","フランス料理・スペイン料理・インド料理","和食・洋食・中華"],"answer":0,"explanation":"世界三大料理は一般的にフランス料理・中国料理・トルコ料理とされます。それぞれ歴史・技術・多様性で世界の食文化に大きな影響を与えました。フランス料理は2010年に「美食術」、トルコ料理（地中海食の一部）も2013年にユネスコ無形文化遺産に登録されています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_024","subject":"食文化概論","question":"フランス料理の特徴として正しいものはどれか。","choices":["ソース文化が発達","コース料理の体系化","ワインとの調和","以上すべて"],"answer":3,"explanation":"フランス料理は世界の料理の規範ともされ、特徴は①ソース文化の高度な発達（数百種類のソース）②コース料理（オードブル→スープ→魚→肉→デザート）の体系化③ワインとの調和（マリアージュ）④調理技術の体系化（フランス料理用語が世界標準）⑤地方料理の多様性等です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_025","subject":"食文化概論","question":"中国料理の四大料理として正しい組み合わせはどれか。","choices":["北京料理・上海料理・四川料理・広東料理","東京料理・京都料理・大阪料理・福岡料理","北部・南部・東部・西部","フランス・イタリア・スペイン・ドイツ"],"answer":0,"explanation":"中国料理の四大料理は①北京料理（華北・宮廷料理・北京ダック等）②上海料理（華東・上海ガニ・小籠包等）③四川料理（華西・麻婆豆腐・担々麺等の辛い料理）④広東料理（華南・点心・飲茶・酢豚等）です。地域の気候・食材・歴史を反映した独自の発展を遂げました。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_026","subject":"食文化概論","question":"イタリア料理の代表的な特徴として正しいものはどれか。","choices":["パスタ・ピッツァ・オリーブオイル文化","カレー文化","米料理中心","スパイスを使わない"],"answer":0,"explanation":"イタリア料理は①パスタ（数百種類）②ピッツァ（ナポリ発祥）③オリーブオイル文化④トマトソース⑤チーズ（パルミジャーノ・モッツァレラ等）⑥地中海食（健康食として注目）⑦地方料理の多様性等が特徴です。地中海食は2010年ユネスコ無形文化遺産に登録されました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_027","subject":"食文化概論","question":"インド料理の特徴として正しいものはどれか。","choices":["多様なスパイス（カレー文化）","宗教（ヒンドゥー教・イスラム教）の影響大","地方差が大きい（北部はナン・タンドリー、南部は米中心）","以上すべて正しい"],"answer":3,"explanation":"インド料理は①多様なスパイス使用（カレー文化）②宗教の影響（ヒンドゥー教は牛肉禁忌・菜食主義者多数、イスラム教は豚肉禁忌）③地方差が大きい（北部：小麦・ナン・タンドリー料理、南部：米・ココナッツ・魚料理）④チャパティ・ナン等のパン文化等が特徴です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_028","subject":"食文化概論","question":"食文化と宗教の関係として誤っているものはどれか。","choices":["イスラム教徒は豚肉・アルコールを避ける（ハラル食）","ヒンドゥー教徒は牛肉を食べない","ユダヤ教徒はコシェル（カシュルート）の規律がある","仏教徒は全員肉を食べない"],"answer":3,"explanation":"仏教徒全員が肉を食べないわけではありません。日本の仏教は明治以降肉食が一般的で、東南アジアの上座部仏教では肉食は許されています（殺生は避けるが托鉢で得たものは食べる）。宗教と食の関係は教派・地域により異なります。インバウンドや訪日外国人対応で重要な知識です。","frequency":"high","is_trend":true,"frequency_reason":"多文化対応"},{"id":"fc_029","subject":"食文化概論","question":"ハラル（イスラム教の食の規律）に関する記述として正しいものはどれか。","choices":["豚肉・アルコールが禁忌","イスラム教の作法で処理された食肉のみ可","処理から提供までの過程で禁忌物との接触を避ける","以上すべて正しい"],"answer":3,"explanation":"ハラルは「許された」を意味し、イスラム教の食の戒律です。①豚肉・アルコール禁忌②動物は専用の方法で処理（手前に向けて素早く頸動脈切断、神への祈り）③禁忌物との接触禁止（調理器具・食器も別途）④認証制度あり、等が特徴です。訪日ムスリム対応で重要です。","frequency":"medium","is_trend":true,"frequency_reason":"インバウンド対応"},{"id":"fc_030","subject":"食文化概論","question":"ベジタリアン・ヴィーガンに関する記述として誤っているものはどれか。","choices":["ベジタリアンは肉・魚を食べない（卵・乳製品は可・不可で分かれる）","ヴィーガンは動物性食品を一切摂らない","フレキシタリアンは時々肉を食べる柔軟な菜食","全員が同じ食生活をしている"],"answer":3,"explanation":"ベジタリアン・ヴィーガンには様々な分類があります。①ラクト（乳製品可）②オボ（卵可）③ラクト・オボ（両方可）④ペスカタリアン（魚介可）⑤ヴィーガン（一切なし）⑥フルータリアン（果物のみ）等。健康・宗教・環境・動物愛護等動機も多様です。多様な食ニーズへの対応が重要です。","frequency":"medium","is_trend":true,"frequency_reason":"多様な食事ニーズ"},{"id":"fc_031","subject":"食文化概論","question":"和食のマナーとして正しいものはどれか。","choices":["箸を立てる（仏箸）","箸渡し（箸から箸へ料理を渡す）","一口大にして食べる","迷い箸（料理に迷って動かす）"],"answer":2,"explanation":"一口大にして食べるのは正しい和食マナーです。一方、①箸を立てる（仏箸：仏壇の供物の作法）②箸渡し（火葬骨拾いの作法）③迷い箸（食べ物選びで箸を動かす）はいずれも忌み箸（嫌い箸・タブー）です。和食の箸の作法には細かいルールが多くあります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_032","subject":"食文化概論","question":"箸のマナーで「忌み箸（嫌い箸）」として誤っているものはどれか。","choices":["刺し箸（食べ物に箸を刺す）","寄せ箸（箸で食器を引き寄せる）","握り箸(拳で握る)","置き箸（食事中に箸を置く）"],"answer":3,"explanation":"置き箸（食事中に箸を箸置きに置く）は普通の動作で忌み箸ではありません。忌み箸は①刺し箸②寄せ箸③握り箸④涙箸（汁を垂らす）⑤渡し箸（食器の上に箸を渡す）⑥探り箸（中をかき混ぜる）⑦移り箸（料理間を行き来）⑧空箸（食べずに戻す）等多数あり、和食の重要マナーです。","frequency":"high","is_trend":false,"frequency_reason":"マナー頻出"},{"id":"fc_033","subject":"食文化概論","question":"西洋料理（テーブルマナー）の基本として正しいものはどれか。","choices":["ナイフ・フォークは外側から使う","音を立てて食べる","ナプキンは使わない","口を開けて食べる"],"answer":0,"explanation":"西洋料理のテーブルマナーは①ナイフ・フォークは外側から順に使う（コース料理）②音を立てない（特にスープ）③ナプキンは膝の上④口を閉じて食べる⑤食事中はナイフ・フォークを皿に「ハの字」、終了は揃えて並行に置く⑥肘をテーブルにつかない、等が基本です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_034","subject":"食文化概論","question":"中国料理の食事マナーとして正しいものはどれか。","choices":["円卓を時計回りに回す","料理は取り分けて自分の皿に取る","スープ・麺類はレンゲ（散蓮華）を使う","以上すべて正しい"],"answer":3,"explanation":"中国料理（中華）のマナーは①円卓を時計回りに回す（ゲストから順に）②大皿の料理を取り分けて自分の皿に取る③スープ・麺類はレンゲ（散蓮華）を使う④箸は縦に持つことが多い⑤茶を注ぎ合う等の慣習があります。家族・大勢で囲んで食べる文化です。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fc_035","subject":"食文化概論","question":"食前・食後の挨拶として日本特有の習慣はどれか。","choices":["「いただきます」「ごちそうさま」","「サンキュー」「グッドラック」","「メルシー」「ボナペティ」","「お疲れさま」"],"answer":0,"explanation":"「いただきます」「ごちそうさま（でした）」は日本独自の食事の挨拶で、食材・命・調理してくれた人への感謝の気持ちが込められています。「いただきます」は「命をいただく」、「ごちそうさま」は「ご馳走（馳せ走り集めた料理）への感謝」を意味します。和食文化の精神性を表す重要な習慣です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_036","subject":"食文化概論","question":"日本の食料自給率（カロリーベース、近年）として正しいものはどれか。","choices":["約38%","約60%","約80%","約100%"],"answer":0,"explanation":"日本のカロリーベース食料自給率は約38%（2022年度）で、先進国の中で最低水準です。生産額ベースでは約58%（2022年度）。米はほぼ100%自給ですが、小麦・大豆・飼料穀物等の輸入依存度が高いことが要因です。食料安全保障上の重要課題となっています。","frequency":"high","is_trend":true,"frequency_reason":"食料安全保障"},{"id":"fc_037","subject":"食文化概論","question":"フードマイレージとは何か。","choices":["食料の輸送距離×輸送量を示す指標","食料の値段","食料の栄養価","食料の重量"],"answer":0,"explanation":"フードマイレージは食料の輸送距離×輸送量（t・km）を示す指標で、輸送に伴うCO₂排出量・環境負荷を表します。日本は食料輸入が多く、フードマイレージが世界トップクラスです。地産地消はフードマイレージを減らし、環境負荷低減・地域経済活性化につながります。","frequency":"medium","is_trend":true,"frequency_reason":"環境問題"},{"id":"fc_038","subject":"食文化概論","question":"地産地消の意義として誤っているものはどれか。","choices":["新鮮な食材の入手","地域経済の活性化","輸送による環境負荷の低減","食料自給率の低下"],"answer":3,"explanation":"地産地消は食料自給率を高める効果があり、低下させるものではありません。地産地消（その地域で生産されたものをその地域で消費する）の意義は①新鮮な食材②地域経済活性化③輸送負荷（フードマイレージ）低減④食文化継承⑤生産者と消費者の距離縮小⑥食料自給率向上等です。","frequency":"medium","is_trend":true,"frequency_reason":"食育・環境"},{"id":"fc_039","subject":"食文化概論","question":"食品ロス（フードロス）に関する記述として正しいものはどれか。","choices":["日本の食品ロスは年間約500万トン以上","問題ではない","すべて家庭から発生","SDGsとは関係ない"],"answer":0,"explanation":"日本の食品ロスは年間約472万トン（2022年度）で、世界的にも深刻な問題です。事業系約236万トン、家庭系約236万トンで、ほぼ同量です。SDGsの目標12.3（2030年までに食品ロス半減）に位置づけられ、食品ロス削減推進法（2019年施行）等の対策が進められています。","frequency":"high","is_trend":true,"frequency_reason":"SDGs最重要"},{"id":"fc_040","subject":"食文化概論","question":"スローフード運動の提唱国・特徴として正しいものはどれか。","choices":["イタリアで提唱・伝統食文化保護","アメリカで提唱・ファストフード推進","日本で提唱・米食推進","フランスで提唱・ワイン消費促進"],"answer":0,"explanation":"スローフード運動は1986年イタリアでカルロ・ペトリーニにより提唱されました。①消えゆく伝統的な食材・料理を守る②質の良い食材を提供する小生産者を守る③子供を含む消費者に味の教育、を3つの理念とします。ファストフード文化への対抗として始まり世界に広がりました。","frequency":"medium","is_trend":true,"frequency_reason":"食文化保護"},{"id":"fc_041","subject":"食文化概論","question":"食育基本法の目的として正しいものはどれか。","choices":["国民が生涯にわたって健全な心身を培い豊かな人間性を育むための食育推進","食料の自給率向上のみ","学校給食の改善のみ","農業従事者の支援のみ"],"answer":0,"explanation":"食育基本法（2005年制定）の目的は「国民が生涯にわたって健全な心身を培い、豊かな人間性を育むことができるよう、食育を総合的かつ計画的に推進すること」です。家庭・学校・地域・生産者等が連携した取り組みが重要で、食育推進基本計画が5年ごとに策定されます。","frequency":"high","is_trend":true,"frequency_reason":"食育重要"},{"id":"fc_042","subject":"食文化概論","question":"孤食・個食・固食等の現代の食の問題として誤っているものはどれか。","choices":["孤食 ─ 一人で食べること","個食 ─ 家族で異なるものを食べる","固食 ─ 同じものばかり食べる","団食 ─ 大人数で食べる問題"],"answer":3,"explanation":"「団食」という用語は問題ではなく、大人数で食べることはむしろ社会的・栄養的にプラスです。現代の食の問題「こ食」には①孤食（一人）②個食（バラバラ）③固食（同じものばかり）④小食（少なすぎ）⑤粉食（粉物中心）⑥濃食（濃い味）等があり、食育で改善が呼びかけられています。","frequency":"high","is_trend":true,"frequency_reason":"食育問題"},{"id":"fc_043","subject":"食文化概論","question":"グルメブーム・食ブームの動向として近年特徴的なものはどれか。","choices":["SNS映え（インスタ映え）","健康志向（オーガニック・無添加）","プラントベース（植物性食品）","以上すべて"],"answer":3,"explanation":"近年の食トレンドは多様で①SNS映え（写真映え）②健康志向（オーガニック・無添加・低糖質）③プラントベース（植物性肉・植物性ミルク）④地産地消・サステナブル⑤多様な食ニーズ対応（ハラル・ヴィーガン・グルテンフリー等）⑥ファストカジュアル等が特徴です。","frequency":"medium","is_trend":true,"frequency_reason":"食トレンド"},{"id":"fc_044","subject":"食文化概論","question":"調理師法の制定年として正しいものはどれか。","choices":["1958年（昭和33年）","1900年（明治33年）","2000年（平成12年）","2020年（令和2年）"],"answer":0,"explanation":"調理師法は1958年（昭和33年）5月10日に制定されました。これにより日本初の国家資格としての「調理師」が誕生しました。5月10日は「調理師の日」として制定されています。法の目的は「調理師の資格等を定めて調理の業務に従事する者の資質を向上させることにより、調理技術の合理的な発達を図り、国民の食生活の向上に資すること」です。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"fc_045","subject":"食文化概論","question":"調理師免許の取得方法として正しいものはどれか。","choices":["調理師養成施設の卒業","2年以上の実務経験＋調理師試験合格","以上のいずれか","医師免許の取得"],"answer":2,"explanation":"調理師免許の取得方法は2通りで①厚生労働大臣指定の調理師養成施設（調理師学校）を卒業する②飲食店等で2年以上の調理業務経験＋都道府県知事の調理師試験に合格、のいずれかが必要です。免許は都道府県知事が交付します。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_046","subject":"食文化概論","question":"調理師の業務独占について正しい記述はどれか。","choices":["調理師でなければ調理業務はできない","調理師は名称独占資格で、業務独占ではない","調理師でなければ料理を作れない","医師と同じ業務独占資格"],"answer":1,"explanation":"調理師は「名称独占資格」で「業務独占資格」ではありません。つまり、調理師の資格を持たなくても調理業務は行えますが、「調理師」を名乗ることはできません。一方、調理師の設置に努める努力義務が施設にあり、衛生・栄養面での専門性が期待されています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_047","subject":"食文化概論","question":"専門調理師・調理技能士の制度について正しいものはどれか。","choices":["調理師の上位資格である","調理師法・職業能力開発促進法に基づく","日本料理・西洋料理・中国料理・すし料理・麺料理・給食用特殊料理の6種類","以上すべて正しい"],"answer":3,"explanation":"専門調理師・調理技能士は調理師の上位資格で、調理師として実務8年以上等の要件を満たし、技術考査・実技試験に合格すると取得できます。①日本料理②西洋料理③中国料理④すし料理⑤麺料理⑥給食用特殊料理の6種類があり、調理師法と職業能力開発促進法の両方に基づく制度です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_048","subject":"食文化概論","question":"食関連の主要資格として誤っているものはどれか。","choices":["栄養士・管理栄養士（栄養士法）","食品衛生管理者・食品衛生監視員（食品衛生法）","製菓衛生師（製菓衛生師法）","料理研究家（国家資格）"],"answer":3,"explanation":"料理研究家は国家資格ではありません（民間の自称・特定の資格制度はあるが国家資格ではない）。食関連の主要国家資格は①栄養士・管理栄養士②食品衛生監視員・食品衛生管理者③調理師④製菓衛生師⑤フードスペシャリスト等です。それぞれの法令に基づき、専門性を担保しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_049","subject":"食文化概論","question":"ミシュランガイドに関する記述として正しいものはどれか。","choices":["フランスのタイヤ会社が発行する世界的グルメガイド","三つ星が最高評価","日本では2007年から東京版が発行","以上すべて正しい"],"answer":3,"explanation":"ミシュランガイドは1900年にフランスのミシュラン社（タイヤメーカー）がドライバー向けに発行を始めたグルメガイドで、現在は世界的な権威となっています。三つ星（その料理を味わうために旅行する価値のある卓越した料理）が最高評価です。日本版は2007年に東京版から始まり、現在は複数都市版が発行されています。","frequency":"medium","is_trend":true,"frequency_reason":"国際的評価"},{"id":"fc_050","subject":"食文化概論","question":"これからの調理師に求められる資質として誤っているものはどれか。","choices":["調理技術・知識の継続的な向上","食の安全・衛生管理の徹底","多様な食ニーズ（アレルギー・宗教・健康）への対応","個人的な趣味の追求のみ"],"answer":3,"explanation":"調理師は「国民の食生活向上に資する」専門職であり、個人的な趣味追求のみでは不十分です。これからの調理師には①調理技術の継続研鑽②食の安全・衛生管理③栄養・健康への配慮④多様な食ニーズ対応（アレルギー・宗教・ヴィーガン等）⑤食品ロス・環境配慮⑥食文化の継承・発展等の幅広い資質が求められます。","frequency":"high","is_trend":true,"frequency_reason":"専門職の使命"},{"id":"fh_051","subject":"食品衛生学","question":"リステリア菌の特徴として正しいものはどれか。","choices":["低温（4℃以下）では増殖しない","妊婦・免疫低下者に重篤な症状を起こす","加熱に非常に強い","海産物にのみ存在する"],"answer":1,"explanation":"リステリア菌は4℃以下の冷蔵庫内でも増殖できる特殊な細菌で、妊婦・高齢者・免疫低下者に髄膜炎・敗血症等の重篤な症状を起こします。ナチュラルチーズ・生ハム・スモークサーモン等が原因食品として多く、75℃1分以上の加熱で死滅します。","frequency":"medium","is_trend":true,"frequency_reason":"輸入食品関連で注目"},{"id":"fh_052","subject":"食品衛生学","question":"エルシニア食中毒の特徴として正しいものはどれか。","choices":["夏季にのみ発生する","豚肉・豚の腸管が主な感染源で低温でも増殖する","潜伏期間は1〜2時間である","加熱食品のみで発生する"],"answer":1,"explanation":"エルシニアは豚の腸管に多く存在し、豚肉・豚の内臓が主な感染源です。4℃以下の低温でも増殖できる「低温細菌」で、冬季にも発生します。潜伏期間は1〜11日と長く、腹痛・下痢・発熱等の症状が現れます。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fh_053","subject":"食品衛生学","question":"セレウス菌食中毒に関する記述として正しいものはどれか。","choices":["嘔吐型と下痢型の2タイプがある","海産物が主な原因食品である","芽胞を形成しない","夏季にのみ発生する"],"answer":0,"explanation":"セレウス菌食中毒には①嘔吐型（米飯・炒飯等の穀類、毒素は耐熱性）と②下痢型（スープ・肉類等、毒素は熱に弱い）の2タイプがあります。芽胞を形成するため加熱調理後の再加熱でも完全には除菌できません。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_054","subject":"食品衛生学","question":"食中毒の潜伏期間が最も短いものはどれか。","choices":["カンピロバクター（2〜7日）","腸管出血性大腸菌O157（3〜8日）","黄色ブドウ球菌（1〜5時間）","ノロウイルス（24〜48時間）"],"answer":2,"explanation":"黄色ブドウ球菌食中毒の潜伏期間は1〜5時間（平均3時間）と最も短く、エンテロトキシンを摂取して直接発症します。カンピロバクターは2〜7日、O157は3〜8日と長いのが特徴です。","frequency":"high","is_trend":false,"frequency_reason":"比較問題で頻出"},{"id":"fh_055","subject":"食品衛生学","question":"感染型食中毒と毒素型食中毒の違いとして正しいものはどれか。","choices":["感染型は生きた菌が体内で増殖して発症、毒素型は菌が産生した毒素が原因","両者に区別はない","毒素型のほうが治療が簡単","感染型は加熱で予防できない"],"answer":0,"explanation":"感染型食中毒（サルモネラ・カンピロバクター等）は生きた菌が体内に侵入・増殖して発症します。毒素型食中毒（黄色ブドウ球菌・ボツリヌス菌等）は食品中で菌が産生した毒素を摂取して発症するため、加熱で菌を殺しても毒素が残っていれば発症します。","frequency":"high","is_trend":false,"frequency_reason":"分類の基本"},{"id":"fh_056","subject":"食品衛生学","question":"カビ毒（マイコトキシン）として最も危険とされるものはどれか。","choices":["アフラトキシン","ペニシリン","クロロフィル","タンニン"],"answer":0,"explanation":"アフラトキシンはアスペルギルス属カビが産生するカビ毒で、強力な発がん性（肝臓がん）を持ちます。ピーナッツ・トウモロコシ・穀類等の保存中に高温多湿条件で産生されます。加熱では分解されにくいです。","frequency":"high","is_trend":false,"frequency_reason":"カビ毒の代表"},{"id":"fh_057","subject":"食品衛生学","question":"貝毒に関する記述として正しいものはどれか。","choices":["麻痺性貝毒と下痢性貝毒の2種類が主要である","加熱すれば貝毒は分解される","貝毒は一年中同程度に含まれる","内臓以外には貝毒は含まれない"],"answer":0,"explanation":"貝毒は①麻痺性貝毒（神経症状・呼吸麻痺）と②下痢性貝毒（消化器症状）が主要です。有毒藻類を食べた二枚貝に蓄積し、加熱しても分解されません。春〜初夏の赤潮発生時期に多く、行政の出荷規制が行われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_058","subject":"食品衛生学","question":"食品表示法（2015年施行）が統合した法律として正しい組み合わせはどれか。","choices":["食品衛生法・JAS法・健康増進法の食品表示関連部分","食品安全基本法・農薬取締法","薬機法・消費者契約法","景品表示法・不正競争防止法"],"answer":0,"explanation":"食品表示法（2015年4月施行）は、それまで食品衛生法・JAS法・健康増進法の3つに分散していた食品表示に関する規定を一元化した法律です。消費者庁が所管しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_059","subject":"食品衛生学","question":"加工食品の原材料表示の原則として正しいものはどれか。","choices":["重量の多い順に表示する","アルファベット順に表示する","製造者が自由に並べてよい","添加物は表示不要"],"answer":0,"explanation":"加工食品の原材料表示は食品表示法に基づき、原材料を重量の多い順（降順）に表示することが義務付けられています。また添加物は原材料と明確に区分して表示します。","frequency":"high","is_trend":false,"frequency_reason":"表示ルール基本"},{"id":"fh_060","subject":"食品衛生学","question":"栄養成分表示の義務化について正しいものはどれか。","choices":["2015年以降、一般用加工食品への栄養成分表示が義務化された","任意表示のまま変更なし","飲料のみ義務化","生鮮食品も義務化された"],"answer":0,"explanation":"食品表示法により2015年から一般用加工食品への栄養成分表示が義務化されました。熱量・たんぱく質・脂質・炭水化物・食塩相当量の5項目が必須表示です。","frequency":"medium","is_trend":true,"frequency_reason":"比較的新しい義務化"},{"id":"fh_061","subject":"食品衛生学","question":"遺伝子組換え食品（GMO）の表示に関する記述として正しいものはどれか。","choices":["全ての食品に表示義務がある","大豆・とうもろこし等の一部農産物と加工食品に表示が必要","遺伝子組換えでないものには表示できない","日本では全面禁止されている"],"answer":1,"explanation":"遺伝子組換え食品の表示は大豆・とうもろこし・ばれいしょ等9品目の農産物とそれを主な原材料とする加工食品に義務付けられています。2023年より任意表示の基準が厳格化されました。","frequency":"medium","is_trend":true,"frequency_reason":"基準変更で注目"},{"id":"fh_062","subject":"食品衛生学","question":"有機JAS（オーガニック）認証に関する記述として正しいものはどれか。","choices":["農薬・化学肥料を原則使用せず生産された農産物等が対象","誰でも「有機」と表示できる","輸入農産物は対象外","加工食品には適用されない"],"answer":0,"explanation":"有機JAS認証は農林水産大臣が登録した認定機関が審査し、化学農薬・化学肥料等を原則使用しない農業で生産された農産物・加工食品等に付与されます。認証を受けていない食品への「有機」表示は禁止されています。","frequency":"medium","is_trend":true,"frequency_reason":"有機食品需要増加"},{"id":"fh_063","subject":"食品衛生学","question":"食品添加物の一日摂取許容量（ADI）の説明として正しいものはどれか。","choices":["人が一生涯毎日摂取しても健康への悪影響がないと推定される一日当たりの摂取量","一回の食事で摂取してよい最大量","週に摂取してよい総量","添加物を使用できる最大濃度"],"answer":0,"explanation":"ADI（Acceptable Daily Intake）は人が一生涯にわたって毎日摂取し続けても健康上の悪影響が認められないと推定される一日当たりの摂取量です。動物実験で得た無毒性量（NOAEL）に安全係数（通常100）を除して算出されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_064","subject":"食品衛生学","question":"亜硝酸塩（亜硝酸ナトリウム）が食肉加工品に使用される目的として正しいものはどれか。","choices":["発色剤として肉の赤色を保ち、ボツリヌス菌増殖抑制に使用される","甘味付与のため","食感改善のため","保水目的のみ"],"answer":0,"explanation":"亜硝酸ナトリウムは食肉加工品で①発色剤（ミオグロビンと反応して鮮やかな赤色を保つ）②ボツリヌス菌増殖抑制③酸化防止の目的で使用されます。使用基準（残存量70ppm以下等）の範囲内で安全に使用されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_065","subject":"食品衛生学","question":"大量調理施設衛生管理マニュアルにおける二次汚染防止の原則として正しいものはどれか。","choices":["加熱前食品と加熱後食品は同じ調理台で扱ってよい","非汚染作業区域と汚染作業区域を明確に区分する","生野菜はどこで洗浄してもよい","肉と魚は同じまな板で処理できる"],"answer":1,"explanation":"大量調理施設では汚染作業区域（検収・下処理場等）と非汚染作業区域（調理場・配膳場等）を明確に区分し、食品・器具・人の動線を一方通行にすることが二次汚染防止の基本です。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_066","subject":"食品衛生学","question":"食器・調理器具の洗浄・消毒の手順として正しいものはどれか。","choices":["消毒→洗浄→すすぎの順","洗浄→すすぎ→消毒→乾燥の順","すすぎ→洗浄→消毒の順","洗浄のみで消毒は不要"],"answer":1,"explanation":"食器・調理器具の衛生管理の正しい手順は①洗浄②すすぎ③消毒（熱湯・次亜塩素酸ナトリウム等）④乾燥の順です。消毒前に洗浄・すすぎを確実に行わないと消毒効果が下がります。","frequency":"high","is_trend":false,"frequency_reason":"実務基本"},{"id":"fh_067","subject":"食品衛生学","question":"食品取扱施設のまな板管理として正しいものはどれか。","choices":["素材は木製が最も衛生的","肉・魚・野菜・加熱後食品で色分けして使い分ける","週1回の洗浄で十分","傷がついたものも継続使用できる"],"answer":1,"explanation":"まな板は肉用・魚用・野菜用・加熱後食品用など色分けして使い分けることが食中毒予防の基本です。木製まな板は傷に細菌が入り込みやすいため、業務用にはポリエチレン等の合成樹脂製が推奨されます。","frequency":"high","is_trend":false,"frequency_reason":"実務頻出"},{"id":"fh_068","subject":"食品衛生学","question":"アレルギー対応食品の調理における注意点として誤っているものはどれか。","choices":["アレルゲンを含む食品と共通の調理器具は洗浄・消毒が必要","アレルゲン除去食は通常食と分けて調理する","少量のアレルゲン混入でも重篤な症状が起こりうる","表面に付着した程度のアレルゲンは問題ない"],"answer":3,"explanation":"食物アレルギーは微量のアレルゲン（数mg以下）でもアナフィラキシーを起こす場合があります。調理器具・食器への付着（コンタミネーション）も危険で、共用した場合は十分な洗浄・消毒が必要です。","frequency":"high","is_trend":true,"frequency_reason":"アレルギー対応重要"},{"id":"fh_069","subject":"食品衛生学","question":"食品安全基本法（2003年施行）の特徴として正しいものはどれか。","choices":["食品安全委員会の設置とリスク分析の導入","食品の製造を規制する法律","輸入食品のみを対象とした法律","食品表示のみを規制する"],"answer":0,"explanation":"食品安全基本法（2003年）はBSE問題を契機に制定され、リスク分析の枠組みを導入し、食品安全委員会を設置しました。国・地方・事業者・消費者の役割と責務を定めています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_070","subject":"食品衛生学","question":"食品衛生法の2018年大改正で追加・強化された内容として正しいものはどれか。","choices":["HACCP義務化・輸入食品の安全管理強化・営業許可業種の見直し等が含まれる","罰則の廃止","食品添加物の全面禁止","輸入食品の全面禁止"],"answer":0,"explanation":"2018年の食品衛生法大改正（2021年6月完全施行）の主な内容は①HACCP義務化②営業許可・届出制度の見直し③輸入食品の安全管理強化④食品リコール情報の届出義務化⑤器具・容器包装のポジティブリスト制度導入等です。","frequency":"high","is_trend":true,"frequency_reason":"重要法改正"},{"id":"fh_071","subject":"食品衛生学","question":"ノロウイルス感染者が嘔吐した場合の処理方法として正しいものはどれか。","choices":["素手で拭き取ればよい","使い捨て手袋・マスク着用で1000ppm次亜塩素酸ナトリウムで処理する","水洗いのみで十分","換気は不要"],"answer":1,"explanation":"ノロウイルスの嘔吐物処理は①使い捨て手袋・マスク・エプロン着用②嘔吐物をペーパータオルで外側から内側へ拭き取り③1000ppm次亜塩素酸ナトリウムで消毒④使用したものはビニール袋に密封廃棄⑤十分な換気の手順が重要です。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_072","subject":"食品衛生学","question":"ノロウイルス感染者の就業制限について正しいものはどれか。","choices":["症状消失後も少なくとも1週間は調理業務を制限すべきである","下痢が止まれば翌日から復帰できる","無症状感染者は制限不要","ウイルス検査は不要"],"answer":0,"explanation":"ノロウイルス感染者は症状消失後も1週間程度ウイルスを排出し続けます。大量調理施設では症状消失後も少なくとも1週間は調理業務に就かせないことが推奨されています。","frequency":"high","is_trend":false,"frequency_reason":"実務重要"},{"id":"fh_073","subject":"食品衛生学","question":"食品の腐敗と発酵の違いとして正しいものはどれか。","choices":["腐敗は有害物質が生成され食用不可、発酵は有用物質が生成され食用可","両者は全く同じ現象","発酵のほうが有害","腐敗は高温でのみ起こる"],"answer":0,"explanation":"腐敗と発酵はどちらも微生物が食品成分を分解する現象ですが、腐敗は有害物質（腐敗アミン・硫化水素等）が生成され食用不可、発酵は有用な物質（乳酸・アルコール・酢酸等）が生成されます。","frequency":"high","is_trend":false,"frequency_reason":"重要な区別"},{"id":"fh_074","subject":"食品衛生学","question":"フードディフェンス（食品防御）の概念として正しいものはどれか。","choices":["意図的な食品への異物・毒物混入を防ぐ取り組み","食品ロスを防ぐ取り組み","食品の腐敗を防ぐ衛生管理","食品添加物から消費者を守る"],"answer":0,"explanation":"フードディフェンスは、食品への悪意ある（意図的な）異物混入・毒物添加等から食品を守るための取り組みです。HACCPが非意図的な汚染を防ぐのに対し、フードディフェンスは意図的な脅威を対象とします。","frequency":"medium","is_trend":true,"frequency_reason":"食品テロ対策"},{"id":"fh_075","subject":"食品衛生学","question":"食品の自主回収（リコール）情報の届出に関する記述として正しいものはどれか。","choices":["全ての回収案件で届出が必要である","健康被害のおそれがある場合のみ届出する","食品表示法違反は対象外である","届出は任意である"],"answer":0,"explanation":"2021年6月の改正食品衛生法により、食品衛生法・食品表示法違反による自主回収は行政への届出が義務化されました。対象案件は全て届出し、消費者庁・厚労省のウェブサイトで公表されます。","frequency":"medium","is_trend":true,"frequency_reason":"2021年制度化"},{"id":"fh_076","subject":"食品衛生学","question":"BSE（牛海綿状脳症）に関する記述として正しいものはどれか。","choices":["プリオンという異常たんぱく質が原因で、加熱でも分解されない","ウイルスが原因","日本では発生したことがない","肉の色で安全性が判断できる"],"answer":0,"explanation":"BSEは異常プリオンたんぱく質が原因の伝達性海綿状脳症で、通常の加熱・消毒・放射線処理では不活化できません。日本でも2001年に初発生が確認され、食品安全基本法制定のきっかけとなりました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_077","subject":"食品衛生学","question":"食品の異物混入防止対策として正しいものはどれか。","choices":["金属異物は金属探知機で検出できる","ガラス・石・硬質プラスチックはX線検査で検出できる","生物的異物（虫等）は目視のみで検出できる","以上すべて正しい対策である"],"answer":3,"explanation":"食品の異物混入防止には①金属探知機（金属系異物）②X線検査装置（ガラス・石・硬質樹脂等）③目視検査（虫・毛髪等）等の複数の手段を組み合わせることが重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_078","subject":"食品衛生学","question":"コーデックス委員会（Codex Alimentarius Commission）の役割として正しいものはどれか。","choices":["FAO・WHOが合同設立した国際食品規格委員会で食品の国際基準を策定","日本独自の食品安全機関","食品製造業者の団体","薬の認証機関"],"answer":0,"explanation":"コーデックス委員会はFAOとWHOが1963年に共同設立した国際機関で、食品の安全性・品質・公正な貿易を目的に食品規格・衛生規範・農薬残留基準等の国際標準を策定しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_079","subject":"食品衛生学","question":"特定給食施設の定義として正しいものはどれか。","choices":["1回100食以上または1日250食以上を供給する特定多数向けの継続的食事提供施設","レストランや居酒屋も含まれる","家庭での食事提供も対象","年1回以上の食事提供施設"],"answer":0,"explanation":"特定給食施設とは健康増進法に基づき、特定多数の者に対して継続的に食事を供給する施設のうち1回100食以上または1日250食以上を供給するものです。病院・学校・事業所・高齢者施設等が対象です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_080","subject":"食品衛生学","question":"病院食（治療食）における食品衛生管理の特徴として正しいものはどれか。","choices":["免疫力低下患者がいるため一般施設より厳格な衛生管理が必要","一般の飲食店と同等の管理でよい","生食の提供が推奨される","衛生管理基準は緩い"],"answer":0,"explanation":"病院食は免疫機能が低下した患者（高齢者・化学療法中・術後患者等）に提供するため、一般施設より厳格な衛生管理が必要です。生野菜サラダや生卵の提供は制限される場合があり、加熱を中心とした献立が重要です。","frequency":"medium","is_trend":true,"frequency_reason":"病院SE関連"},{"id":"fh_081","subject":"食品衛生学","question":"食品事業者における自主衛生管理の重要性として正しいものはどれか。","choices":["法令遵守だけで十分で自主管理は不要","HACCP・GMP等の自主的な衛生管理システムの構築が食品安全の基盤となる","行政の検査さえあれば自主管理は不要","自主管理は中小企業のみが行うもの"],"answer":1,"explanation":"食品安全は行政の監視・規制だけでなく、事業者自身によるHACCP・GMP等の自主的な衛生管理システムの構築・運用が基盤です。2021年のHACCP完全義務化もこの方向性の延長線上にあります。","frequency":"high","is_trend":true,"frequency_reason":"HACCP義務化後の課題"},{"id":"fh_082","subject":"食品衛生学","question":"食品トレーサビリティ制度の対象として現在義務化されているものはどれか。","choices":["牛肉・米","豚肉・鶏肉","野菜・果物","加工食品全般"],"answer":0,"explanation":"日本でトレーサビリティが法律で義務化されているのは①牛肉（牛トレーサビリティ法、2003年）と②米・米加工品（米トレーサビリティ法、2010年）です。他の食品は任意です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_083","subject":"食品衛生学","question":"食品ロス削減推進法（2019年施行）に関する記述として正しいものはどれか。","choices":["食品事業者にのみ義務がある","国民一人ひとりの自主的取組を求める","罰則規定が中心である","飲食店の営業時間を制限する"],"answer":1,"explanation":"食品ロス削減推進法（2019年10月施行）は、国・地方公共団体・事業者・消費者一体となった取組を促進する基本法です。罰則規定はなく、国民一人ひとりの自主的取組を求める性格の法律です。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs関連"},{"id":"fh_084","subject":"食品衛生学","question":"食品の放射線照射（放射線殺菌）の日本での状況として正しいものはどれか。","choices":["じゃがいもの発芽防止のみ許可されている","全ての食品への使用が認められている","放射線照射食品の輸入は禁止","放射線照射は法律で全面禁止"],"answer":0,"explanation":"日本では食品への放射線照射はじゃがいもの発芽防止のみ認められています（コバルト60のγ線、0.15kGy以下）。照射食品には表示義務があります。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fh_085","subject":"食品衛生学","question":"食中毒が発生した場合の報告義務として正しいものはどれか。","choices":["医師は食中毒患者を診断したら保健所に届け出る義務がある","報告は任意","事業者のみが報告する","患者が自分で届け出る"],"answer":0,"explanation":"食品衛生法により、食中毒患者・死者を診断した医師は直ちに保健所長に届け出る義務があります。保健所は調査・原因究明を行い、都道府県知事を通じて厚生労働大臣に報告されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_086","subject":"食品衛生学","question":"食中毒の原因施設として最も多い場所はどれか（近年の傾向）。","choices":["飲食店","家庭","学校給食","食品製造業"],"answer":0,"explanation":"食中毒の発生場所（原因施設）は飲食店が最も多く、全体の50〜60%を占めます。次いで家庭・仕出し屋・旅館等が多くなっています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_087","subject":"食品衛生学","question":"食品中のアクリルアミドに関する記述として正しいものはどれか。","choices":["生食の野菜に多く含まれる","高温加熱（揚げる・焼く等）で糖とアミノ酸が反応して生成される","添加物として意図的に使用される","水産物の加工で特異的に生成される"],"answer":1,"explanation":"アクリルアミドはでんぷん質の多い食品を高温（120℃以上）で加熱調理した際に、アスパラギン（アミノ酸）と還元糖がメイラード反応の過程で生成されます。ポテトチップス・フライドポテト・パン等に含まれます。","frequency":"medium","is_trend":true,"frequency_reason":"加工食品の安全で注目"},{"id":"fh_088","subject":"食品衛生学","question":"食品営業施設の水の使用に関する記述として正しいものはどれか。","choices":["井戸水は無条件で使用できる","水道水は原則使用できるが、井戸水等は水質検査が必要","水道水以外の使用は全面禁止","水質検査は10年に1回でよい"],"answer":1,"explanation":"食品営業施設での水は水道水または水道法の水質基準に適合した水を使用する必要があります。井戸水・地下水等を使用する場合は年1回以上の水質検査が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_089","subject":"食品衛生学","question":"食品の製造所固有記号に関する記述として正しいものはどれか。","choices":["製造者名・住所の代わりに使用できる記号","添加物の略称","賞味期限の表示方法","産地を示す記号"],"answer":0,"explanation":"製造所固有記号は、同一企業の複数の製造所がある場合に製造者名・所在地の代わりに使用できる記号です。消費者庁に届出が必要で、パッケージのスペースが限られる小包装製品等で活用されています。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fh_090","subject":"食品衛生学","question":"プラスチック容器包装と食品安全の関係として正しいものはどれか。","choices":["食品用プラスチック容器に規格基準はない","溶出規格・材質基準等が食品衛生法で定められている","全ての容器に食品への使用が認められている","電子レンジ対応容器はどの食品にも使用できる"],"answer":1,"explanation":"食品用プラスチック容器・包装材は食品衛生法により材質基準・溶出試験規格が定められています。2020年6月からポジティブリスト制度が導入され、使用が認められた物質のみ使用可能となりました。","frequency":"medium","is_trend":true,"frequency_reason":"容器包装規制強化"},{"id":"fh_091","subject":"食品衛生学","question":"放射性物質の食品への基準値（一般食品）として正しいものはどれか。","choices":["セシウム134+137で100Bq/kg","1000Bq/kg","基準値はない","色や臭いで判断できる"],"answer":0,"explanation":"2012年4月から食品中の放射性セシウムの基準値が強化されました。一般食品：100Bq/kg、飲料水：10Bq/kg、乳児用食品・牛乳：50Bq/kgと定められています。放射性物質は色・臭い・味では検知できません。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_092","subject":"食品衛生学","question":"食品事業者の自主回収（リコール）について正しいものはどれか。","choices":["健康に影響ある食品衛生法違反等の場合、届出が義務化されている","自主回収は任意で届出不要","届出は消費者からの申告のみ","食品メーカーのみが対象"],"answer":0,"explanation":"2021年の改正食品衛生法により、食品衛生法・食品表示法違反による自主回収のうちクラスⅠ・Ⅱに該当するものは行政への届出が義務化されました。届出情報は消費者庁等のウェブサイトで公表されます。","frequency":"medium","is_trend":true,"frequency_reason":"2021年義務化"},{"id":"fh_093","subject":"食品衛生学","question":"大量調理施設の検食（保存食）の保存に関する記述として正しいものはどれか。","choices":["原材料・調理済み食品を50g以上、マイナス20℃以下で2週間以上保存する","調理済み食品のみ100g保存する","常温で1週間保存する","保存は任意である"],"answer":0,"explanation":"大量調理施設衛生管理マニュアルでは、原材料及び調理済み食品を食品ごとに50g程度を清潔な容器に入れ、マイナス20℃以下で2週間以上保存することが定められています。食中毒発生時の原因究明のために重要です。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_094","subject":"食品衛生学","question":"食品の冷却作業の温度・時間管理として正しいものはどれか。","choices":["調理後30分以内に20℃付近まで、または60分以内に10℃以下に急速冷却する","常温で2時間以内に冷ます","冷却基準はない","冷蔵庫に入れれば時間は問わない"],"answer":0,"explanation":"大量調理施設衛生管理マニュアルでは、調理後の食品の中心温度を①30分以内に20℃付近まで、または②60分以内に10℃以下まで急速冷却することが推奨されます。細菌が増殖しやすい危険温度帯（10〜60℃）を速やかに通過させるためです。","frequency":"high","is_trend":false,"frequency_reason":"実務必須"},{"id":"fh_095","subject":"食品衛生学","question":"ねずみ・害虫（ゴキブリ等）対策として正しいものはどれか。","choices":["食品残渣を厨房内に放置して誘引してから駆除する","侵入防止・発生防止・駆除の3段階対策が基本","農薬を食品に直接かける","定期的な駆除は不要"],"answer":1,"explanation":"施設の防虫・防鼠対策は①侵入防止（隙間のふさぎ・防虫網等）②発生防止（食品残渣の除去・清潔維持）③駆除（粘着トラップ・薬剤処理）の3段階が基本です。食品に直接農薬をかけることは絶対禁止です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_096","subject":"食品衛生学","question":"厨房の換気・空調管理として正しいものはどれか。","choices":["換気は調理中のみ行えばよい","排気量より給気量を多くすると陽圧になり外からの虫・埃侵入を防げる","空調フィルターの清掃は年1回でよい","換気は食品衛生と無関係"],"answer":1,"explanation":"清潔区域（調理場等）は陽圧（排気量＜給気量）にすることで外部からの汚染空気・虫・埃の侵入を防ぎます。空調フィルターの定期清掃はカビ・細菌の繁殖防止のため月1回程度が推奨されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_097","subject":"食品衛生学","question":"フードチェーンにおける食品衛生管理の考え方として正しいものはどれか。","choices":["生産・加工・流通・販売・消費の各段階で一貫した衛生管理が必要（Farm to Fork）","加工段階のみ管理すればよい","消費段階のみ管理すればよい","販売段階の管理のみで十分"],"answer":0,"explanation":"Farm to Fork（農場から食卓まで）の概念は、生産・加工・流通・販売・消費の全段階で一貫した食品安全管理を行う考え方です。GAP・GMP・HACCP等を各段階で実施することが食品安全の基本です。","frequency":"medium","is_trend":true,"frequency_reason":"食の安全の包括的視点"},{"id":"fh_098","subject":"食品衛生学","question":"食品衛生責任者に関する記述として正しいものはどれか（fh_098）。","choices":["国家資格である","飲食店等の営業許可施設に1名以上配置義務がある","調理師資格と同じである","設置は任意である"],"answer":1,"explanation":"食品衛生責任者は飲食店等の営業許可施設に1名以上配置することが食品衛生法で義務付けられています。調理師・栄養士等の有資格者または都道府県の養成講習会受講者が就任できます。国家資格ではなく、調理師資格とは別の制度です。","frequency":"high","is_trend":false,"frequency_reason":"実務直結"},{"id":"fh_099","subject":"食品衛生学","question":"集団食中毒の定義として正しいものはどれか。","choices":["同一の飲食物を摂取した2名以上が同様の症状を呈した場合","100人以上の患者が出た場合","1人でも食中毒症状が出た場合","入院患者が出た場合のみ"],"answer":0,"explanation":"食中毒は同一の食品・飲料水を摂取した2名以上が同様の消化器系症状を呈した場合（1名でも死亡があれば1名でも）を集団食中毒として取り扱います。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fh_100","subject":"食品衛生学","question":"調理師に求められる食品衛生の基本姿勢として最も適切なものはどれか。","choices":["法律で定められた最低基準を守ればよい","食中毒は運が悪い場合に起きるものなので予防は難しい","食べる人の健康と安全を守るため、自主的・積極的に衛生管理を実践する","衛生管理は検査機関に任せる"],"answer":2,"explanation":"調理師は食品衛生の専門職として、単に法令の最低基準を守るだけでなく、食べる人の健康と安全を守るために自主的・積極的に衛生管理を実践する姿勢が求められます。HACCPの考え方を日々の調理に活かすことが調理師の使命です。","frequency":"high","is_trend":true,"frequency_reason":"調理師の使命"},{"id":"fs_051","subject":"食品学","question":"食品の機能として「三次機能」に該当するものはどれか。","choices":["栄養機能（エネルギー・栄養素供給）","感覚機能（味・香り・外観）","生体調節機能（疾病予防・健康維持）","消化吸収機能"],"answer":2,"explanation":"食品の機能は①一次機能：栄養機能②二次機能：感覚機能（嗜好性）③三次機能：生体調節機能（免疫調節・疾病予防・体調調節等）に分類されます。三次機能を発揮する成分を機能性成分といい、特定保健用食品・機能性表示食品の科学的根拠となります。","frequency":"high","is_trend":true,"frequency_reason":"機能性食品の基礎"},{"id":"fs_052","subject":"食品学","question":"ポリフェノールの主な作用として正しいものはどれか。","choices":["抗酸化作用","脂質を増やす作用","血糖値を上げる作用","骨を溶かす作用"],"answer":0,"explanation":"ポリフェノールは植物に含まれる色素・苦み・渋み成分で、強い抗酸化作用を持ちます。フラボノイド類（カテキン・アントシアニン・イソフラボン等）等5000種以上が知られています。緑茶・赤ワイン・チョコレート・ベリー類等に豊富です。","frequency":"high","is_trend":true,"frequency_reason":"機能性で注目"},{"id":"fs_053","subject":"食品学","question":"大豆イソフラボンに関する記述として正しいものはどれか。","choices":["女性ホルモン（エストロゲン）様作用を持つファイトエストロゲンである","たんぱく質の一種である","加熱で全て破壊される","男性にのみ有効な成分"],"answer":0,"explanation":"大豆イソフラボン（ゲニステイン・ダイゼイン等）は植物性エストロゲン（ファイトエストロゲン）として女性ホルモン様作用を持ちます。更年期症状の緩和・骨粗鬆症予防・動脈硬化予防等の効果が期待されています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fs_054","subject":"食品学","question":"ブルーベリー・赤キャベツの紫色を作る色素はどれか。","choices":["クロロフィル","カロテノイド","アントシアニン","クルクミン"],"answer":2,"explanation":"アントシアニンはフラボノイドの一種で、ブルーベリー・赤キャベツ・なす・黒豆・赤ワイン等の紫〜赤色を呈する色素です。抗酸化作用・視機能改善・抗炎症作用等が知られています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_055","subject":"食品学","question":"カプサイシンに関する記述として正しいものはどれか。","choices":["唐辛子の辛味成分で体温上昇・脂肪燃焼促進作用がある","にんにくの辛味成分である","甘味を呈する","加熱で強くなる"],"answer":0,"explanation":"カプサイシンは唐辛子の辛味成分で、舌のバニロイド受容体に結合して辛味・灼熱感を引き起こします。交感神経を刺激して体温上昇・代謝促進・脂肪燃焼促進効果があるとされます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_056","subject":"食品学","question":"プレバイオティクスとして機能するものはどれか。","choices":["腸内の有益な細菌の増殖を促進するオリゴ糖・食物繊維","腸内細菌を殺す成分","消化管を直接修復する成分","血糖を上げる成分"],"answer":0,"explanation":"プレバイオティクスは腸内の有益な細菌（ビフィズス菌・乳酸菌等）を選択的に増殖・活性化する食品成分で、フラクトオリゴ糖・ガラクトオリゴ糖・イヌリン・食物繊維等が該当します。プロバイオティクス（有益な菌そのもの）との区別が重要です。","frequency":"medium","is_trend":true,"frequency_reason":"腸内環境で注目"},{"id":"fs_057","subject":"食品学","question":"グルテンとパン生地の関係として正しいものはどれか。","choices":["グルテンはガスを保持して生地を膨らませる","グルテンは生地を硬くするのみ","グルテンは水に完全に溶ける","グルテンは加熱で消える"],"answer":0,"explanation":"グルテンは粘弾性のある網目構造を形成し、酵母が発生するCO₂ガスを保持して生地を膨らませます。グルテンの弾力性でガスが逃げず、焼成中に熱で固まってパンの骨格となります。強力粉を使用するのはグルテン量が多くパンに適した生地ができるためです。","frequency":"high","is_trend":false,"frequency_reason":"調理理論と連携"},{"id":"fs_058","subject":"食品学","question":"でんぷんの「糊化（α化）」と「老化（β化）」の関係として正しいものはどれか。","choices":["老化したでんぷんは加熱するとα化（糊化）に戻る","老化は元に戻らない","糊化は加熱なしで起こる","老化は水分がなくても進む"],"answer":0,"explanation":"でんぷんは生の状態（β）→加熱でα化（糊化）→冷却でβ化（老化）と変化しますが、老化したでんぷんも再加熱すると再びα化して食べやすくなります。電子レンジで冷やご飯を温めるのはこの原理です。","frequency":"high","is_trend":false,"frequency_reason":"調理と連携"},{"id":"fs_059","subject":"食品学","question":"お茶の種類（緑茶・烏龍茶・紅茶）の違いを生む主な要因はどれか。","choices":["原料が違う植物である","製造過程での発酵・酸化度の違い（緑茶：不発酵・烏龍茶：半発酵・紅茶：完全発酵）","産地が違うだけ","水色（すいしょく）は同じ"],"answer":1,"explanation":"緑茶・烏龍茶・紅茶はいずれも同じ茶の木（Camellia sinensis）の葉を原料としますが、製造過程での発酵（酸化）度が異なります：緑茶（不発酵）、烏龍茶（半発酵）、紅茶（完全発酵）。","frequency":"high","is_trend":false,"frequency_reason":"お茶の種類は頻出"},{"id":"fs_060","subject":"食品学","question":"赤身魚と白身魚の違いとして正しいものはどれか。","choices":["ミオグロビン含量の多少による色の違いで、赤身魚はEPA・DHAが豊富","加熱すると逆の色になる","白身魚のほうがたんぱく質が多い","赤身魚は脂質が少ない"],"answer":0,"explanation":"赤身魚（マグロ・カツオ・ブリ・サバ等）と白身魚（タイ・ヒラメ・タラ等）の違いはミオグロビン（筋肉色素タンパク）の含量です。赤身魚は回遊魚に多くEPA・DHAが豊富で脂質も多めです。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fs_061","subject":"食品学","question":"コラーゲンに関する記述として正しいものはどれか。","choices":["動物の骨・皮・腱に多く含まれ、加熱するとゼラチンに変わる","植物に多く含まれる","加熱しても変化しない","必須アミノ酸を全て含む完全たんぱく質"],"answer":0,"explanation":"コラーゲンは動物の骨・皮・腱・軟骨等の結合組織に多く含まれる繊維状たんぱく質です。加熱（長時間の煮込み）するとゼラチンに変化します。トリプトファンをほとんど含まないため不完全たんぱく質です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_062","subject":"食品学","question":"みその原料と製造に関する記述として正しいものはどれか。","choices":["大豆・塩・麹を原料とし、麹菌の酵素でたんぱく質・でんぷんを分解して熟成させる","米・水・酵母のみで作る","加熱殺菌のみで製造される","酢酸発酵で作られる"],"answer":0,"explanation":"みそは大豆（または大豆＋米・麦）・塩・麹を原料とし、麹菌が産生するプロテアーゼ・アミラーゼ等の酵素がたんぱく質・でんぷんを分解し、乳酸菌・酵母による発酵が加わって複雑な旨味・風味が生まれます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_063","subject":"食品学","question":"食酢（醸造酢）の主成分はどれか。","choices":["乳酸","酢酸（アセティックアシッド）","クエン酸","リンゴ酸"],"answer":1,"explanation":"食酢（醸造酢）の主成分は酢酸（アセティックアシッド）で、酢酸菌がアルコールを酸化して産生します。米酢・りんご酢・ワインビネガー等の種類によりクエン酸・リンゴ酸等の有機酸も含み、風味が異なります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_064","subject":"食品学","question":"レトルト食品の定義として正しいものはどれか。","choices":["気密性・遮光性の容器に密封し、加圧加熱殺菌（120℃・4分相当以上）した食品","冷凍食品の一種","乾燥食品の一種","缶詰と全く同じ製品"],"answer":0,"explanation":"レトルト食品は食品衛生法上「容器包装詰加圧加熱殺菌食品」と定義され、気密性・遮光性のある軟包装容器等に食品を密封し、120℃4分相当以上の加圧加熱殺菌を施した常温保存可能な食品です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_065","subject":"食品学","question":"フリーズドライ（凍結乾燥）食品の特徴として正しいものはどれか。","choices":["食品を凍結後、真空状態で昇華乾燥させるため栄養素・風味の保持に優れる","高温乾燥で栄養が失われやすい","水戻しができない","常温で長期保存できない"],"answer":0,"explanation":"フリーズドライは食品を急速凍結後、真空下で氷を液体にならずに直接気化（昇華）させる乾燥法です。低温処理のため栄養素・風味・色・形状の保持性が高く、軽量で長期常温保存が可能です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_066","subject":"食品学","question":"トマトのリコピンの吸収率を高める調理法として正しいものはどれか。","choices":["生食が最も吸収率が高い","加熱してオリーブオイル等と一緒に摂ると吸収率が高まる","冷やして食べると吸収率が上がる","水に浸けると吸収率が上がる"],"answer":1,"explanation":"リコピンは脂溶性カロテノイドのため、油と一緒に摂ると吸収率が大幅に向上します。また加熱（トマトソース・ケチャップ等）により細胞壁が壊れてリコピンが遊離しやすくなり、さらに吸収率が高まります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_067","subject":"食品学","question":"機能性野菜として近年注目されているブロッコリーに含まれる栄養素の特徴として正しいものはどれか。","choices":["ビタミンC・葉酸・スルフォラファン等が豊富で栄養価が高い","たんぱく質がほとんど含まれない","緑黄色野菜ではない","ビタミンCは加熱で完全に失われる"],"answer":0,"explanation":"ブロッコリーはビタミンC（100gで120mg）・葉酸・ビタミンK・食物繊維・カルシウム・スルフォラファン等が豊富な緑黄色野菜です。蒸す・電子レンジ・サッとゆでが推奨されます。","frequency":"medium","is_trend":true,"frequency_reason":"機能性野菜"},{"id":"fs_068","subject":"食品学","question":"アボカドの特徴として正しいものはどれか。","choices":["脂質がほとんどない低脂肪果実","単価不飽和脂肪酸（オレイン酸）が豊富な高脂肪果実","ビタミンCが最も豊富な果実","でんぷんが主成分の果実"],"answer":1,"explanation":"アボカドは「森のバター」と呼ばれるほど脂質が豊富（約20%）な果実で、その多くが単価不飽和脂肪酸（オレイン酸）です。ビタミンE・カリウム・食物繊維も豊富で栄養価が高い果実です。","frequency":"medium","is_trend":true,"frequency_reason":"健康食材として注目"},{"id":"fs_069","subject":"食品学","question":"オリーブオイルに豊富な脂肪酸はどれか。","choices":["飽和脂肪酸","オレイン酸（一価不飽和脂肪酸n-9系）","EPA","リノール酸"],"answer":1,"explanation":"オリーブオイルはオレイン酸（n-9系一価不飽和脂肪酸）が全脂肪酸の70〜80%を占めます。オレイン酸はLDLコレステロールを下げずHDLコレステロールを保持する作用があり、地中海食の中心成分として心疾患予防効果が注目されています。","frequency":"high","is_trend":false,"frequency_reason":"オイルの基本"},{"id":"fs_070","subject":"食品学","question":"にんにくの特徴的な香り成分の生成メカニズムとして正しいものはどれか。","choices":["アリイン（無臭）が細胞破壊でアリナーゼと接触しアリシン（強い香り）に変換される","最初から強い臭いを持つ","加熱のみで臭いが生成される","臭いは水溶性成分による"],"answer":0,"explanation":"にんにくの細胞中のアリイン（無臭のアミノ酸）は、細胞が破壊されるとアリイナーゼと接触してアリシン（強い抗菌・臭い成分）に変換されます。アリシンはビタミンB1と結合してアリチアミン（吸収率の高いビタミンB1誘導体）となります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_071","subject":"食品学","question":"プロバイオティクスの定義として正しいものはどれか。","choices":["適切な量を摂取した場合に宿主（人）に健康上の利益をもたらす生きた微生物","食物繊維の一種","ビタミン補助食品","腸内細菌を殺す成分"],"answer":0,"explanation":"プロバイオティクスはWHO/FAOの定義で「適切な量を摂取した場合に宿主に健康上の利益をもたらす生きた微生物」です。ビフィズス菌・乳酸菌が代表的で、腸内環境改善・免疫調節等の効果が報告されています。","frequency":"medium","is_trend":true,"frequency_reason":"腸活・腸内環境で注目"},{"id":"fs_072","subject":"食品学","question":"食品のGI値（グリセミック指数）の説明として正しいものはどれか。","choices":["食品摂取後の血糖値上昇の速さを示す指標で、低いほど血糖値の上昇が緩やか","食品の甘さを示す指標","食品の脂質含量を示す","カロリーを示す指標"],"answer":0,"explanation":"GI（グリセミック指数）はブドウ糖摂取後の血糖値変化を100として、同量の炭水化物を含む食品摂取後の血糖値上昇度を比較した指標です。GI値が低い食品（全粒穀物・野菜・豆類等）は血糖値の上昇が緩やかです。","frequency":"medium","is_trend":true,"frequency_reason":"血糖管理・ダイエット"},{"id":"fs_073","subject":"食品学","question":"食品の「うま味（旨味）」に関する記述として正しいものはどれか。","choices":["うまみは第5の基本味として1908年に日本で発見された","うまみは西洋の料理概念","うまみはたんぱく質そのものの味","うまみは甘味の一種"],"answer":0,"explanation":"うまみ（Umami）は1908年に池田菊苗東京帝国大学教授が昆布だしからグルタミン酸を分離して命名した第5の基本味です。2000年に味覚受容体が発見されて国際的に認められました。","frequency":"high","is_trend":false,"frequency_reason":"うまみは頻出"},{"id":"fs_074","subject":"食品学","question":"食品成分表（八訂）の炭水化物の表示方法として正しいものはどれか。","choices":["差引き法のみで算出する","利用可能炭水化物・食物繊維・糖アルコール等を区分して収載するよう改訂された","たんぱく質と一緒に表示する","脂質から算出する"],"answer":1,"explanation":"日本食品標準成分表八訂（2020年）では炭水化物の表示が大幅に改訂され、①利用可能炭水化物②食物繊維（AOAC2011.25法）③糖アルコール④有機酸等を区分して収載するよう変更されました。","frequency":"medium","is_trend":true,"frequency_reason":"成分表改訂で重要"},{"id":"fs_075","subject":"食品学","question":"食品の褐変反応のうち、酵素が関与しないものはどれか。","choices":["リンゴ・バナナの切り口の褐変","メイラード反応（加熱褐変）","ポリフェノールの酸化褐変","にんにくを切ったときの変色"],"answer":1,"explanation":"メイラード反応（アミノカルボニル反応）は酵素が関与しない「非酵素的褐変」です。アミノ酸と還元糖が加熱により反応して褐色物質を生成します。一方、リンゴ・バナナの切り口の褐変はポリフェノールオキシダーゼ等の酵素が関与する「酵素的褐変」です。","frequency":"high","is_trend":false,"frequency_reason":"褐変反応の分類"},{"id":"fs_076","subject":"食品学","question":"MAP包装（ガス置換包装）の目的として正しいものはどれか。","choices":["容器内のガス組成を変えて鮮度保持・保存期間延長を図る","食品を加熱殺菌する","食品を圧縮して小さくする","水分を補給する"],"answer":0,"explanation":"MAP（Modified Atmosphere Packaging：ガス置換包装）は容器内の空気を窒素・二酸化炭素・酸素等のガスに置き換え、酸化防止・細菌増殖抑制・鮮度保持を図る包装技術です。精肉・鮮魚・生野菜等の保存期間延長に広く利用されています。","frequency":"medium","is_trend":true,"frequency_reason":"食品流通の最新技術"},{"id":"fs_077","subject":"食品学","question":"こんにゃくが「ゼロカロリー」に近い理由として正しいものはどれか。","choices":["グルコマンナンは人の消化酵素で分解できないため","水分が多いだけで栄養素はある","砂糖を含まないため","脂質がないため"],"answer":0,"explanation":"こんにゃくの主成分グルコマンナンは人の消化酵素では分解できない水溶性食物繊維のため、ほぼカロリーゼロ（100gで約5kcal）となります。水分が約97%を占め、腹持ちがよくダイエット食品として利用されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_078","subject":"食品学","question":"発酵食品と関与微生物の組み合わせとして誤っているものはどれか。","choices":["清酒 ─ 麹菌・酵母","ヨーグルト ─ 乳酸菌","みそ ─ 麹菌","食酢 ─ 乳酸菌"],"answer":3,"explanation":"食酢は酢酸菌（Acetobacter属等）がアルコールを酸化して酢酸を産生することで作られます。乳酸菌ではありません。しょうゆ・みそ・酒類は麹菌が中心、ヨーグルトは乳酸菌が主役です。","frequency":"high","is_trend":false,"frequency_reason":"発酵食品頻出"},{"id":"fs_079","subject":"食品学","question":"食品のカロリー計算に用いる「アトウォーターの係数」として正しいものはどれか。","choices":["たんぱく質4kcal/g・脂質9kcal/g・炭水化物4kcal/g","たんぱく質7kcal/g・脂質4kcal/g・炭水化物9kcal/g","全ての栄養素が4kcal/g","全ての栄養素が9kcal/g"],"answer":0,"explanation":"アトウォーターの係数は食品のエネルギー計算に使用される換算係数で、たんぱく質4kcal/g・脂質9kcal/g・炭水化物4kcal/g（アルコール7kcal/g）です。現在も食品表示のエネルギー計算の基本として世界で使用されています。","frequency":"high","is_trend":false,"frequency_reason":"エネルギー計算の基本"},{"id":"fs_080","subject":"食品学","question":"チョコレートの主原料カカオに含まれる機能性成分として正しいものはどれか。","choices":["カカオポリフェノール（エピカテキン等）・テオブロミン等が含まれる","脂質はほとんど含まれない","ビタミンCが主な機能性成分","砂糖のみが機能性を持つ"],"answer":0,"explanation":"カカオにはカカオポリフェノール（エピカテキン・プロシアニジン等・抗酸化・血圧低下）、テオブロミン（カフェインに類似・穏やかな興奮作用）等が含まれます。高カカオチョコレートは機能性表示食品も多く登場しています。","frequency":"medium","is_trend":true,"frequency_reason":"高カカオ食品で注目"},{"id":"fs_081","subject":"食品学","question":"牛乳の殺菌法のうち「HTST法」として正しいものはどれか。","choices":["高温短時間殺菌（72〜75℃・15秒以上）","低温長時間殺菌（63℃・30分）","超高温殺菌（130〜150℃・1〜3秒）","自然乾燥殺菌"],"answer":0,"explanation":"牛乳の殺菌法には①低温長時間（LTLT法：63℃・30分）②高温短時間（HTST法：72〜75℃・15秒以上）③超高温（UHT法：130〜150℃・1〜3秒）等があります。UHT法は常温保存可能な長期保存牛乳に使用されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_082","subject":"食品学","question":"卵のコレステロール含量に関する記述として正しいものはどれか。","choices":["卵白にコレステロールが多い","卵黄にコレステロールが集中している（約210mg/個）","卵にはコレステロールは含まれない","加熱するとコレステロールは消える"],"answer":1,"explanation":"卵のコレステロールは主に卵黄に含まれ、1個（可食部約50g）当たり約210mgです。日本の食事摂取基準2020年版ではコレステロールの目標量が削除され、食事中コレステロールの影響は限定的とされています。","frequency":"medium","is_trend":true,"frequency_reason":"栄養ガイドライン改訂"},{"id":"fs_083","subject":"食品学","question":"糖度（Brix）の説明として正しいものはどれか。","choices":["溶液100g中に溶けているショ糖相当量のグラム数を示す指標","食品のpHを示す","塩分濃度を示す","たんぱく質含量を示す"],"answer":0,"explanation":"糖度（Brix：ブリックス）は溶液100g中に溶けているショ糖相当量（g）を示す指標で、屈折糖度計で測定します。果物・ジュース・ジャム・清涼飲料水等の甘さの目安として使われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_084","subject":"食品学","question":"機能性表示食品として届け出られる際の科学的根拠として認められるものはどれか。","choices":["個人の体験談のみ","システマティックレビュー（研究論文の系統的総説）または最終製品を用いたRCT（ランダム化比較試験）","製造者の主張のみ","伝統的な使用実績のみ"],"answer":1,"explanation":"機能性表示食品制度では科学的根拠として①システマティックレビュー（SR）または②最終製品を用いたRCT（ランダム化比較試験）が必要です。個人の体験談・伝統的使用実績・製造者の主張のみでは認められません。","frequency":"medium","is_trend":true,"frequency_reason":"機能性食品制度"},{"id":"fs_085","subject":"食品学","question":"植物性代替肉（プラントベースミート）の主な原料として正しいものはどれか。","choices":["大豆たんぱく・小麦グルテン・エンドウ豆たんぱく等の植物性たんぱく質が主原料","動物の細胞から培養","魚肉が主原料","砂糖が主原料"],"answer":0,"explanation":"植物性代替肉は大豆たんぱく・小麦グルテン・エンドウ豆たんぱく等を主原料に、食感・風味・見た目を肉に近づけたものです。環境負荷低減・ヴィーガン対応等の観点から世界的に需要が拡大しています。","frequency":"medium","is_trend":true,"frequency_reason":"フードテック最前線"},{"id":"fs_086","subject":"食品学","question":"きな粉の原材料と特徴として正しいものはどれか。","choices":["大豆を煎って粉にしたもので、大豆の栄養をそのまま摂取できる","小麦粉を炒ったもの","米を粉にしたもの","とうもろこしの粉"],"answer":0,"explanation":"きな粉は大豆を炒って粉砕したもので、大豆の栄養素（たんぱく質・脂質・食物繊維・イソフラボン・カルシウム・鉄等）をほぼそのまま摂取できます。和菓子（あんこ・餅等）に使われる日本の伝統的な大豆加工食品です。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fs_087","subject":"食品学","question":"スーパーフードとして注目されているキヌアの特徴として正しいものはどれか。","choices":["全ての必須アミノ酸を含む完全たんぱく質で、グルテンフリーの疑似穀物","小麦の一種でグルテンが豊富","脂質が主成分","カルシウムをほとんど含まない"],"answer":0,"explanation":"キヌアはアンデス原産のアカザ科の植物の種子（疑似穀物）で、全ての必須アミノ酸を含む完全たんぱく質・鉄・カルシウム・食物繊維が豊富で、グルテンを含まない特徴があります。近年スーパーフードとして世界的に注目されています。","frequency":"low","is_trend":true,"frequency_reason":"スーパーフードトレンド"},{"id":"fs_088","subject":"食品学","question":"食品の「テクスチャー（食感）」に関与する主な成分として正しいものはどれか。","choices":["たんぱく質の凝固・でんぷんの糊化・コラーゲンのゼラチン化・食物繊維の組成等が食感に影響する","食感は水分含量のみで決まる","食感は温度のみで決まる","食感に食品成分は関与しない"],"answer":0,"explanation":"食品のテクスチャー（硬さ・弾力・粘り・サクサク感等）は①たんぱく質の変性・凝固②でんぷんの糊化・老化③コラーゲンのゼラチン化④食物繊維の構造・含量⑤水分含量⑥脂質の結晶化等の複合的な要因によって決まります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_089","subject":"食品学","question":"食品の保存法のうち、栄養価の損失が最も少ないものはどれか。","choices":["塩蔵法","糖蔵法","冷凍法","乾燥法"],"answer":2,"explanation":"冷凍法（マイナス18℃以下）は栄養成分の損失が最も少ない保存法とされます。乾燥・塩蔵・糖蔵は保存性が高い反面、ビタミン破壊や食感変化があります。急速冷凍では細胞破壊も少なく、解凍後も品質が保たれます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_090","subject":"食品学","question":"大豆の「完全たんぱく質」とは何を意味するか。","choices":["全ての必須アミノ酸を十分量含むたんぱく質","たんぱく質含量が100%","消化率が100%","加熱で変性しないたんぱく質"],"answer":0,"explanation":"完全たんぱく質とは全ての必須アミノ酸を十分量含むたんぱく質のことで、アミノ酸スコア100に相当します。大豆は植物性食品の中でほぼ唯一の完全たんぱく質です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_091","subject":"食品学","question":"バナナが熟成すると甘くなる理由として正しいものはどれか。","choices":["でんぷんが糖（ブドウ糖・果糖・ショ糖）に分解されるため","水分が増加するため","たんぱく質が分解されるため","脂質が糖に変わるため"],"answer":0,"explanation":"バナナは未熟時にでんぷん（約20%）が多く含まれますが、追熟過程でアミラーゼ等の酵素によりでんぷんがブドウ糖・果糖・ショ糖等の糖に分解されて甘くなります。エチレンガスが追熟を促進します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_092","subject":"食品学","question":"食品ロスにおける「食品学的」な視点で最も関係が深いものはどれか。","choices":["食品の適切な保存方法・賞味期限の理解不足が家庭での食品廃棄の大きな原因","食品ロスは製造段階のみで発生する","保存技術の向上で食品ロスは解決できる","食品ロスは食品学とは無関係"],"answer":0,"explanation":"家庭での食品廃棄の主因は①賞味期限・消費期限の誤解による過早廃棄②不適切な保存による腐敗・変質③過剰購入・過剰調理です。食品学の知識（保存温度・水分活性・酸化防止等）を活かすことで食品ロスを大幅に削減できます。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs・食品ロス"},{"id":"fs_093","subject":"食品学","question":"清酒（日本酒）の主な原料と製造の特徴として正しいものはどれか。","choices":["米・米麹・水を原料とし、並行複発酵（糖化と発酵が同時進行）が特徴","ぶどうのみを発酵させる","大麦麦芽を使用する","単発酵（糖化のみ）で作られる"],"answer":0,"explanation":"清酒は米・米麹・水を原料とし、麹菌によるでんぷんの糖化と酵母によるアルコール発酵が同一タンク内で同時進行する「並行複発酵」が特徴です。これにより高アルコール濃度（約15〜20%）が実現します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_094","subject":"食品学","question":"種実類（ナッツ類）の特徴として正しいものはどれか。","choices":["脂質含量が低い","不飽和脂肪酸が豊富","ビタミンEが少ない","水分が多い"],"answer":1,"explanation":"ナッツ類（アーモンド・くるみ・カシューナッツ等）は脂質が50〜70%を占め、その多くが不飽和脂肪酸（リノール酸・オレイン酸）です。ビタミンE・ミネラル・食物繊維も豊富で、くるみはn-3系脂肪酸が豊富で2023年から特定原材料に追加されました。","frequency":"medium","is_trend":true,"frequency_reason":"くるみ追加で注目"},{"id":"fs_095","subject":"食品学","question":"食品中の水分の状態として「自由水」と「結合水」の説明として正しいものはどれか。","choices":["自由水は微生物が利用でき、結合水は利用しにくい","結合水は微生物が利用できる","両者に違いはない","結合水は加熱で容易に蒸発する"],"answer":0,"explanation":"食品中の水分は自由水（食品成分と結合せず微生物・酵素が利用可能）と結合水（食品成分と強く結合し利用不可）に分けられます。微生物の増殖は自由水の量（水分活性Aw）に依存します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_096","subject":"食品学","question":"ヨーグルトの製造原理として正しいものはどれか。","choices":["乳酸菌が乳糖を分解して乳酸を産生し、pH低下によりカゼインが凝固する","酵母が牛乳を発酵させる","加熱だけで固まる","アルカリ添加で固まる"],"answer":0,"explanation":"ヨーグルト製造ではブルガリア菌・サーモフィラス菌等の乳酸菌が牛乳中の乳糖を分解して乳酸を産生します。乳酸によりpHが低下（約4.6付近）すると、カゼインが等電点沈殿して凝固し、独特のゲル状食感が生まれます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_097","subject":"食品学","question":"いかの墨（スミ）の成分と機能として正しいものはどれか。","choices":["メラニン系色素（ユーメラニン）で抗菌・抗酸化作用が報告されている","鉄分が主成分","カルシウムの塊","添加物として使用禁止"],"answer":0,"explanation":"いか墨はメラニン系色素を主成分とし、たんぱく質・多糖類等も含みます。抗菌作用・抗酸化作用・免疫賦活作用等が報告されています。地中海料理でいか墨パスタ等に利用され、食品添加物（着色料）としても使用されます。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fs_098","subject":"食品学","question":"食品の「灰分（かいぶん）」が示すものはどれか。","choices":["食物繊維量","無機質（ミネラル）の総量","たんぱく質量","炭水化物量"],"answer":1,"explanation":"灰分は食品を高温（550℃前後）で焼却した後に残る無機物（ミネラル）の総量を示します。カルシウム・鉄・ナトリウム・カリウム等のミネラル含量の概算指標として用いられます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fs_099","subject":"食品学","question":"緑黄色野菜の定義として正しいものはどれか。","choices":["色が濃い野菜全般","可食部100g中カロテン600μg以上含む野菜","ビタミンCが豊富な野菜","葉物野菜全般"],"answer":1,"explanation":"緑黄色野菜は厚生労働省の定義で「可食部100g当たりカロテン含量600μg以上の野菜」とされます。ただしトマト・ピーマン等カロテンが600μg未満でも摂取量・頻度が多い野菜は緑黄色野菜に分類されます。","frequency":"high","is_trend":false,"frequency_reason":"定義頻出"},{"id":"fs_100","subject":"食品学","question":"特定保健用食品（トクホ）と機能性表示食品の違いとして正しいものはどれか。","choices":["トクホは国の個別審査・許可が必要、機能性表示食品は事業者の届出制","両者に違いはない","機能性表示食品の方が審査が厳しい","トクホは届出制"],"answer":0,"explanation":"特定保健用食品（トクホ）は消費者庁の個別審査・許可が必要で、機能性表示食品（2015年〜）は事業者の責任で科学的根拠を消費者庁に届け出る制度です。両者とも保健機能食品に分類されます。","frequency":"high","is_trend":true,"frequency_reason":"機能性食品で頻出"},{"id":"nu_051","subject":"栄養学","question":"消化酵素とその作用基質の組み合わせとして正しいものはどれか。","choices":["アミラーゼ：たんぱく質を分解","ペプシン：でんぷんを分解","リパーゼ：脂質を分解","トリプシン：脂質を分解"],"answer":2,"explanation":"主な消化酵素の作用基質：アミラーゼ（唾液・膵臓）はでんぷんを分解、ペプシン（胃）・トリプシン（膵臓）はたんぱく質を分解、リパーゼ（膵臓）は脂質（トリグリセリド）を脂肪酸とモノグリセリドに分解します。","frequency":"high","is_trend":false,"frequency_reason":"消化酵素の基本"},{"id":"nu_052","subject":"栄養学","question":"胆汁の主な役割として正しいものはどれか。","choices":["たんぱく質を直接分解する","脂質を乳化してリパーゼの作用を助ける","炭水化物を糖に分解する","胃酸を中和するのみ"],"answer":1,"explanation":"胆汁は肝臓で産生され胆のうに蓄積される消化液で、消化酵素は含まれませんが胆汁酸が脂質を乳化（ミセル化）してリパーゼの作用面積を増やし脂質消化を助けます。また脂溶性ビタミン（A・D・E・K）の吸収にも必須です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_053","subject":"栄養学","question":"鉄の吸収を阻害する食品成分として正しいものはどれか。","choices":["ビタミンC（アスコルビン酸）","タンニン（お茶・コーヒー）・フィチン酸・シュウ酸","動物性たんぱく質（MPF因子）","クエン酸"],"answer":1,"explanation":"鉄の吸収を阻害する成分：タンニン（緑茶・紅茶・コーヒー）・フィチン酸（穀類・豆類）・シュウ酸（ほうれん草）等が非ヘム鉄の吸収を阻害します。逆にビタミンC・クエン酸・動物性たんぱく質（MPF因子）は非ヘム鉄の吸収を促進します。","frequency":"high","is_trend":false,"frequency_reason":"頻出・実践的"},{"id":"nu_054","subject":"栄養学","question":"血糖値が上昇したときの体の反応として正しいものはどれか。","choices":["グルカゴンが分泌されてグリコーゲンを分解する","インスリンが分泌されてグルコースの細胞取り込みを促進・グリコーゲン合成を促進する","アドレナリンが分泌される","血糖値は自然に下がるため何も起こらない"],"answer":1,"explanation":"食後に血糖値が上昇すると膵臓β細胞からインスリンが分泌されます。インスリンはグルコースの細胞への取り込みを促進し、肝臓・筋肉でのグリコーゲン合成を促進して血糖値を下げます。","frequency":"high","is_trend":true,"frequency_reason":"糖代謝の基本"},{"id":"nu_055","subject":"栄養学","question":"LDLコレステロールとHDLコレステロールの違いとして正しいものはどれか。","choices":["LDL（悪玉）は組織にコレステロールを運ぶ、HDL（善玉）は組織からコレステロールを回収して肝臓に戻す","両者は全く同じ働き","HDLが高いと心疾患リスクが上がる","LDLは体に必要なく全て除去すべき"],"answer":0,"explanation":"LDL（低比重リポたんぱく）は肝臓で合成したコレステロールを末梢組織に運搬し、過剰になると血管壁に沈着して動脈硬化を促進します。HDL（高比重リポたんぱく）は末梢組織の余分なコレステロールを回収して肝臓に戻す「逆転送」を担います。","frequency":"high","is_trend":false,"frequency_reason":"生活習慣病で頻出"},{"id":"nu_056","subject":"栄養学","question":"分岐鎖アミノ酸（BCAA）として正しい組み合わせはどれか。","choices":["グルタミン・グリシン・アラニン","バリン・ロイシン・イソロイシン","リシン・トリプトファン
