・メチオニン","アスパラギン酸・グルタミン酸・アルギニン"],"answer":1,"explanation":"分岐鎖アミノ酸（BCAA）はバリン・ロイシン・イソロイシンの3種類の必須アミノ酸で、筋肉でのエネルギー利用・筋たんぱく質合成促進・筋肉分解抑制の作用があります。スポーツ栄養・高齢者の筋肉維持で重要です。","frequency":"medium","is_trend":true,"frequency_reason":"スポーツ栄養・筋肉維持"},{"id":"nu_057","subject":"栄養学","question":"ビタミンB12の吸収に必要な物質はどれか。","choices":["ビタミンC","内因子（キャッスル内因子・胃壁細胞から分泌）","胆汁酸","インスリン"],"answer":1,"explanation":"ビタミンB12の吸収には胃壁細胞から分泌される内因子（キャッスル内因子）との結合が必須です。内因子との複合体が回腸末端で吸収されます。胃切除・萎縮性胃炎等で内因子が不足すると悪性貧血が起こります。","frequency":"high","is_trend":false,"frequency_reason":"ビタミンB12吸収は頻出"},{"id":"nu_058","subject":"栄養学","question":"ナイアシン（ビタミンB3）の欠乏症として正しいものはどれか。","choices":["脚気","壊血病","ペラグラ（皮膚炎・下痢・認知症の3D）","夜盲症"],"answer":2,"explanation":"ナイアシン欠乏症はペラグラで、3D（皮膚炎Dermatitis・下痢Diarrhea・認知症Dementia）が主症状で、重症化すると死亡（4D）に至ります。トウモロコシ主食の地域で歴史的に多発しました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_059","subject":"栄養学","question":"ビタミンKの主な機能として正しいものはどれか。","choices":["糖質代謝の補酵素","血液凝固因子の活性化と骨形成（オステオカルシン活性化）","視覚機能","コラーゲン合成"],"answer":1,"explanation":"ビタミンKはプロトロンビン等の血液凝固因子の活性化に必須で、欠乏すると出血傾向が生じます。また骨形成タンパク（オステオカルシン）の活性化にも関与し骨粗鬆症予防に重要です。納豆にビタミンK2が特に豊富です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_060","subject":"栄養学","question":"亜鉛の主な機能と欠乏症として正しいものはどれか。","choices":["味覚・免疫・創傷治癒・DNA合成等に関与し、欠乏すると味覚障害・免疫低下が起こる","酸素運搬に関与する","骨の主成分","甲状腺ホルモンの成分"],"answer":0,"explanation":"亜鉛は体内で200種以上の酵素の補酵素として機能し、①味覚・嗅覚の維持②免疫機能③創傷治癒④DNA・RNA合成⑤成長・発育等に関与します。欠乏すると味覚障害・免疫低下・皮膚炎・成長障害等が起こります。","frequency":"high","is_trend":true,"frequency_reason":"味覚障害・亜鉛で注目"},{"id":"nu_061","subject":"栄養学","question":"マグネシウムの主な機能として正しいものはどれか。","choices":["酸素の運搬","300種以上の酵素の補因子・筋肉収縮・神経伝達・骨形成に関与","血液凝固のみ","甲状腺ホルモンの成分"],"answer":1,"explanation":"マグネシウムは体内で300種以上の酵素反応の補因子として、エネルギー産生（ATP代謝）・たんぱく質合成・筋肉収縮・神経伝達・骨形成・血糖調節等に広く関与します。欠乏すると筋肉けいれん・不整脈・骨粗鬆症リスク増加等が起こります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_062","subject":"栄養学","question":"熱中症予防に重要な水分・電解質補給として正しいものはどれか。","choices":["純水のみを大量に飲む","水分と電解質（ナトリウム等）を一緒に補給する（スポーツ飲料等）","食塩水のみを飲む","水分補給は不要"],"answer":1,"explanation":"熱中症予防には水分と電解質（特にナトリウム）の両方を補給することが重要です。純水のみの大量摂取は血中ナトリウム濃度の希釈（低ナトリウム血症・水中毒）を引き起こす危険があります。0.1〜0.2%食塩＋4〜8%糖質を含む経口補水液・スポーツ飲料が効果的です。","frequency":"high","is_trend":true,"frequency_reason":"熱中症対策"},{"id":"nu_063","subject":"栄養学","question":"BMI（体格指数）の計算式として正しいものはどれか。","choices":["体重(kg)÷身長(m)","体重(kg)÷身長(m)²","体重(kg)×身長(m)","身長(cm)÷体重(kg)"],"answer":1,"explanation":"BMI = 体重(kg) ÷ 身長(m)² で計算します。日本肥満学会基準では18.5未満が低体重、18.5〜25未満が普通体重、25以上が肥満。22前後が最も病気にかかりにくい標準体重とされます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_064","subject":"栄養学","question":"妊娠期の栄養に関する記述として誤っているものはどれか。","choices":["葉酸は神経管閉鎖障害予防のため妊娠前・初期から十分な摂取が必要","鉄の需要が増加する","妊娠悪阻（つわり）では特に食事の工夫が必要","妊娠中は食事制限を強化して体重増加をゼロにする"],"answer":3,"explanation":"妊娠中の過度な体重制限は低出生体重児・胎児発育不全等のリスクを高めます。妊娠期の推奨体重増加量はBMIに応じて異なりますが、適正な体重増加が重要です。葉酸・鉄・カルシウム・ビタミンDの追加摂取が推奨されます。","frequency":"high","is_trend":true,"frequency_reason":"妊娠期栄養は重要"},{"id":"nu_065","subject":"栄養学","question":"高齢者のたんぱく質必要量に関する記述として正しいものはどれか。","choices":["高齢者は若年者より少ないたんぱく質でよい","高齢者は筋肉合成効率が低下するため、若年者と同等またはそれ以上のたんぱく質摂取が推奨される（1.0〜1.2g/kg/日）","高齢者のたんぱく質摂取は腎臓に負担をかけるため制限すべき","高齢者には植物性たんぱく質のみでよい"],"answer":1,"explanation":"高齢者は①筋肉たんぱく質の合成効率低下（アナボリック抵抗性）②消化吸収率の低下等のため、サルコペニア予防には若年者と同等かそれ以上のたんぱく質（1.0〜1.2g/kg体重/日）が推奨されます。","frequency":"high","is_trend":true,"frequency_reason":"超高齢社会"},{"id":"nu_066","subject":"栄養学","question":"インスリン抵抗性とは何か。","choices":["インスリンが過剰に分泌される状態","インスリンが分泌されているのに細胞がインスリンの作用に反応しにくくなった状態","インスリンが全く分泌されない状態","インスリンが骨に作用する状態"],"answer":1,"explanation":"インスリン抵抗性とは筋肉・脂肪・肝臓等の標的細胞がインスリンの作用に反応しにくくなった状態です。内臓脂肪の蓄積・慢性炎症・身体活動不足等が原因で起こり、2型糖尿病・メタボリックシンドロームの共通した病態基盤です。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病の基本病態"},{"id":"nu_067","subject":"栄養学","question":"骨粗鬆症予防に重要な栄養素の組み合わせとして正しいものはどれか。","choices":["カルシウム・ビタミンD・ビタミンK・たんぱく質の摂取と適度な運動","カルシウムのみ","鉄とビタミンCのみ","ビタミンAのみ"],"answer":0,"explanation":"骨粗鬆症予防には①カルシウム（骨の主要成分）②ビタミンD（Ca吸収促進・骨代謝）③ビタミンK（オステオカルシン活性化・骨形成）④たんぱく質（骨基質コラーゲン形成）の摂取と⑤適度な荷重運動が重要です。","frequency":"high","is_trend":false,"frequency_reason":"骨粗鬆症予防は頻出"},{"id":"nu_068","subject":"栄養学","question":"サルコペニア（筋肉減少症）の診断基準として正しいものはどれか。","choices":["体重が軽いこと","筋肉量の減少に加えて筋力低下または身体機能低下がある状態","BMIが低いこと","体脂肪率が高いこと"],"answer":1,"explanation":"サルコペニアはAWGS基準で①筋肉量の低下に加えて②筋力の低下（握力：男性28kg未満、女性18kg未満）または③身体機能の低下（歩行速度1.0m/s未満等）で診断されます。65歳以上の約10〜15%に認められます。","frequency":"medium","is_trend":true,"frequency_reason":"高齢者医療・介護"},{"id":"nu_069","subject":"栄養学","question":"痛風（高尿酸血症）の食事療法として正しいものはどれか。","choices":["プリン体（レバー・干物・ビール等）の制限と水分の十分な摂取","プリン体を多く含む食品を積極的に食べる","完全に絶食する","脂質のみを制限する"],"answer":0,"explanation":"痛風（高尿酸血症）の食事療法は①プリン体の多い食品（レバー・内臓・干物・魚卵・ビール等）の制限②十分な水分摂取（2L/日以上）③アルコール制限④適正体重の維持です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_070","subject":"栄養学","question":"慢性腎臓病（CKD）の食事療法として誤っているものはどれか。","choices":["たんぱく質の制限（重症度に応じて）","カリウム・リンの制限（重症度に応じて）","食塩の制限","たんぱく質を大量摂取する"],"answer":3,"explanation":"慢性腎臓病（CKD）の食事療法はステージに応じて①たんぱく質制限②カリウム制限③リン制限④食塩制限が基本です。たんぱく質の大量摂取はCKDを悪化させます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_071","subject":"栄養学","question":"腸内フローラ（腸内細菌叢）と健康の関係として正しいものはどれか。","choices":["腸内細菌は健康に影響を与えない","腸内細菌の多様性・バランスが免疫機能・肥満・精神状態等に影響する（腸脳相関等）","腸内細菌は全て有害","腸内細菌は薬では変化しない"],"answer":1,"explanation":"腸内には約100兆個・1000種類以上の腸内細菌が存在し、腸内フローラを形成します。腸内細菌叢の多様性・バランスが①免疫調節②肥満・代謝疾患③アレルギー④精神状態（腸脳相関）等に影響することが明らかになっています。","frequency":"high","is_trend":true,"frequency_reason":"腸内環境・マイクロバイオーム"},{"id":"nu_072","subject":"栄養学","question":"地中海食の特徴と健康効果として正しいものはどれか。","choices":["肉・加工食品が中心のパターン","オリーブオイル・野菜・果物・全粒穀物・魚介類・豆類が豊富で心疾患・がん・認知症予防効果が報告されている","乳製品を全く含まない","糖質を極端に制限した食事"],"answer":1,"explanation":"地中海食は①オリーブオイルが主要脂質②野菜・果物・豆類・全粒穀物が豊富③魚介類を週2回以上④赤肉・加工食品は少量⑤適度なワインが特徴です。大規模疫学研究で心疾患・がん・認知症・糖尿病予防効果が示されています。","frequency":"medium","is_trend":true,"frequency_reason":"食事パターンの健康研究"},{"id":"nu_073","subject":"栄養学","question":"日本人の食事摂取基準2020年版の策定方針として正しいものはどれか。","choices":["生活習慣病の発症予防に加え、重症化予防と高齢者のフレイル予防も重視された","栄養摂取量の最大化のみを目的とする","小児のみを対象とした","食品添加物の規制に焦点を当てた"],"answer":0,"explanation":"食事摂取基準2020年版の主な特徴は①生活習慣病の発症予防・重症化予防②高齢者のフレイル・サルコペニア予防を重視③高齢者（65歳以上）をさらに3区分に細分化④エネルギー産生栄養素バランスのPFC比率更新等です。","frequency":"high","is_trend":true,"frequency_reason":"最新版の特徴"},{"id":"nu_074","subject":"栄養学","question":"嚥下困難（嚥下障害）者への食事形態として正しいものはどれか。","choices":["固形食のまま細かく切るだけでよい","学会分類2021（嚥下調整食分類）に基づきコード0〜4の段階的な食形態を選択する","液体は何でも安全に飲める","嚥下困難者は食事をしてはいけない"],"answer":1,"explanation":"嚥下困難者の食事は日本摂食嚥下リハビリテーション学会の「嚥下調整食分類2021」に基づき、コード0（ゼリー状）〜4（軟飯・軟食）の段階的な食形態を嚥下機能に応じて選択します。水分にはとろみをつけることで誤嚥を防止します。","frequency":"high","is_trend":true,"frequency_reason":"介護・医療現場必須"},{"id":"nu_075","subject":"栄養学","question":"高血圧症の食事療法における重要点として正しいものはどれか。","choices":["食塩摂取量を1日6g未満に制限","水分摂取を制限する","たんぱく質を制限する","糖質を増やす"],"answer":0,"explanation":"高血圧症の食事療法では食塩摂取量を1日6g未満（理想は3g）に制限することが最重要です。あわせてカリウム摂取（野菜・果物）、適正体重の維持、適度な運動、節酒・禁煙が推奨されます。","frequency":"high","is_trend":true,"frequency_reason":"減塩重要"},{"id":"nu_076","subject":"栄養学","question":"ケトン体に関する記述として正しいものはどれか。","choices":["糖質が十分な時に産生される","糖質不足・飢餓時に脂肪酸の不完全代謝により肝臓で産生され脳のエネルギー源となる","腎臓で産生される","ケトン体は有害で全く利用されない"],"answer":1,"explanation":"ケトン体（アセトン・アセト酢酸・β-ヒドロキシ酪酸）は糖質不足・飢餓・極端な低糖質食時に、脂肪酸のβ酸化産物（アセチルCoA）から肝臓で産生されます。脳・心臓・筋肉等のエネルギー源として利用されます。","frequency":"medium","is_trend":true,"frequency_reason":"低糖質食・ケトジェニック"},{"id":"nu_077","subject":"栄養学","question":"メタボリックシンドロームの診断基準として、必須項目はどれか。","choices":["BMI25以上","内臓脂肪型肥満（腹囲：男性85cm以上、女性90cm以上）","血圧130/85mmHg以上","空腹時血糖110mg/dL以上"],"answer":1,"explanation":"メタボリックシンドロームの診断基準では、内臓脂肪型肥満（腹囲：男性85cm以上、女性90cm以上）が必須項目で、これに加えて①脂質異常②高血圧③高血糖のうち2項目以上該当で診断されます。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病"},{"id":"nu_078","subject":"栄養学","question":"PFCバランスの理想とされる比率として正しいものはどれか（成人）。","choices":["P:F:C = 50:30:20","P:F:C = 13〜20:20〜30:50〜65","P:F:C = 30:40:30","P:F:C = 10:10:80"],"answer":1,"explanation":"食事摂取基準2020年版のエネルギー産生栄養素バランス（PFCバランス）は、たんぱく質13〜20%、脂質20〜30%、炭水化物50〜65%（％エネルギー）が目標とされます。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"nu_079","subject":"栄養学","question":"「隠れ肥満（内臓脂肪型肥満）」の問題点として正しいものはどれか。","choices":["BMIが正常範囲でも内臓脂肪が蓄積していると代謝疾患リスクが高い","BMIが高い人に内臓脂肪はたまらない","皮下脂肪の方が内臓脂肪より危険","体重のみで肥満を評価できる"],"answer":0,"explanation":"内臓脂肪型肥満（リンゴ型肥満）は体重・BMIが正常範囲でも内臓周囲に脂肪が蓄積している場合も含み、インスリン抵抗性・高血圧・脂質異常症等のメタボリックシンドロームのリスクが高まります。","frequency":"high","is_trend":true,"frequency_reason":"メタボ・生活習慣病"},{"id":"nu_080","subject":"栄養学","question":"食物アレルギーの主な治療・管理法として正しいものはどれか。","choices":["根本的な治療法は確立されておらず原因食品の除去が基本、経口免疫療法が研究・実施されている","アレルゲンを大量摂取すると治癒する","薬を飲めば何でも食べられる","成長すれば全て治癒する"],"answer":0,"explanation":"食物アレルギーの基本管理は確実な診断に基づく原因食品の必要最小限の除去です。近年、原因食品を少量から徐々に摂取して免疫寛容を誘導する経口免疫療法（OIT）が研究・一部実施されています。","frequency":"medium","is_trend":true,"frequency_reason":"食物アレルギー管理"},{"id":"nu_081","subject":"栄養学","question":"カルシウムの腸管吸収率として正しいものはどれか。","choices":["食品からの吸収率は100%である","成長期は約40〜60%、成人は約25〜30%と成長期で高い","高齢者の吸収率は高い","脂質と一緒に摂ると吸収が阻害される"],"answer":1,"explanation":"カルシウムの吸収率は成長期（小児・青少年）約40〜60%と最も高く、成人は約25〜30%、閉経後女性・高齢者では低下します。ビタミンDが吸収促進に必須で、加齢・ビタミンD不足で吸収率が低下します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_082","subject":"栄養学","question":"ビタミンDが不足しやすい現代人の生活習慣として正しいものはどれか。","choices":["屋外活動が多い","屋内勤務・紫外線対策（日焼け止め・長袖）・魚食減少等により不足しやすい","夏季は必ず充足される","ビタミンDは食事のみで十分摂取できる"],"answer":1,"explanation":"ビタミンDは日光（UVB）により皮膚で合成されますが、現代人は①屋内勤務・屋内活動が多い②日焼け止め使用・長袖着用③魚食の減少等の理由で不足しやすい状況です。日本人の多くがビタミンD不足状態にあるとされます。","frequency":"medium","is_trend":true,"frequency_reason":"現代人の栄養問題"},{"id":"nu_083","subject":"栄養学","question":"リンの摂取に関する注意点として正しいものはどれか。","choices":["日本人はリン不足が多い","加工食品・インスタント食品のリン酸塩添加物による過剰摂取がカルシウム吸収を阻害する","リンはカルシウム吸収を助ける","リンの過剰は骨を強くする"],"answer":1,"explanation":"現代日本人は加工食品・インスタント食品・清涼飲料水等に添加されるリン酸塩による過剰摂取が問題です。カルシウムとリンの理想的な摂取比率はCa:P=1:1〜2ですが、過剰なリン摂取はカルシウム吸収を阻害して骨粗鬆症リスクを高めます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_084","subject":"栄養学","question":"脂質異常症（高脂血症）の食事療法として誤っているものはどれか。","choices":["飽和脂肪酸の摂取を控える","コレステロールの摂取を適正化する","食物繊維を積極的に摂る","糖分を多く摂取する"],"answer":3,"explanation":"糖分の多量摂取は中性脂肪を増加させ、脂質異常症を悪化させます。脂質異常症の食事療法は①飽和脂肪酸の制限②コレステロール適正化③不飽和脂肪酸の適度な摂取④食物繊維の摂取⑤糖分・アルコールの控えめが基本です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_085","subject":"栄養学","question":"授乳期の栄養に関する記述として正しいものはどれか。","choices":["授乳中の母乳分泌には追加エネルギー・水分摂取は不要","授乳婦のエネルギー・たんぱく質・ビタミン・ミネラルの必要量が増加する","授乳中はアルコールを適度に飲んでもよい","母乳の成分は母親の食事に影響されない"],"answer":1,"explanation":"授乳期は母乳産生のために非妊娠時より①エネルギー＋350kcal②たんぱく質＋20g③ビタミンA・B群・C・D等④カルシウム・ヨウ素等が追加で必要です。アルコールは母乳に移行するため摂取を控えます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_086","subject":"栄養学","question":"学童期・思春期の栄養で特に注意が必要な点はどれか。","choices":["成長に伴うエネルギー・たんぱく質・カルシウム・鉄の需要増加と欠食・偏食の問題","エネルギーを制限すべき時期","カルシウムは成人と同じ量でよい","この時期はダイエットが推奨される"],"answer":0,"explanation":"学童期・思春期は急速な成長のためエネルギー・たんぱく質・カルシウム（骨量蓄積のピーク期）・鉄（月経開始後の女子）の必要量が増加します。欠食・偏食・過度なダイエットは健康上のリスクがあります。","frequency":"high","is_trend":false,"frequency_reason":"成長期栄養"},{"id":"nu_087","subject":"栄養学","question":"食生活指針の項目として誤っているものはどれか。","choices":["食事を楽しみましょう","野菜・果物・牛乳・乳製品・豆類・魚なども組み合わせて","食塩は多めに","食料資源を大切に、無駄や廃棄の少ない食生活を"],"answer":2,"explanation":"食生活指針には「食塩は控えめに、脂肪は質と量を考えて」とあり、食塩を多めにとは指導していません。食生活指針10項目は2000年策定（2016年改定）で、食事の楽しみ・主食/主菜/副菜のバランス等を示しています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_088","subject":"栄養学","question":"術後・傷病者の栄養管理として正しいものはどれか。","choices":["術後は長期間の絶食が回復に良い","早期経腸栄養（術後24〜48時間以内の経管栄養）が腸管機能維持・感染予防に有効","経静脈栄養のみを使用する","栄養管理は回復後に開始する"],"answer":1,"explanation":"現在の栄養管理の基本は可能であれば早期経腸栄養（術後24〜48時間以内）が推奨されます。腸管を使うことで腸管粘膜の萎縮防止・腸内細菌叢の維持・感染合併症の減少効果があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_089","subject":"栄養学","question":"スポーツ選手のエネルギー補給として正しいものはどれか。","choices":["運動前・中・後の適切なタイミングで炭水化物を補給することが重要","運動前は食事を取らない方がよい","脂質のみでエネルギー補給する","水分のみで十分"],"answer":0,"explanation":"スポーツ栄養では①運動前：消化しやすい炭水化物で筋グリコーゲンを充填②運動中：長時間運動では30〜60g/時の炭水化物補給③運動後：30〜60分以内の炭水化物＋たんぱく質摂取でグリコーゲン回復・筋たんぱく質合成が重要です。","frequency":"medium","is_trend":true,"frequency_reason":"スポーツ栄養注目"},{"id":"nu_090","subject":"栄養学","question":"カリウムの主な機能として正しいものはどれか。","choices":["酸素の運搬","ナトリウムとともに体液の浸透圧調節","コラーゲン合成","視覚機能維持"],"answer":1,"explanation":"カリウムはナトリウムと協調して細胞内外の浸透圧調節・水分バランス・神経伝達・筋肉収縮等に関わります。ナトリウム過剰時の排泄を促進する作用があり、高血圧予防に重要です。野菜・果物・豆類・芋類等に豊富です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_091","subject":"栄養学","question":"ナトリウムの過剰摂取と最も関連が深い疾患はどれか。","choices":["糖尿病","高血圧","骨粗鬆症","貧血"],"answer":1,"explanation":"ナトリウム（食塩）の過剰摂取は高血圧・脳卒中・心疾患・胃がん等のリスクを高めます。日本人の食塩摂取量は世界的に多く、減塩が公衆衛生上の重要課題です。","frequency":"high","is_trend":true,"frequency_reason":"生活習慣病で頻出"},{"id":"nu_092","subject":"栄養学","question":"高齢者の低栄養（フレイル）予防として最も重要なものはどれか。","choices":["食事量の制限","十分なたんぱく質摂取と適度な運動","水分制限","糖質制限"],"answer":1,"explanation":"高齢者の低栄養・フレイル・サルコペニア予防には、十分なたんぱく質摂取（1.0〜1.2g/kg体重/日）と適度な運動の併用が最も重要です。バランスのよい食事と社会参加も重要です。","frequency":"high","is_trend":true,"frequency_reason":"超高齢社会の課題"},{"id":"nu_093","subject":"栄養学","question":"セレンの主な機能として正しいものはどれか。","choices":["抗酸化酵素（グルタチオンペルオキシダーゼ）の構成成分","血液凝固因子の活性化","甲状腺ホルモンの主成分","コラーゲン合成"],"answer":0,"explanation":"セレンは抗酸化酵素グルタチオンペルオキシダーゼの活性中心に存在し、過酸化物を分解して細胞を酸化障害から守ります。甲状腺ホルモン代謝・免疫機能・精子形成にも関与します。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"nu_094","subject":"栄養学","question":"基礎代謝量が高い人の特徴として正しいものはどれか。","choices":["体重が重く筋肉量が多い男性・若年者","高齢者・女性・小柄な人","運動習慣がない人","低栄養状態の人"],"answer":0,"explanation":"基礎代謝量は①筋肉量（多いほど高い）②体格（体表面積が大きいほど高い）③年齢（若いほど高い）④性別（男性が女性より高い）等によって異なります。筋肉量の多い体格のよい若年男性で基礎代謝量が最も高くなります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_095","subject":"栄養学","question":"METs（メッツ）の説明として正しいものはどれか。","choices":["運動の強度を安静時代謝量の倍数で表した単位","カロリーの単位","体脂肪率を示す","血糖値の単位"],"answer":0,"explanation":"METs（Metabolic Equivalents：メッツ）は身体活動・運動の強度を安静時代謝量の何倍のエネルギーを消費するかで表した単位です。消費エネルギー（kcal）≒METs×体重（kg）×時間（h）×1.05で計算できます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_096","subject":"栄養学","question":"食物アレルギーの主要な発症機序はどれか。","choices":["Ⅰ型（IgE依存型）アレルギー反応","感染症","中毒反応","心因性反応"],"answer":0,"explanation":"食物アレルギーの多くはⅠ型（即時型・IgE依存型）アレルギー反応で、原因食物摂取後数分〜2時間以内に蕁麻疹・呼吸困難・アナフィラキシー等の症状が現れます。アナフィラキシーショックは生命に関わるため、エピペン®の準備等が重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_097","subject":"栄養学","question":"生活習慣病の代表的なものとして誤っているものはどれか。","choices":["糖尿病","高血圧症","感染症","脂質異常症"],"answer":2,"explanation":"感染症は病原体によるもので生活習慣病ではありません。生活習慣病は食習慣・運動・喫煙・飲酒・ストレス等の生活習慣が原因となる疾患群で、糖尿病・高血圧症・脂質異常症・肥満・がん等が含まれます。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"nu_098","subject":"栄養学","question":"食事摂取基準で示される指標として誤っているものはどれか。","choices":["推定平均必要量（EAR）","推奨量（RDA）","目安量（AI）","禁止量"],"answer":3,"explanation":"食事摂取基準の指標は①推定平均必要量EAR②推奨量RDA③目安量AI④耐容上限量UL⑤目標量DG（生活習慣病予防）の5つです。「禁止量」という指標はありません。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_099","subject":"栄養学","question":"エネルギー代謝に関する記述として正しいものはどれか。","choices":["全エネルギー消費量＝基礎代謝量のみ","身体活動量は加味されない","基礎代謝量＋身体活動量＋食事誘発性熱産生（DIT）","睡眠中はエネルギー消費がない"],"answer":2,"explanation":"1日の総エネルギー消費量は①基礎代謝量（約60〜70%）②身体活動量（約20〜30%）③食事誘発性熱産生DIT（約10%）の合計です。DITは食事摂取後の代謝亢進で、たんぱく質摂取で最も大きくなります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"nu_100","subject":"栄養学","question":"プロビタミンA（ビタミンA前駆体）として正しいものはどれか。","choices":["β-カロテン","リコピン","アントシアニン","クロロフィル"],"answer":0,"explanation":"β-カロテンは緑黄色野菜（にんじん・ほうれん草・かぼちゃ等）に含まれるカロテノイドで、体内で必要に応じてビタミンAに変換されます（プロビタミンA）。過剰症のリスクが少なく安全に摂取できる利点があります。","frequency":"high","is_trend":false,"frequency_reason":""},{"id":"ph_051","subject":"公衆衛生学","question":"スクリーニング検査の条件として正しいものはどれか。","choices":["高額で一部の人のみが受けられる検査","感度・特異度が高く、安価・簡便で多くの人が受けられる検査","治療法がない疾患に有効","一度のみ実施する検査"],"answer":1,"explanation":"スクリーニング検査の条件は①感度・特異度が高い②安価・簡便で多くの人が受けられる③対象疾患が重要で有病率が高い④早期発見で治療効果がある⑤確認診断法がある等です。健診・がん検診等に使われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_052","subject":"公衆衛生学","question":"感染症の集団免疫（ハード・イミュニティ）の説明として正しいものはどれか。","choices":["集団の一部が免疫を持つと感染拡大が抑制され、免疫を持たない人も守られる","全員が感染しないと成立しない","ワクチンでのみ達成できる","一度達成すると永続する"],"answer":0,"explanation":"集団免疫とは集団の一定割合以上が免疫を持つと（ワクチン接種・自然感染）、感染者から次の感染者への連鎖が途絶え、免疫を持たない人も間接的に守られる状態です。麻疹では約95%以上の免疫保有率が必要です。","frequency":"medium","is_trend":true,"frequency_reason":"感染症対策・ワクチン"},{"id":"ph_053","subject":"公衆衛生学","question":"水俣病の原因として正しいものはどれか。","choices":["カドミウムによる腎障害","メチル水銀による神経障害（熊本県水俣湾周辺・1956年確認）","鉛による血液障害","砒素による皮膚障害"],"answer":1,"explanation":"水俣病はチッソ水俣工場からの排水に含まれるメチル水銀が魚介類に蓄積し、それを食べた住民に発生した神経系障害です。1956年に熊本県水俣市で確認された日本の四大公害病の一つです。","frequency":"high","is_trend":false,"frequency_reason":"公害病の基本"},{"id":"ph_054","subject":"公衆衛生学","question":"イタイイタイ病の原因と症状として正しいものはどれか。","choices":["カドミウムによる腎障害・骨軟化症（富山県神通川流域）","水銀による神経障害","砒素による皮膚障害","鉛による神経障害"],"answer":0,"explanation":"イタイイタイ病は神岡鉱山（岐阜県）から神通川に流れたカドミウムが稲に蓄積し、米を食べた住民に発生した腎障害・骨軟化症です。富山県神通川流域で発生し、1968年に公害病と認定されました。","frequency":"high","is_trend":false,"frequency_reason":"四大公害病"},{"id":"ph_055","subject":"公衆衛生学","question":"地球温暖化（気候変動）の健康への影響として正しいものはどれか。","choices":["健康への影響はない","熱中症増加・感染症分布域の変化（マラリア等）・極端な気象現象による被害等が懸念される","気温上昇は人体に良い影響のみ","感染症は減少する"],"answer":1,"explanation":"気候変動の健康影響は①熱中症・熱波による死亡増加②感染症の分布域変化（マラリア・デング熱等の熱帯性感染症の北上）③極端な気象（洪水・干ばつ・大型台風）による健康被害④花粉症・アレルギー疾患悪化等が懸念されています。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs・気候変動"},{"id":"ph_056","subject":"公衆衛生学","question":"日本の社会保障の4つの柱として正しいものはどれか。","choices":["社会保険・公的扶助・社会福祉・公衆衛生（保健医療）","医療・福祉・教育・雇用","保険・年金・労働・税金","医療保険・介護保険・雇用保険・火災保険"],"answer":0,"explanation":"日本の社会保障制度は①社会保険（医療・年金・雇用・労働者災害補償・介護）②公的扶助（生活保護）③社会福祉（高齢者・障害者・児童福祉等）④公衆衛生・保健医療（感染症対策・環境衛生・精神保健等）の4つが柱です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_057","subject":"公衆衛生学","question":"日本の自殺の現状と対策として正しいものはどれか。","choices":["日本の自殺者数は年間2万人前後で推移し、自殺対策基本法（2006年）等の対策が進められている","自殺は珍しく対策は不要","自殺は全て精神疾患が原因","自殺対策は医療機関のみが行う"],"answer":0,"explanation":"日本の自殺者数は2003年のピーク（約3.4万人）から減少傾向ですが、近年は年間約2万人前後で推移しています。自殺対策基本法（2006年）・自殺総合対策大綱に基づき、総合的対策が進められています。","frequency":"medium","is_trend":true,"frequency_reason":"精神保健の重要課題"},{"id":"ph_058","subject":"公衆衛生学","question":"認知症の主な種類と特徴として正しいものはどれか。","choices":["アルツハイマー型が最多（約60〜70%）、次いで脳血管性認知症、レビー小体型等がある","認知症は一種類のみ","若年者には発症しない","認知症は予防できない"],"answer":0,"explanation":"認知症の原因疾患はアルツハイマー型（最多・約60〜70%、アミロイドβ・タウたんぱく蓄積）・脳血管性認知症（約20%）・レビー小体型（幻視・パーキンソン症状）等があります。65歳以上の約15〜20%に認知症・軽度認知障害（MCI）が認められます。","frequency":"high","is_trend":true,"frequency_reason":"高齢化社会の主要課題"},{"id":"ph_059","subject":"公衆衛生学","question":"「ゲートキーパー（gate keeper）」の役割として正しいものはどれか。","choices":["施設の入口を管理する人","自殺の危険性の高い人に気づき、声をかけ、必要に応じて専門家につなぐ役割を担う人","精神科医師のみの役割","特別な訓練を受けた専門家のみ"],"answer":1,"explanation":"ゲートキーパーは自殺対策の文脈で「悩んでいる人に気づき、声をかけ、話を聴いて、必要な支援につなげ、見守る」役割を担う人です。医療・福祉・教育・職域・地域住民等の幅広い人材へのゲートキーパー養成研修が推進されています。","frequency":"medium","is_trend":true,"frequency_reason":"自殺対策・地域保健"},{"id":"ph_060","subject":"公衆衛生学","question":"地域保健法に基づく保健センター（市町村）と保健所（都道府県）の役割の違いとして正しいものはどれか。","choices":["保健センターは住民に身近な対人保健サービス、保健所は専門技術・広域的サービスを担う","両者に違いはない","保健所が全ての業務を行う","市町村病院と同じ役割"],"answer":0,"explanation":"市町村保健センターは住民に身近な①乳幼児健診②母子健康手帳交付③成人・老人保健サービス等を担います。都道府県保健所は専門技術的・広域的業務（感染症・難病・精神保健・食品衛生の専門指導・監視等）を担います。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_061","subject":"公衆衛生学","question":"フレイル（Frailty）の評価基準（Friedの基準）として正しいものはどれか。","choices":["体重減少・疲弊感・活動量低下・歩行速度低下・握力低下の5項目のうち3項目以上該当","BMIのみで判定","年齢のみで判定","血液検査のみで判定"],"answer":0,"explanation":"フレイルの評価にはFried基準が広く使われ①体重減少②疲弊感③身体活動量の低下④歩行速度の低下⑤握力低下の5項目のうち3項目以上でフレイル、1〜2項目でプレフレイルと判定されます。フレイルは可逆的段階であり、適切な介入で改善が可能です。","frequency":"medium","is_trend":true,"frequency_reason":"フレイル対策"},{"id":"ph_062","subject":"公衆衛生学","question":"「8020運動」とは何か。","choices":["80歳で体重20kgを目指す運動","80歳になっても自分の歯を20本以上残そうという口腔保健の目標","80歳まで20km走る運動","血圧を80/20に保つ運動"],"answer":1,"explanation":"8020運動は1989年から厚生省と日本歯科医師会が推進する「80歳になっても自分の歯を20本以上保とう」という口腔保健目標です。20本以上の歯があれば咀嚼機能が維持でき、栄養状態・全身健康・認知機能・QOLに良い影響があります。","frequency":"high","is_trend":false,"frequency_reason":"口腔保健の代表"},{"id":"ph_063","subject":"公衆衛生学","question":"口腔ケアと全身疾患の関係として正しいものはどれか。","choices":["口腔内の健康は全身疾患と無関係","歯周病は糖尿病・心疾患・誤嚥性肺炎・早産等との関連が報告されている","口腔ケアは審美的目的のみ","歯ブラシは健康に影響しない"],"answer":1,"explanation":"歯周病（歯周炎）は①糖尿病との双方向的関連②動脈硬化・心疾患リスク増加③誤嚥性肺炎（口腔内細菌の肺への吸引）④早産・低出生体重児リスク増加との関連が報告されています。高齢者の口腔ケアは誤嚥性肺炎予防に特に重要です。","frequency":"high","is_trend":true,"frequency_reason":"口腔と全身の関係"},{"id":"ph_064","subject":"公衆衛生学","question":"低出生体重児（2500g未満）の増加が日本で問題とされている理由として正しいものはどれか。","choices":["低出生体重児は全て先天性疾患を持つ","妊婦の過度な体重制限・若い女性の低栄養傾向が原因の一つで、将来的な生活習慣病リスクとの関連も指摘されている","低出生体重児は健康上の問題がない","低出生体重児は日本のみで増加する"],"answer":1,"explanation":"日本の低出生体重児（2500g未満）の割合は約9〜10%と先進国で最高水準です。原因は①若い女性の過度なダイエット・低栄養②妊婦の過度な体重制限等です。DOHaD（発生起源説）から低出生体重は成人後の生活習慣病リスク増加との関連が指摘されています。","frequency":"high","is_trend":true,"frequency_reason":"妊産婦・低出生体重"},{"id":"ph_065","subject":"公衆衛生学","question":"DOHaD（Developmental Origins of Health and Disease）仮説として正しいものはどれか。","choices":["胎児期・乳幼児期の栄養環境が成人後の疾病リスクに影響するという仮説","遺伝のみが疾病を決定する","成人期の生活習慣のみが疾病に影響する","出生後の環境は疾病と無関係"],"answer":0,"explanation":"DOHaD仮説は、胎児期・乳幼児期の低栄養・過栄養等の環境が遺伝子発現（エピジェネティクス）を変化させ、成人後の生活習慣病（糖尿病・心疾患・肥満等）リスクに影響するという概念です。","frequency":"medium","is_trend":true,"frequency_reason":"生命初期の健康"},{"id":"ph_066","subject":"公衆衛生学","question":"要介護認定の区分として正しいものはどれか。","choices":["要支援1・2と要介護1〜5の計7段階","要介護のみで3段階","要支援のみ5段階","全員が同じサービスを受ける"],"answer":0,"explanation":"介護保険の要介護認定は要支援1・2（介護予防サービス対象）と要介護1〜5（介護サービス対象）の計7段階に区分されます。市町村の認定調査・主治医意見書をもとに判定されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_067","subject":"公衆衛生学","question":"アルコール依存症に関する記述として正しいものはどれか。","choices":["意志が弱い人だけがなる","脳の疾患であり適切な治療が必要で、断酒が基本治療","適量を守れば依存症にならない","アルコール依存症の治療法はない"],"answer":1,"explanation":"アルコール依存症は脳の報酬系の変化による慢性疾患で、意志の問題ではありません。断酒（完全禁酒）が基本治療で、薬物療法・心理療法・自助グループ（AA等）の組み合わせが有効です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_068","subject":"公衆衛生学","question":"特定健康診査・特定保健指導の対象者として正しいものはどれか。","choices":["全国民","40〜74歳の医療保険加入者","75歳以上の高齢者","学生のみ"],"answer":1,"explanation":"特定健康診査（メタボ健診）・特定保健指導は2008年から開始され、40〜74歳の医療保険加入者が対象です。メタボリックシンドロームに着目し、内臓脂肪型肥満を予防・改善することで生活習慣病を減少させる施策です。","frequency":"high","is_trend":false,"frequency_reason":"生活習慣病対策"},{"id":"ph_069","subject":"公衆衛生学","question":"がん対策基本法（2006年）の主な内容として正しいものはどれか。","choices":["がん対策推進基本計画の策定・がん研究推進・早期発見のための検診・がん医療の均てん化等を規定","がんの治療法を規定する法律","がんの予防を禁止する","保険適用のみを規定する"],"answer":0,"explanation":"がん対策基本法（2006年）は①がん対策推進基本計画の策定（5年ごと）②がんの予防・早期発見（検診）の推進③がん医療の均てん化④がん研究推進⑤がん患者の就労・社会参加支援等を規定します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_070","subject":"公衆衛生学","question":"日本のがん予防のための指針として正しいものはどれか。","choices":["禁煙・節酒・食生活改善・身体活動増加・適正体重維持・感染症対策が主要な予防策","薬のみでがんを予防できる","検診のみが有効","遺伝子検査のみが有効"],"answer":0,"explanation":"国立がん研究センターの「日本人のためのがん予防法」では①禁煙②節酒③食塩の減量・野菜果物の摂取④体格の適正維持⑤身体活動増加⑥感染予防（肝炎ウイルス・ピロリ菌等）が主要予防策です。","frequency":"high","is_trend":false,"frequency_reason":"がん予防の基本"},{"id":"ph_071","subject":"公衆衛生学","question":"SDGs目標3「すべての人に健康と福祉を」の主な内容として正しいものはどれか。","choices":["2030年までに母子死亡率低下・感染症撲滅・UHC達成・精神保健・薬物依存対策等を含む","日本のみが対象","医療費の無料化のみを目指す","食品安全のみを対象"],"answer":0,"explanation":"SDGs目標3「健康と福祉」は2030年までに①妊産婦・新生児・5歳未満児の死亡率低下②AIDS・結核・マラリア等感染症の撲滅③非感染性疾患（NCD）の予防・治療④精神保健⑤ユニバーサル・ヘルス・カバレッジ（UHC）達成等を含む広範な健康目標です。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs・国際保健"},{"id":"ph_072","subject":"公衆衛生学","question":"ユニバーサル・ヘルス・カバレッジ（UHC）の概念として正しいものはどれか。","choices":["全ての人が経済的困難なしに必要な質の高い保健医療サービスを受けられる状態","裕福な人のみが高度医療を受けられる状態","医療費を無限に使える状態","医療を民営化する概念"],"answer":0,"explanation":"UHCはWHOが推進する「全ての人が、お金の心配をせずに、必要な時に必要な場所で、質の高い保健医療サービスを受けられる」状態を目指す概念です。日本の国民皆保険制度はUHC達成の好例として世界から注目されています。","frequency":"medium","is_trend":true,"frequency_reason":"国際保健・SDGs"},{"id":"ph_073","subject":"公衆衛生学","question":"薬剤耐性（AMR：Antimicrobial Resistance）が公衆衛生上の重大問題とされる理由として正しいものはどれか。","choices":["薬が高価になるだけ","抗菌薬等が効かない微生物が増加し、感染症が治療困難になることで世界的な脅威となっている","日本では問題になっていない","新しい薬を作れば解決できる"],"answer":1,"explanation":"薬剤耐性（AMR）は抗菌薬等が効かない微生物（耐性菌）が増加する問題です。適切な治療ができず死亡率上昇・医療費増大を招きます。AMR対策アクションプラン（One Health推進・適正使用）が世界的に進められています。","frequency":"medium","is_trend":true,"frequency_reason":"AMR対策・One Health"},{"id":"ph_074","subject":"公衆衛生学","question":"「One Health（ワンヘルス）」アプローチの説明として正しいものはどれか。","choices":["人の健康のみを対象とする","人・動物・環境（生態系）の健康が相互に関連しており、三者を一体としてとらえる包括的アプローチ","動物保護のみを目的とする","環境保護のみを目的とする"],"answer":1,"explanation":"One Healthアプローチは人・動物・環境（生態系）の健康が密接に関連しているという概念で、①人獣共通感染症の予防②薬剤耐性（AMR）対策③食品安全④気候変動と感染症等の課題に連携して取り組む必要性を示します。","frequency":"medium","is_trend":true,"frequency_reason":"One Health推進"},{"id":"ph_075","subject":"公衆衛生学","question":"第4次食育推進基本計画（2021〜2025年度）の重点事項として正しいものはどれか。","choices":["生涯を通じた心身の健康を支える食育・持続可能な食を支える食育・SDGs達成に向けた取り組み","食品製造業の支援のみ","輸入食品の禁止","外食の制限"],"answer":0,"explanation":"第4次食育推進基本計画（2021〜2025年度）の重点事項は①生涯を通じた心身の健康を支える食育②持続可能な食を支える食育（食品ロス削減・環境に配慮した食）③「新たな日常」やデジタル化に対応した食育の推進等です。","frequency":"medium","is_trend":true,"frequency_reason":"最新の食育計画"},{"id":"ph_076","subject":"公衆衛生学","question":"フードバンク活動の説明として正しいものはどれか。","choices":["食品を高値で販売する活動","食品企業・個人から未利用食品を受け取り、食支援を必要とする人・施設に無償で提供する活動","食品の輸出を促進する活動","高級食材を収集する活動"],"answer":1,"explanation":"フードバンクは食品企業・農家・個人から規格外・余剰食品等の未利用食品を受け取り、生活困窮者・子ども食堂・福祉施設等に無償で提供するNPO・ボランティア活動です。食品ロス削減と食支援の同時達成として注目されています。","frequency":"medium","is_trend":true,"frequency_reason":"食品ロス・貧困対策"},{"id":"ph_077","subject":"公衆衛生学","question":"健康格差（Health Inequity）の説明として正しいものはどれか。","choices":["個人差のみによる健康の差","社会経済的地位・居住地域・教育水準等の社会的要因による健康状態の差","遺伝のみによる健康の差","年齢のみによる健康の差"],"answer":1,"explanation":"健康格差とは個人の努力や遺伝ではなく、所得・教育・職業・居住地域等の社会的要因によって生じる不公平な健康状態の差を指します。健康の社会的決定要因（SDH）として健康日本21でも格差縮小が目標とされています。","frequency":"medium","is_trend":true,"frequency_reason":"健康日本21の課題"},{"id":"ph_078","subject":"公衆衛生学","question":"非感染性疾患（NCD：Non-Communicable Diseases）の4大疾患として正しいものはどれか。","choices":["がん・心血管疾患・慢性呼吸器疾患・糖尿病","コレラ・結核・マラリア・HIV","骨折・捻挫・外傷・熱傷","うつ病・統合失調症・認知症・依存症"],"answer":0,"explanation":"WHO・SDGsが重点課題とする4大NCDはがん・心血管疾患（心疾患・脳卒中）・慢性呼吸器疾患（COPD・喘息）・糖尿病です。世界の全死亡の約71%を占め、共通したリスク因子に対する予防対策が重要視されています。","frequency":"medium","is_trend":true,"frequency_reason":"国際保健・NCD"},{"id":"ph_079","subject":"公衆衛生学","question":"健康増進法の主な内容として正しいものはどれか。","choices":["健康診断の実施・健康増進事業・特定給食施設の管理・受動喫煙対策等を規定","食品添加物のみを規制","医薬品の承認制度を規定","建築物の安全基準を規定"],"answer":0,"explanation":"健康増進法（2002年）は①国民の健康増進の推進に関する基本方針②健康診査・保健指導③国民健康・栄養調査④特定給食施設の管理⑤受動喫煙防止対策（2020年全面施行）等を規定します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_080","subject":"公衆衛生学","question":"「健康寿命の延伸」のために重要な取り組みとして正しいものはどれか。","choices":["医療費を増やすのみ","生活習慣改善・介護予防・社会参加・口腔ケア・認知症予防等の包括的アプローチが重要","薬の服用のみ","病院受診の回数を増やす"],"answer":1,"explanation":"健康寿命の延伸には①禁煙・節酒・食生活改善・運動習慣等の生活習慣改善②フレイル・ロコモ予防等の介護予防③就労・ボランティア等の社会参加④口腔ケア⑤認知症予防・対応等の包括的アプローチが必要です。健康日本21（第三次）の中核目標です。","frequency":"high","is_trend":true,"frequency_reason":"健康日本21の核心"},{"id":"ph_081","subject":"公衆衛生学","question":"児童虐待の4種類として正しいものはどれか。","choices":["身体的虐待・性的虐待・ネグレクト（養育放棄）・心理的虐待","暴力・無視・脅迫・監禁","身体的暴力のみ","言葉による虐待のみ"],"answer":0,"explanation":"児童虐待防止法で定める虐待の4種類は①身体的虐待②性的虐待③ネグレクト（養育放棄・放置）④心理的虐待（暴言・無視・DV目撃等）です。児童相談所への虐待相談件数は増加を続けています。","frequency":"medium","is_trend":true,"frequency_reason":"児童虐待増加"},{"id":"ph_082","subject":"公衆衛生学","question":"新興感染症（Emerging Infectious Diseases）の特徴として正しいものはどれか。","choices":["過去から知られていた感染症のみ","新たに出現した・または近年急増している感染症で、SARS・MERS・COVID-19・エボラ出血熱等が含まれる","日本にのみ発生する","一度流行すると必ず消滅する"],"answer":1,"explanation":"新興感染症は過去に知られていなかった新たに出現した・またはその他既知のものであっても急速に拡大しているものを指します。SARS・MERS・エボラ出血熱・COVID-19等が代表例で、森林破壊・気候変動・グローバル化が増加要因とされています。","frequency":"medium","is_trend":true,"frequency_reason":"感染症の国際的課題"},{"id":"ph_083","subject":"公衆衛生学","question":"食品ロス（フードロス）に関する記述として正しいものはどれか。","choices":["日本の食品ロスは年間約500万トン以上","問題ではない","すべて家庭から発生","SDGsとは関係ない"],"answer":0,"explanation":"日本の食品ロスは年間約472万トン（2022年度）で、世界的にも深刻な問題です。事業系約236万トン、家庭系約236万トンで、ほぼ同量です。SDGsの目標12.3（2030年までに食品ロス半減）に位置づけられています。","frequency":"high","is_trend":true,"frequency_reason":"SDGs最重要"},{"id":"ph_084","subject":"公衆衛生学","question":"野菜摂取の目標量（健康日本21・第三次）として正しいものはどれか（成人）。","choices":["1日200g","1日350g","1日500g","1日100g"],"answer":1,"explanation":"健康日本21（第三次）では成人の野菜摂取量の目標を1日350g（うち緑黄色野菜120g以上）と定めています。日本人の現状は約280g/日と目標を下回っており、生活習慣病予防のため野菜摂取増加が推奨されます。","frequency":"high","is_trend":true,"frequency_reason":"食生活改善"},{"id":"ph_085","subject":"公衆衛生学","question":"食塩摂取の目標量（健康日本21・第三次）として正しいものはどれか（成人）。","choices":["1日10g","1日7g","1日5g","制限なし"],"answer":1,"explanation":"健康日本21（第三次）では成人の食塩摂取量の目標を1日7g（男女とも）と定めています。日本人の食事摂取基準2020年版では男性7.5g/日未満、女性6.5g/日未満ですが、高血圧予防の観点から更なる減塩が推奨されます。WHOは1日5g未満を推奨しています。","frequency":"high","is_trend":true,"frequency_reason":"減塩重要課題"},{"id":"ph_086","subject":"公衆衛生学","question":"喫煙の健康影響として誤っているものはどれか。","choices":["肺がん・心疾患のリスク増加","受動喫煙による周囲への影響","妊婦の喫煙による胎児への影響","カルシウム吸収促進"],"answer":3,"explanation":"喫煙はカルシウム吸収を促進しません（むしろ骨密度低下のリスク）。喫煙は能動喫煙でがん・循環器疾患・呼吸器疾患・糖尿病等のリスクを高め、受動喫煙でも肺がん・心疾患リスクが増加します。","frequency":"high","is_trend":false,"frequency_reason":"重要健康課題"},{"id":"ph_087","subject":"公衆衛生学","question":"ストレスチェック制度に関する記述として正しいものはどれか。","choices":["労働者数に関わらず実施義務","常時50人以上の労働者を使用する事業場で年1回実施","希望者のみ実施","医療機関で受診する"],"answer":1,"explanation":"ストレスチェック制度は2015年12月から施行され、常時50人以上の労働者を使用する事業場で年1回の実施が義務付けられました。労働者のメンタルヘルス不調を未然に防ぐ一次予防が目的で、結果は本人にのみ通知されます。","frequency":"medium","is_trend":true,"frequency_reason":"メンタルヘルス"},{"id":"ph_088","subject":"公衆衛生学","question":"疫学研究のデザインとして「コホート研究」の説明として正しいものはどれか。","choices":["過去の暴露を後向きに調べる","要因暴露の有無で集団を追跡し疾病発生率を比較する前向き研究","症例と対照を比べる","一時点での調査"],"answer":1,"explanation":"コホート研究（前向き研究）は要因（喫煙・食事・職業等）への暴露の有無で集団を分け、追跡して疾病発生率を比較します。因果関係の推定に優れますが、時間・コストがかかります。症例対照研究は患者と非患者の過去の暴露を比較する後向き研究です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_089","subject":"公衆衛生学","question":"「食の砂漠（フードデザート）」とは何か。","choices":["砂漠での食料調達困難","低所得地域・農村部等で新鮮な食品（野菜・果物等）へのアクセスが困難な状況","食品の過剰供給地域","農業が盛んな地域"],"answer":1,"explanation":"食の砂漠（フードデザート）とは低所得地域・農村部・高齢化地域等でスーパーマーケット等新鮮な生鮮食品を入手できる店舗が少なく、住民が健全な食生活を維持しにくい状況を指します。健康格差の一因となっています。","frequency":"low","is_trend":true,"frequency_reason":"食環境・健康格差"},{"id":"ph_090","subject":"公衆衛生学","question":"疾病の自然史（natural history）の概念として正しいものはどれか。","choices":["疾病は突然発症して治癒する","疾病は感受性期→潜伏期（前臨床期）→臨床期→回復・慢性化・死亡という経過をたどる","慢性疾患に自然史はない","一次予防は臨床期に行う"],"answer":1,"explanation":"疾病の自然史は①感受性期→②潜伏期・前臨床期（症状はない）→③臨床期（症状が現れる）→④回復・障害・慢性化・死亡の段階を経ます。一次予防は感受性期・潜伏期、二次予防は前臨床期・早期臨床期に行います。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_091","subject":"公衆衛生学","question":"うつ病の疫学として正しいものはどれか。","choices":["生涯有病率は約15%で女性が男性の約2倍","日本人の1%未満に発症","男性のほうが多い","一度発症すると再発しない"],"answer":0,"explanation":"うつ病の生涯有病率は約10〜20%で女性が男性の約2倍多いとされます。気分障害として最も多い精神疾患で、労働損失・自殺リスクの主要因です。適切な治療（薬物療法・心理療法）で回復可能です。","frequency":"medium","is_trend":true,"frequency_reason":"精神保健・職域"},{"id":"ph_092","subject":"公衆衛生学","question":"母子健康手帳の交付者として正しいものはどれか。","choices":["国（厚生労働大臣）","都道府県知事","市町村長","医師"],"answer":2,"explanation":"母子健康手帳は母子保健法に基づき、妊娠届を提出した妊婦に市町村長が交付します。妊娠中の経過・出産・乳幼児の成長・予防接種等を記録する重要な手帳で、母子保健サービスを受ける際の基本ツールです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_093","subject":"公衆衛生学","question":"地域包括ケアシステムの構成要素として正しいものはどれか。","choices":["医療・介護・予防・住まい・生活支援が一体的に提供される仕組み","病院での長期入院重視","市町村中心の取り組み","国のみが担う"],"answer":0,"explanation":"地域包括ケアシステムは「住み慣れた地域で自分らしい生活を続けられるよう、医療・介護・予防・住まい・生活支援が一体的に提供される仕組み」で、在宅・地域でのケアを重視します。2025年（団塊の世代が75歳以上）を目途に各市町村で構築が進められています。","frequency":"high","is_trend":true,"frequency_reason":"高齢化対策"},{"id":"ph_094","subject":"公衆衛生学","question":"生活習慣病のリスク要因として「社会的決定要因」に含まれるものはどれか。","choices":["遺伝子のみ","所得・教育・労働環境・居住環境・社会的サポート等の社会的条件","意志の弱さ","年齢のみ"],"answer":1,"explanation":"生活習慣病は個人の行動だけでなく、①所得・貧困②教育水準③労働環境（長時間労働・ストレス）④居住環境（食環境・運動環境）⑤社会的サポート（孤立）等の社会的決定要因（SDH）が影響します。","frequency":"medium","is_trend":true,"frequency_reason":"健康格差・SDH"},{"id":"ph_095","subject":"公衆衛生学","question":"介護予防の三段階として正しいものはどれか。","choices":["一次予防（全高齢者への健康増進）・二次予防（ハイリスク者への早期介入）・三次予防（要介護状態の悪化防止・機能回復）","手術・入院・退院の三段階","薬・食事・運動の三管理","医師・看護師・介護士の三職種"],"answer":0,"explanation":"介護予防は①一次予防：全ての高齢者を対象とした健康増進・疾病予防②二次予防：要介護リスクの高い高齢者への早期介入③三次予防：要介護状態の高齢者への機能維持・改善・悪化防止の三段階から構成されます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_096","subject":"公衆衛生学","question":"国民健康保険と健康保険（組合健保・協会けんぽ）の違いとして正しいものはどれか。","choices":["国民健康保険は主に自営業・無職・農業者が対象、健康保険は会社員・公務員が対象","全国民が同じ保険に加入","国民健康保険のみが公的保険","年齢によってのみ区分される"],"answer":0,"explanation":"日本の医療保険は①国民健康保険（自営業者・農業者・無職・非正規雇用等が対象）②健康保険（会社員等被用者が対象：大企業の組合健保・中小企業の協会けんぽ）③共済保険（公務員等）④後期高齢者医療制度（75歳以上）に分かれています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_097","subject":"公衆衛生学","question":"職業性疾患（職業病）の予防の基本として正しいものはどれか。","choices":["作業環境管理・作業管理・健康管理の三管理と健康教育が基本","個人の健康管理のみ","検査のみで予防できる","職業病は予防できない"],"answer":0,"explanation":"職業性疾患の予防は労働衛生の三管理（作業環境管理・作業管理・健康管理）と健康教育が基本です。騒音性難聴・じん肺・振動障害・腰痛・化学物質による中毒等が代表的職業病で、それぞれに応じた対策が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ph_098","subject":"公衆衛生学","question":"ナッジ（nudge）理論の食・健康への応用として正しいものはどれか。","choices":["強制力を持って行動を変えさせる","人々が自発的により良い選択をしやすくなるよう環境・仕組みを工夫する（例：健康食を目立つ場所に置く）","罰則で健康行動を強制する","情報提供のみで行動変容を促す"],"answer":1,"explanation":"ナッジ理論は行動経済学の概念で、強制や金銭的インセンティブを用いず、人々が自発的により望ましい行動を選択しやすくなるよう選択の環境（アーキテクチャ）を設計する方法です。食堂での野菜料理を目立つ位置に陳列する等の食環境改善に応用されています。","frequency":"low","is_trend":true,"frequency_reason":"行動経済学・食環境"},{"id":"ph_099","subject":"公衆衛生学","question":"公衆衛生の父と呼ばれる人物として正しいものはどれか。","choices":["ルイ・パスツール","ジョン・スノウ（コレラの感染源を特定した疫学の先駆者）","フローレンス・ナイチンゲール","ロベルト・コッホ"],"answer":1,"explanation":"ジョン・スノウ（1813〜1858年）は1854年のロンドンコレラ流行において、地図と統計を使って汚染された井戸ポンプを感染源と特定し、ポンプの取っ手を外すことで流行を終息させました。近代疫学・公衆衛生の先駆者として「公衆衛生の父」と呼ばれています。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"ph_100","subject":"公衆衛生学","question":"現代の公衆衛生が直面する課題として誤っているものはどれか。","choices":["超高齢社会への対応","健康格差の是正","新興感染症・薬剤耐性への対応","全ての問題が既に解決されている"],"answer":3,"explanation":"現代の公衆衛生は多くの未解決課題に直面しています：①超高齢社会（フレイル・認知症・介護）②健康格差の拡大③新興感染症・薬剤耐性（AMR）④気候変動・環境問題⑤精神保健⑥少子化・母子保健等、複合的な課題への包括的なアプローチが求められています。","frequency":"high","is_trend":true,"frequency_reason":"公衆衛生の展望"},{"id":"ck_051","subject":"調理理論","question":"日本料理の包丁の種類と用途の組み合わせとして正しいものはどれか。","choices":["出刃包丁：魚のおろし・骨切り用","薄刃包丁：肉の筋切り用","柳刃（刺身包丁）：野菜のみじん切り用","牛刀：魚の頭を落とす専用"],"answer":0,"explanation":"日本料理の主な包丁は①出刃包丁（厚くて重い・魚をおろす・骨を切る）②柳刃・刺身包丁（細長い・刺身を引き切りにする）③薄刃包丁（薄くて平ら・野菜の桂むき・薄切り）等に分かれ、用途に応じて使い分けます。","frequency":"high","is_trend":false,"frequency_reason":"実技の基本"},{"id":"ck_052","subject":"調理理論","question":"「桂むき」の説明として正しいものはどれか。","choices":["大根・きゅうり等を薄く連続して帯状にむく技術","食材を乱切りにする技術","食材を小口切りにする技術","食材をすりおろす技術"],"answer":0,"explanation":"桂むきは大根・にんじん・きゅうり等の円筒形の野菜を薄く均一に帯状に連続してむく技術（薄刃包丁を使う）で、日本料理の基本技術の一つです。むいた後に細く切ると「けん」（刺身のつま）になります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_053","subject":"調理理論","question":"「面取り（めんとり）」を行う目的として正しいものはどれか。","choices":["煮崩れ防止・見た目の向上・均一な火通りのため","野菜の皮をむくため","食材を小さくするため","アクを除去するため"],"answer":0,"explanation":"面取りは大根・にんじん・かぼちゃ等の煮物用食材の角を薄く削り取る技術で、目的は①煮崩れ防止②火の通りを均一にする③見た目を美しくするためです。日本料理の煮物で欠かせない下処理技術です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_054","subject":"調理理論","question":"「乱切り（らんぎり）」の特徴として正しいものはどれか。","choices":["食材を回しながら斜めに不規則な形で切る方法で、煮物で表面積が大きく味が染みやすい","食材を均一の薄さに切る方法","食材を縦長に切る方法","食材を丸くくり抜く方法"],"answer":0,"explanation":"乱切りは食材を回しながら斜めに不規則な形で切る技法です。断面積が大きく不規則な形になるため①煮汁が染みやすい②火の通りが速い③見た目に変化があるという特徴があります。にんじん・ごぼう・れんこん等の根菜類の煮物・炒め物によく使われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_055","subject":"調理理論","question":"「落とし蓋」をする目的として正しいものはどれか。","choices":["食材を鍋の外に飛び出させるため","煮汁を食材全体に均一に行き渡らせ、煮崩れを防ぎながら味を染みこませるため","火力を上げるため","水分を多く追加するため"],"answer":1,"explanation":"落とし蓋は食材の上に直接のせる小さい蓋で①鍋の対流で煮汁が食材全体に均一に行き渡る②食材が動きにくく煮崩れ防止③蒸発を適度に抑えて煮詰まり防止④少ない煮汁でもしっかり味が染みるという効果があります。","frequency":"high","is_trend":false,"frequency_reason":"煮物の基本技術"},{"id":"ck_056","subject":"調理理論","question":"根菜類を「水からゆでる」理由として正しいものはどれか。","choices":["沸騰した湯から入れると柔らかくなりすぎるため","水から徐々に温めることで均一に火が通り、組織が壊れにくくなるため","水からゆでると栄養素が増えるため","水からゆでると色が鮮やかになるため"],"answer":1,"explanation":"じゃがいも・にんじん・大根等の根菜類は水からゆでることで①中まで均一に火が通る②表面と内部の温度差が小さく煮崩れしにくい③でんぷんがゆっくり糊化するため食感がよくなるというメリットがあります。","frequency":"high","is_trend":false,"frequency_reason":"茹で方の基本"},{"id":"ck_057","subject":"調理理論","question":"地上で育つ野菜と地下で育つ野菜のゆで方の基本として正しいものはどれか。","choices":["地上で育つ野菜（葉・果菜類）は沸騰した塩湯、地下で育つ野菜（根菜類）は水からゆでる","全て塩湯でゆでる","全て水からゆでる","ゆで方は食材に関係なく同じ"],"answer":0,"explanation":"日本料理の基本として「地上の野菜（葉物・果菜・豆類）は沸騰した塩湯でゆでる」「地下の野菜（根菜類）は水からゆでる」という分類があります。葉物は短時間で火が通り塩で色素を安定させます。根菜類は水からゆでることで中まで均一に火が通ります。","frequency":"high","is_trend":false,"frequency_reason":"調理の基本分類"},{"id":"ck_058","subject":"調理理論","question":"「霜降り（しもふり）」の調理操作として正しいものはどれか。","choices":["食材を霜の降りた屋外で保存する","魚・肉に熱湯をかけるか熱湯にくぐらせて表面のたんぱく質を凝固させて臭みや汚れを除く","食材を冷凍庫に入れて表面に霜をつける","食材に食塩をふって水分を出す"],"answer":1,"explanation":"霜降りは魚・肉（特に内臓・骨付き肉等）に熱湯をかけるかくぐらせることで表面のたんぱく質が白く凝固して（霜が降りたような見た目）臭みのある血液・粘液・汚れ等が固まって除去しやすくなる下処理法です。","frequency":"high","is_trend":false,"frequency_reason":"重要な下処理技術"},{"id":"ck_059","subject":"調理理論","question":"煮物で「砂糖を最初に加える」理由として正しいものはどれか。","choices":["砂糖は食材を硬くするので後で入れる","砂糖の分子が大きく食材の組織に浸透するのに時間がかかるため先に入れる","砂糖は味に影響しない","砂糖は沸騰後でないと溶けない"],"answer":1,"explanation":"「さしすせそ」の順で砂糖を最初に加える理由は、砂糖の分子がショ糖（二糖類）で食塩より大きいため食材の組織への浸透が遅く、先に十分浸透させる必要があるためです。砂糖が先に浸透することで食材が柔らかくなり、後から加える調味料も入りやすくなります。","frequency":"high","is_trend":false,"frequency_reason":"さしすせその理由"},{"id":"ck_060","subject":"調理理論","question":"ホワイトソース（ベシャメルソース）の調理原理として正しいものはどれか。","choices":["小麦粉と油脂（バター）を炒めたルウに牛乳を加えてでんぷんを糊化させて作る","卵黄のみで作る","寒天で固める","生クリームのみで作る"],"answer":0,"explanation":"ホワイトソース（ベシャメルソース）はバターで小麦粉を炒めた「ルウ（roux）」を作り、牛乳を少しずつ加えながら加熱してでんぷんの糊化により粘度を出します。グラタン・クリームシチューの基本です。","frequency":"high","is_trend":false,"frequency_reason":"洋食の基本"},{"id":"ck_061","subject":"調理理論","question":"パン生地の発酵（一次発酵）で起こる変化として正しいものはどれか。","choices":["酵母（イースト）がアルコール発酵してCO₂を産生し生地が膨らむ、同時にグルテン構造が熟成して風味が増す","でんぷんのみが変化する","たんぱく質が溶け出す","糖が増加する"],"answer":0,"explanation":"パン生地の一次発酵では①酵母がグルコース等の糖を嫌気的に分解してCO₂（生地膨張）とアルコール（香り）を産生する②乳酸菌・有機酸産生により風味が増す③グルテン構造が熟成して伸展性が向上する等の変化が起こります。","frequency":"high","is_trend":false,"frequency_reason":"パン調理の基本"},{"id":"ck_062","subject":"調理理論","question":"「一番だし」と「二番だし」の違いとして正しいものはどれか。","choices":["一番だしは最初に取る上品なうま味のだし、二番だしは一番だしの残りから取る少し濃いだし","両者に違いはない","二番だしの方が上品","一番だしはアクが多い"],"answer":0,"explanation":"一番だし（本だし）は昆布と鰹節を使って最初に取る上品で澄んだうま味のだしで、吸い物・茶碗蒸し等上品な料理に使います。二番だしは一番だしを取った後の昆布・鰹節に水を加えて再度煮出したもので、煮物・味噌汁等に向いています。","frequency":"high","is_trend":false,"frequency_reason":"日本料理の基本"},{"id":"ck_063","subject":"調理理論","question":"干ししいたけのだし（戻し汁）を美味しく活用するための注意点として正しいものはどれか。","choices":["熱湯で短時間戻すと最もうまみが出る","ぬるま湯（40〜60℃）でゆっくり戻すとグアニル酸が増加してうまみが強くなる","水で戻す際は常に沸騰させる","戻し汁は捨ててよい"],"answer":1,"explanation":"干ししいたけのうまみ成分グアニル酸は、しいたけ自身の酵素により、ぬるま湯（40〜60℃）で最も活性化して生成されます。熱湯では酵素が失活してうまみが少なくなります。戻し汁も貴重なだしとして料理に活用します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_064","subject":"調理理論","question":"砂糖の「カラメル化」に関する記述として正しいものはどれか。","choices":["砂糖が低温で溶けて透明になる現象","砂糖を加熱すると160〜190℃で褐色のカラメルを生成する非酵素的褐変反応","砂糖とアミノ酸の反応","砂糖が水に溶ける現象"],"answer":1,"explanation":"カラメル化は砂糖（ショ糖）を加熱すると160℃前後から分解が始まり、190℃以上で褐色・特有の香ばしい香り・苦みを持つカラメルが生成される非酵素的褐変反応（アミノ酸は不要）です。プリンのカラメルソース・飴細工等に利用されます。","frequency":"high","is_trend":false,"frequency_reason":"重要な反応"},{"id":"ck_065","subject":"調理理論","question":"「酢飯（すし飯）」を作る際の合わせ酢の混ぜ方として正しいものはどれか。","choices":["炊きあがったご飯に合わせ酢を加えて長時間じっくりこねる","炊きあがったご飯に合わせ酢をかけてしゃもじで切るように混ぜ、うちわで扇ぎながら冷ます","ご飯を冷ましてから酢を混ぜる","酢を炊飯前の水に混ぜる"],"answer":1,"explanation":"酢飯は①炊きたてのご飯に合わせ酢（酢・砂糖・塩）を回しかける②しゃもじで切るように混ぜる（練らない）③うちわで扇ぎながら余分な水分・酢の揮発成分を飛ばして冷ます（光沢が出る）という手順で作ります。","frequency":"high","is_trend":false,"frequency_reason":"寿司の基本技術"},{"id":"ck_066","subject":"調理理論","question":"でんぷんの種類による特性の違いとして正しいものはどれか。","choices":["片栗粉・コーンスターチ・くずでんぷんは全て同じ特性","片栗粉（じゃがいもでんぷん）は透明度高く弾力があり、コーンスターチは白っぽく柔らかいとろみ、くずは透明で弾力がある","でんぷんの種類は調理に影響しない","加熱すると全て同じになる"],"answer":1,"explanation":"①片栗粉（じゃがいも）：透明感が高く弾力のある強いとろみ・冷めると離水しやすい②コーンスターチ（とうもろこし）：白っぽいマットなとろみ・安定性高い③くず粉（本葛）：最も透明感が高く上品な弾力・高価。用途により使い分けます。","frequency":"high","is_trend":false,"frequency_reason":"とろみの科学"},{"id":"ck_067","subject":"調理理論","question":"もちの調理に関する記述として正しいものはどれか。","choices":["うるち米でもちが作れる","もち米のアミロペクチンが加熱・搗くことで粘りのある弾力性を生む","もちは冷凍保存できない","もちの硬化は老化（β化）とは無関係"],"answer":1,"explanation":"もちはアミロペクチンほぼ100%のもち米を蒸した後に搗く（または加熱して捏ねる）ことで、アミロペクチンの分岐構造がほぐれ絡み合い粘性・弾力性の高いテクスチャーが生まれます。時間が経つと老化（β化）により硬くなります。","frequency":"high","is_trend":false,"frequency_reason":"もちの科学"},{"id":"ck_068","subject":"調理理論","question":"求肥（ぎゅうひ）が長時間柔らかさを保てる理由として正しいものはどれか。","choices":["防腐剤を使用しているため","砂糖・水あめを多量に加えることでもちのでんぷんの老化（β化）が抑制されるため","特殊な米を使用するため","保存温度が低いため"],"answer":1,"explanation":"求肥はもち米粉に砂糖・水あめを多量に加えて練り上げた和菓子素材で、砂糖・水あめが水分を保持（保水性）してでんぷんの老化（β化・硬化）を抑制するため、長時間柔らかい食感が保たれます。","frequency":"medium","is_trend":false,"frequency_reason":"でんぷん老化の応用"},{"id":"ck_069","subject":"調理理論","question":"みりんの調理性として正しいものはどれか。","choices":["料理酒と全く同じ働き","糖分・アルコールを含み照り・つや・甘味付与・臭み消し・煮崩れ防止効果がある","辛味をつけるために使う","色をつけないために使う"],"answer":1,"explanation":"みりん（本みりん）はもち米・米麹・焼酎を原料とするアルコール飲料（14%程度）で調理では①糖分による甘味と照り・つや②アルコールによる臭み消し③煮崩れ防止（たんぱく質の軽度変性で形を保つ）④コク・風味の付与等の効果があります。","frequency":"high","is_trend":false,"frequency_reason":"和食の基本調味料"},{"id":"ck_070","subject":"調理理論","question":"カスタードクリームが固まる原理として正しいものはどれか。","choices":["卵黄のたんぱく質の熱変性と小麦粉（またはコーンスターチ）のでんぷん糊化が組み合わさって固まる","砂糖のカラメル化で固まる","牛乳のカゼインが凝固する","寒天が固まる"],"answer":0,"explanation":"カスタードクリームが固まる原理は①小麦粉・コーンスターチのでんぷんが加熱で糊化して粘度が生じる②卵黄のたんぱく質が加熱変性して固まるの2つが組み合わさったものです。卵黄のレシチンがなめらかなテクスチャーにも貢献します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_071","subject":"調理理論","question":"スポンジケーキで卵を泡立てる目的として正しいものはどれか。","choices":["卵を殺菌するため","卵のたんぱく質の起泡性を利用して気泡を取り込み、焼成時の膨張で軽い食感を生む","砂糖をよく溶かすため","小麦粉を混ぜやすくするため"],"answer":1,"explanation":"スポンジケーキで全卵（共立て法）または卵白（別立て法）を泡立てる目的は、卵のたんぱく質の起泡性を利用して生地に多数の気泡を取り込み、オーブン加熱時に気泡が膨張してふわふわの食感を生むためです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_072","subject":"調理理論","question":"マリネ（marinade）の調理操作の説明として正しいものはどれか。","choices":["食材を油で揚げる操作","食材を酢・ワイン・油・香辛料等の液体に漬け込んで風味付け・柔軟化・保存性向上を図る操作","食材を乾燥させる操作","食材を高温で素早く焼く操作"],"answer":1,"explanation":"マリネは食材（肉・魚・野菜等）を酢・ワイン・レモン汁・油・香辛料・ハーブ等を合わせた漬け汁に一定時間漬け込む調理操作です。目的は①風味の付与②食材の柔軟化③保存性の向上④臭み消しです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_073","subject":"調理理論","question":"大量調理と家庭調理の違いとして正しいものはどれか。","choices":["大量調理は家庭調理の単純な拡大である","加熱時間・温度管理・食材の添加順等が大量調理では家庭調理と異なり、食材の量や密度の変化を考慮する必要がある","大量調理では味付けの調整は不要","大量調理では品質管理は不要"],"answer":1,"explanation":"大量調理では①食材量の増加で加熱時間が延びる・均一加熱が難しくなる②食材の投入で鍋・鉄板の温度が下がる③調味料の比例増は必ずしも成立しない等の問題があります。","frequency":"high","is_trend":false,"frequency_reason":"大量調理の特性"},{"id":"ck_074","subject":"調理理論","question":"スチームコンベクションオーブンの特徴として正しいものはどれか。","choices":["スチーム（蒸気）とコンベクション（熱風）を組み合わせて使用でき、蒸す・焼く・煮るの機能を一台で行える","フライのみに使用する","低温調理はできない","水を使わない"],"answer":0,"explanation":"スチームコンベクションオーブン（スチコン）は蒸気（スチーム）と熱風（コンベクション）を単独または組み合わせて使用できる業務用調理機器で①スチームモード（蒸し料理・ゆで物）②コンベクションモード（焼き物・ロースト）③コンビモード（蒸しながら焼く）の3モードを切り替えられます。","frequency":"medium","is_trend":true,"frequency_reason":"業務用厨房設備"},{"id":"ck_075","subject":"調理理論","question":"「ブランチング」の目的として正しいものはどれか。","choices":["食材を完全に加熱調理する操作","冷凍前・保存前に短時間熱湯処理して酵素を失活させ、色・風味・栄養素を保持する前処理","食材を漬け込む操作","食材を乾燥させる操作"],"answer":1,"explanation":"ブランチングは食品を短時間（90〜100℃の熱湯で30秒〜数分）処理して酵素を失活させ、冷水で急冷する前処理です。目的は①酵素的褐変・品質劣化の防止②冷凍前に使用することで色・風味・栄養素を保持③微生物の減少等です。冷凍野菜製造に必須の工程です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_076","subject":"調理理論","question":"「計量」に関する記述として正しいものはどれか。","choices":["大さじ1は約5mL・小さじ1は約15mL","大さじ1は約15mL・小さじ1は約5mL・カップ1は200mL（日本基準）","大さじと小さじは同じ量","カップは100mL"],"answer":1,"explanation":"日本の計量スプーン・カップの基準は大さじ1＝15mL・小さじ1＝5mL・カップ1＝200mLです。材料（砂糖・塩・小麦粉等）は比重が異なるため容量でも重量が異なります：食塩大さじ1≒18g、砂糖大さじ1≒9g（上白糖）等が目安です。","frequency":"high","is_trend":false,"frequency_reason":"計量の基本"},{"id":"ck_077","subject":"調理理論","question":"なすの色素アントシアニン（ナスニン）の安定化に有効な方法として正しいものはどれか。","choices":["アルカリ性（重曹水）に浸けると色が安定する","ミョウバン水や塩水に浸けて鉄イオン・カリウムイオンでアントシアニンを安定化する","加熱すると色が鮮やかになる","酢を多量に加えると安定する"],"answer":1,"explanation":"なすのアントシアニン（ナスニン）は金属イオンとキレート錯体を形成して安定します。ミョウバン水に浸けるとアルミニウムイオン等がナスニンと結合して鮮やかな紫色が保たれます。また鉄鍋・鉄串で調理することでも安定します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_078","subject":"調理理論","question":"「れんこんを酢水に浸ける」理由として正しいものはどれか。","choices":["でんぷんを取り除くため","ポリフェノールオキシダーゼの活性を抑制して褐変を防ぎ、白く仕上げるため","柔らかくするため","辛味を除くため"],"answer":1,"explanation":"れんこんに含まれるポリフェノール（タンニン・クロロゲン酸等）は空気中の酸素とポリフェノールオキシダーゼの作用で褐変（黒ずみ）します。酢水（酸性環境）に浸けることで①酵素活性を低下②酸素との接触を遮断して白く仕上がります。","frequency":"medium","is_trend":false,"frequency_reason":"褐変防止の応用"},{"id":"ck_079","subject":"調理理論","question":"「酢豚にパイナップルを入れる」調理上の理由として正しいものはどれか。","choices":["色どりのみのため","パイナップルのブロメライン（プロテアーゼ）が豚肉のたんぱく質を分解して柔らかくする効果がある（ただし加熱で失活）","パイナップルの脂質が肉を柔らかくする","甘みのみのため"],"answer":1,"explanation":"パイナップルに含まれるブロメライン（プロテアーゼ・たんぱく質分解酵素）は豚肉のたんぱく質を分解して柔らかくする効果があります。ただし加熱（酢豚の調理）でブロメラインは失活するため、実際の酢豚では甘みと彩りを加える意味合いが強くなります。","frequency":"medium","is_trend":false,"frequency_reason":"酵素の応用"},{"id":"ck_080","subject":"調理理論","question":"カレーを一晩置くと美味しくなる理由として正しいものはどれか。","choices":["腐敗が始まって風味が増すため","具材からうまみ・エキスが溶け出し、スパイスが馴染んでフレーバーが均一化するため","栄養素が増えるため","水分が増えるため"],"answer":1,"explanation":"カレーを一晩置くと①野菜・肉等の具材からうまみ成分・エキスが煮汁に溶け出し拡散する②スパイスのフレーバーが馴染んで均一になる等が起こります。ただし食中毒（ウエルシュ菌）リスクがあるため適切な温度管理が必要です。","frequency":"medium","is_trend":false,"frequency_reason":"実践的な調理知識"},{"id":"ck_081","subject":"調理理論","question":"フライパンで肉を焼く際に「強火で最初に表面を焼き固める」理由として正しいものはどれか。","choices":["肉の色を変えるだけのため","メイラード反応で香ばしい風味を生み、表面たんぱく質を凝固させてうまみを閉じ込めるため","水分を増やすため","火力の節約のため"],"answer":1,"explanation":"肉を最初に強火で焼く理由は①メイラード反応（アミノ酸と糖の反応）で香ばしい風味・香りと焼き色が生成される②表面のたんぱく質が素早く凝固してうまみ・肉汁が内部に閉じ込められるためです。その後に弱火で中まで火を通す工程が重要です。","frequency":"high","is_trend":false,"frequency_reason":"肉焼きの基本"},{"id":"ck_082","subject":"調理理論","question":"天ぷらの衣を作る際のコツとして正しいものはどれか。","choices":["冷水を使う・混ぜすぎない","熱湯を使う・よく混ぜる","常温で時間をかけて練る","油を加える"],"answer":0,"explanation":"天ぷらの衣は冷水を使い、グルテン形成を抑えるため混ぜすぎないことがコツです。グルテンが形成されると衣が硬く粘りが出てサクサク感が失われます。卵を加えて軽く混ぜ、ダマが残る程度で使用します。揚げる直前に作ることも重要です。","frequency":"high","is_trend":false,"frequency_reason":"実技関連"},{"id":"ck_083","subject":"調理理論","question":"「テリ（照り）」をつける調理方法として正しいものはどれか。","choices":["たくさんの油で揚げる","砂糖・みりん・しょうゆを含む調味液を煮詰めながらぬって焼き、表面に光沢を出す","大量の水で煮る","片栗粉のみでつける"],"answer":1,"explanation":"テリ（照り・つや）は砂糖・みりん・しょうゆ等の糖分を含む調味液を食材に塗りながら焼くことで、糖分のカラメル化と糖分のコーティングにより表面に光沢が生まれる現象です。照り焼き・蒲焼き等で用いられます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_084","subject":"調理理論","question":"電子レンジ加熱の原理として正しいものはどれか。","choices":["食品の表面から熱が伝わる","マイクロ波が食品中の水分子を振動させて発熱する","遠赤外線で加熱する","油が熱を伝える"],"answer":1,"explanation":"電子レンジはマイクロ波（2450MHz）を発生させ、食品中の水分子を激しく振動させて摩擦熱で加熱します（誘電加熱）。水分の多い部分から早く温まり、水分のない油や乾燥食品は温まりにくい特徴があります。","frequency":"high","is_trend":false,"frequency_reason":"実用知識"},{"id":"ck_085","subject":"調理理論","question":"「ゲル（gel）」と「ゾル（sol）」の違いとして調理に関連する説明として正しいものはどれか。","choices":["ゾルは液体状、ゲルは固体状の分散系で、ゼラチン溶液（加熱時ゾル・冷却時ゲル）が代表","両者に違いはない","ゲルは液体、ゾルは固体","ゲルは気体を含む"],"answer":0,"explanation":"ゾル（sol）は固体粒子・高分子が液体中に分散した流動性のある状態、ゲル（gel）は固体粒子・高分子が三次元網目構造を形成して固化した状態です。ゼラチン溶液は加熱時ゾル（液体）→冷却でゲル（固体）に変化します。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_086","subject":"調理理論","question":"ルー（roux）の種類と用途として正しいものはどれか。","choices":["ホワイトルウ・ブロンドルウ・ブラウンルウがあり、加熱時間・色でソースの種類が異なる","ルーは一種類のみ","ルーはデザートにのみ使う","ルーは日本料理のみで使う"],"answer":0,"explanation":"ルーは小麦粉と油脂（バター等）を炒めて作るソースのベースで①ホワイトルウ→ベシャメルソース②ブロンドルウ→ヴルーテソース③ブラウンルウ→デミグラスソース・カレーソース等に使い分けます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_087","subject":"調理理論","question":"油の劣化に関する記述として誤っているものはどれか。","choices":["色が濃くなる","粘度が増す","泡立ちが激しくなる","保存性が向上する"],"answer":3,"explanation":"劣化油は保存性が低下し、加熱で酸化が進行しやすくなります。劣化のサインは①色の濃化（茶褐色化）②粘度増加③泡立ちの増加④煙の発生（発煙点低下）⑤異臭⑥酸価・過酸化物価の上昇等です。劣化油の摂取は健康被害を起こすため定期的な交換が必要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_088","subject":"調理理論","question":"「焼き色をつけたい場合」と「白く仕上げたい場合」の調理温度の違いとして正しいものはどれか。","choices":["どちらも同じ温度でよい","焼き色（メイラード反応）は140〜180℃以上で促進、白く仕上げる場合は低温・短時間・水系調理を選ぶ","焼き色は低温でつく","白く仕上げるには高温が必要"],"answer":1,"explanation":"メイラード反応は140℃以上から顕著に起こり、180℃以上で急速に進行して褐色・香ばしい風味を生みます。白く仕上げたい料理（白身魚の酒蒸し・茶碗蒸し等）では①低温調理②水を媒体とした蒸し・ゆで（100℃以下）でメイラード反応を抑制します。","frequency":"medium","is_trend":false,"frequency_reason":"調理温度と反応"},{"id":"ck_089","subject":"調理理論","question":"「おでん」の調理科学として正しいものはどれか。","choices":["短時間の加熱でよい","長時間の低温煮込みでコラーゲンのゼラチン化・うまみの溶出・味の均一化が起こる、具材ごとに火の通りに差がある","全ての具材は同じ時間煮る","具材から出るうまみはない"],"answer":1,"explanation":"おでんの調理科学は①牛すじ・たこ等のコラーゲンが長時間加熱でゼラチン化して柔らかくなる②各種具材からうまみが煮汁に溶け出してだしが複合化する③煮込み時間で具材に味が染みる等があります。大根・卵等は早め・練り物は後から入れる等の調理順も重要です。","frequency":"medium","is_trend":false,"frequency_reason":"煮込み料理の科学"},{"id":"ck_090","subject":"調理理論","question":"ショートニング・バターの役割（製菓）として正しいものはどれか。","choices":["グルテンの形成を促進して生地をしっかりさせる","グルテンの形成を阻害してサクサクとした食感（ショートネス）を生み出す","甘味のみを加える","色をつけるためのみ使う"],"answer":1,"explanation":"製菓でのショートニング・バター等の油脂の役割は①グルテン形成阻害によるサクサク・ほろほろの「ショートネス（shortness）」の付与②空気抱込みによる膨らみ③風味・コクの付与等です。クッキー・パイ・タルト生地で重要です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_091","subject":"調理理論","question":"「木の芽あえ」等の和え物調理の特徴として正しいものはどれか。","choices":["食材に調味料・香味等の和え衣を直前に混ぜて仕上げる料理で、食べる直前に和えることが重要","食材を長時間熱湯に浸けて和える","食材を揚げてから和える","調味料は前日から混ぜておく"],"answer":0,"explanation":"和え物は茹でた・焼いた・生の食材に和え衣（ごま和え・白和え・酢みそ等）を混ぜ合わせる料理です。食べる直前に和えることが重要で、早く和えると①野菜から水分が出て水っぽくなる②和え衣の色が変わる③食感が悪くなる等の問題が生じます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_092","subject":"調理理論","question":"食品の「食感（テクスチャー）」のうち「サクサク感」を生む条件として正しいものはどれか。","choices":["水分を多く含む","表面の水分が少なく・でんぷんや薄い構造が均一に加熱されてガラス状固体になる","油脂を多く含む","たんぱく質が多い"],"answer":1,"explanation":"揚げ物・クッキー・クラッカー等のサクサク感（脆性）は食品表面の水分が少なく、でんぷんの薄い層や空気を含む気泡構造が乾燥・加熱によりガラス状固体（アモルファス状態）になることで生まれます。湿気を吸収するとサクサク感が失われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_093","subject":"調理理論","question":"真空調理法（低温調理）の特徴として正しいものはどれか。","choices":["100℃以上の高温で調理","60℃前後の低温で長時間加熱","短時間の高温調理","加熱しない"],"answer":1,"explanation":"真空調理法（スーヴィード）は食材を真空パックして60〜90℃の湯煎で長時間加熱する調理法です。低温長時間調理により肉が柔らかく仕上がり、栄養素・うまみが流出しにくく、衛生的でもあります。近年家庭用調理器も普及しています。","frequency":"medium","is_trend":true,"frequency_reason":"近年注目"},{"id":"ck_094","subject":"調理理論","question":"「みじん切り」の正しい手順として最も適切なものはどれか。","choices":["縦横に細かく切り込みを入れてから端から薄切りにする","最初に大きく切ってからフードプロセッサーのみで行う","包丁を使わずに手でちぎる","まず茹でてから切る"],"answer":0,"explanation":"みじん切りの基本手順は①食材（玉ねぎ等）に根を残して縦に細かく切り込みを入れる②横にも切り込みを入れる③端から薄切りにして細かく刻む です。玉ねぎは縦繊維に沿った切り込みを先に入れることで均一なみじん切りができます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_095","subject":"調理理論","question":"「直火焼き（じかびやき）」の特徴として正しいものはどれか。","choices":["食材が炎・輻射熱に直接さらされて表面に香ばしい焼き色がつく","水を使って加熱する","油を大量に使う","均一に温められる"],"answer":0,"explanation":"直火焼きは炭火・ガス火等の炎や輻射熱を食材に直接当てて加熱する方法で①高温で表面に香ばしい焼き色・焦げが生じる（メイラード反応・カラメル化）②水分が蒸発して香り成分が生成③炭火の遠赤外線が食材の内部まで温める等の特徴があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_096","subject":"調理理論","question":"コンベクションオーブン（熱風オーブン）の特徴として正しいものはどれか。","choices":["ファン（送風機）で熱風を強制循環させ、通常のオーブンより短時間・均一に加熱できる","水蒸気のみで加熱する","焼き色がつかない","小型の家庭用のみ存在する"],"answer":0,"explanation":"コンベクションオーブンはファンにより庫内の熱風を強制対流させる方式で①通常オーブンより約20〜30%短時間で加熱②庫内温度が均一で焼きムラが少ない③表面が乾燥しやすく焼き色・クリスピー感が出やすい等の特徴があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_097","subject":"調理理論","question":"食品の「食感（テクスチャー）」のうち「とろみ」が料理を美味しくする理由として正しいものはどれか。","choices":["片栗粉が食品の色を変えるため","とろみにより食材の保温効果が高まり、口当たりが滑らかになり、調味料が食材に絡みやすくなるため","片栗粉がうまみを増やすため","片栗粉が食材を柔らかくするため"],"answer":1,"explanation":"あんかけ（片栗粉のとろみ）が料理を美味しくする理由は①とろみにより熱が逃げにくく保温効果が高まる②口当たりが滑らかになり食べやすい③調味料が食材に絡みやすくなる④食材の水分の蒸発を防ぐ等の効果があるためです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_098","subject":"調理理論","question":"いりこ（煮干し）だしの取り方として正しいものはどれか。","choices":["沸騰した湯に入れて長時間煮出す","頭・内臓を除去して水から入れ沸騰後5〜10分煮出して濾す","水に長時間浸けるだけ（加熱不要）","昆布と全く同じ方法で取る"],"answer":1,"explanation":"いりこ（煮干し）だしは①頭と内臓（苦味・臭みの原因）を除く②水から入れて30分以上浸けておく③沸騰後弱火で5〜10分煮出す④濾す、という手順が基本です。味噌汁・煮物に向いた力強いうま味のだしで、九州・西日本でよく使われます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_099","subject":"調理理論","question":"圧力鍋の特徴として正しいものはどれか。","choices":["100℃以下で調理する","密閉して内圧を高め約120℃の高温・短時間で調理する","常圧で時間をかける","蒸気を逃がしながら調理"],"answer":1,"explanation":"圧力鍋は密閉して内圧を高め、約120℃の高温で短時間調理する器具です。豆類・骨付き肉・玄米等の硬い食材を短時間で柔らかくでき、エネルギー効率も良いです。蒸気が逃げないため水分・栄養素の流出も少ないです。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"ck_100","subject":"調理理論","question":"調理師として料理の品質・安全を維持するために最も重要な姿勢として正しいものはどれか。","choices":["昔からの方法を変えずに守る","科学的な根拠に基づいて調理技術を理解し、食品安全・衛生管理・栄養・嗜好性をバランスよく実践する","見た目だけを重視する","コスト削減のみを優先する"],"answer":1,"explanation":"現代の調理師には①調理科学の理解（なぜその方法が有効かの科学的根拠）②食品衛生・安全管理（HACCP的思考）③栄養・健康への配慮④食べる人の嗜好・多様なニーズへの対応⑤食文化の継承と創造⑥環境・食品ロスへの配慮等をバランスよく実践する総合的な専門性が求められます。","frequency":"high","is_trend":true,"frequency_reason":"調理師の専門性"},{"id":"fc_051","subject":"食文化概論","question":"弥生時代の食文化の特徴として正しいものはどれか。","choices":["稲作が始まり米食文化の基礎が形成された","肉食が中心だった","海産物のみを食べていた","農業は存在しなかった"],"answer":0,"explanation":"弥生時代（紀元前300年頃〜紀元後300年頃）には大陸から稲作が伝わり、水田農業が日本列島に広まりました。米・麦・豆・粟・稗等の穀物農業が始まり、日本の米食文化の基礎が形成されました。縄文時代は狩猟・採集・漁労が中心でした。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_052","subject":"食文化概論","question":"室町時代の食文化として正しいものはどれか。","choices":["洋食が主流となった","本膳料理の確立・禅宗の影響による精進料理の発展・茶の湯文化の普及等があった","肉食が解禁された","米の栽培が始まった"],"answer":1,"explanation":"室町時代は①武家の饗応形式として本膳料理が確立②禅宗寺院での精進料理の発展・豆腐・こんにゃく・わさび等の普及③茶の湯文化の発展（村田珠光）等が起こり、日本料理の基礎が形成された重要な時代です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_053","subject":"食文化概論","question":"戦国・安土桃山時代に南蛮貿易で日本に伝わった食品として正しいものはどれか。","choices":["そば・うどん","かぼちゃ・とうもろこし・とうがらし・じゃがいも・天ぷら（揚げ物技法）","みそ・しょうゆ","日本酒"],"answer":1,"explanation":"16世紀の南蛮貿易（ポルトガル・スペイン等との交易）でかぼちゃ（カンボジア産→かぼちゃ）・とうもろこし・とうがらし・じゃがいも・さつまいも・落花生等のアメリカ大陸原産の食材と、天ぷら・カステラ・金平糖・ボーロ等の菓子が伝わりました。","frequency":"high","is_trend":false,"frequency_reason":"伝来食品は頻出"},{"id":"fc_054","subject":"食文化概論","question":"幕末・明治以降に日本に普及した洋食として正しいものはどれか。","choices":["すき焼き・カレーライス・コロッケ・とんかつ・オムライス等の和洋折衷料理","フランス料理のみ","パスタのみ","和食に変化はなかった"],"answer":0,"explanation":"明治以降の文明開化・西洋化の流れで①肉食解禁（1872年）②牛鍋→すき焼き③カレーライス（インド→英国→日本式にアレンジ）④コロッケ⑤とんかつ⑥オムライス等の「洋食（ようしょく）」が生まれました。西洋料理を日本人の嗜好に合わせた独自の料理文化です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_055","subject":"食文化概論","question":"昭和後期〜平成にかけての日本の食生活の変化として正しいものはどれか。","choices":["食生活は変化しなかった","高度経済成長期以降に肉食・乳製品・油脂の摂取増加・外食産業の発展・インスタント食品の普及・食の多様化が起こった","米の消費が増加した","伝統食が復活した"],"answer":1,"explanation":"昭和30〜40年代の高度経済成長期以降、①肉・乳製品・油脂の摂取量増加（食生活の洋風化）②米消費量の減少③外食産業・ファミリーレストランの発展④インスタント食品・冷凍食品・コンビニ食の普及⑤食の多様化・グローバル化等、食生活が大きく変化しました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_056","subject":"食文化概論","question":"日本の伝統的な発酵調味料として正しい組み合わせはどれか。","choices":["みそ・しょうゆ・みりん・酒・酢・魚醤（しょっつる・いしる・ひしお等）","ケチャップ・マスタード・ウスターソース","オリーブオイル・バルサミコ酢","チリソース・ナンプラー"],"answer":0,"explanation":"日本の伝統的な発酵調味料は①みそ（大豆・麹・塩）②しょうゆ（大豆・小麦・麹・塩）③みりん（もち米・米麹・焼酎）④日本酒⑤酢（米酢等）⑥魚醤（秋田のしょっつる・能登のいしる等）です。これらは麹菌・乳酸菌・酵母等の発酵微生物が関与する日本固有の発酵文化の産物です。","frequency":"high","is_trend":false,"frequency_reason":"発酵調味料の基本"},{"id":"fc_057","subject":"食文化概論","question":"関西（大阪・京都・兵庫等）の食文化の特徴として正しいものはどれか。","choices":["濃い味付けで塩味が強い","昆布だし中心の繊細な薄味文化・京料理・なにわ料理等の独自の食文化がある","肉食文化が中心","伝統食は存在しない"],"answer":1,"explanation":"関西（上方）の食文化は①昆布（利尻・羅臼・真昆布）中心の繊細な薄味だし文化②京料理（京懐石・おばんざい・京野菜）③大阪の「天下の台所」文化（たこ焼き・お好み焼き・きつねうどん）④薄口醤油の使用（色・素材の色を活かす）等が特徴です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_058","subject":"食文化概論","question":"世界三大料理として一般的に挙げられるものはどれか。","choices":["フランス料理・中国料理・トルコ料理","日本料理・イタリア料理・タイ料理","フランス料理・スペイン料理・インド料理","和食・洋食・中華"],"answer":0,"explanation":"世界三大料理は一般的にフランス料理・中国料理・トルコ料理とされます。それぞれ歴史・技術・多様性で世界の食文化に大きな影響を与えました。フランス料理は2010年に「美食術」、トルコ料理（地中海食の一部）も2013年にユネスコ無形文化遺産に登録されています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_059","subject":"食文化概論","question":"中国料理の四大料理として正しい組み合わせはどれか。","choices":["北京料理・上海料理・四川料理・広東料理","東京料理・京都料理・大阪料理・福岡料理","北部・南部・東部・西部","フランス・イタリア・スペイン・ドイツ"],"answer":0,"explanation":"中国料理の四大料理は①北京料理（華北・宮廷料理・北京ダック等）②上海料理（華東・小籠包等）③四川料理（華西・麻婆豆腐・担々麺等の辛い料理）④広東料理（華南・点心・飲茶・酢豚等）です。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_060","subject":"食文化概論","question":"地中海食がユネスコ無形文化遺産に登録された年と特徴として正しいものはどれか。","choices":["2010年登録・オリーブオイル・野菜・果物・全粒穀物・魚介類・豆類中心で健康的な食事パターン","2013年登録・肉食中心の食事","登録されていない","砂糖が中心の食事"],"answer":0,"explanation":"地中海食は2010年にユネスコ無形文化遺産に登録されました。特徴は①オリーブオイルが主要脂質②野菜・果物・豆類・全粒穀物が豊富③魚介類を週2回以上④赤肉・加工食品は少量⑤適度なワイン⑥共食・食卓を囲む文化です。心疾患・がん・認知症予防効果が多くの研究で示されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_061","subject":"食文化概論","question":"ハラル（イスラム教の食の規律）に関する記述として正しいものはどれか。","choices":["豚肉・アルコールが禁忌","イスラム教の作法で処理された食肉のみ可","処理から提供までの過程で禁忌物との接触を避ける","以上すべて正しい"],"answer":3,"explanation":"ハラルは「許された」を意味し、イスラム教の食の戒律です。①豚肉・アルコール禁忌②動物は専用の方法で処理（神への祈り）③禁忌物との接触禁止（調理器具・食器も別途）④認証制度あり、等が特徴です。訪日ムスリム対応で重要です。","frequency":"medium","is_trend":true,"frequency_reason":"インバウンド対応"},{"id":"fc_062","subject":"食文化概論","question":"インバウンド（訪日外国人）対応として飲食店に必要な知識として正しいものはどれか。","choices":["日本語のみのメニューで十分","ハラル・ベジタリアン・ヴィーガン・アレルギー対応・多言語メニュー等の多様な食ニーズへの対応が重要","外国人には特別な食事は不要","全員に同じ食事を出せばよい"],"answer":1,"explanation":"インバウンド対応では①ハラル対応（豚肉・アルコール不使用）②ベジタリアン・ヴィーガン対応（動物性食品の制限）③コーシャ（ユダヤ教の食律）④アレルギー対応（英語表示等）⑤多言語メニュー等の多様な食ニーズへの対応が重要です。","frequency":"high","is_trend":true,"frequency_reason":"インバウンド対応"},{"id":"fc_063","subject":"食文化概論","question":"「懐石料理」と「会席料理」の違いとして正しいものはどれか。","choices":["同じ料理である","懐石は茶事（茶の湯）のための料理・一汁三菜が基本、会席は宴会（酒席）のための料理で酒の肴から始まる","懐石の方が豪華","会席は精進料理"],"answer":1,"explanation":"懐石（茶懐石）は茶の湯の席で客をもてなすための料理で①一汁三菜が基本②ご飯→汁→向付（刺身等）の順で出る③茶を主役として食事は腹八分目。会席料理は酒席・宴会のための料理で①酒の肴が先②多品数③華やかな盛り付けが特徴です。","frequency":"high","is_trend":false,"frequency_reason":"頻出区別"},{"id":"fc_064","subject":"食文化概論","question":"「食の多様化・個食化」が現代日本で抱える問題として正しいものはどれか。","choices":["食の多様化・個食は全て良いことである","孤食・食の共有体験の減少・食文化の継承困難・栄養バランスの偏り等の問題がある","食文化に影響しない","経済的なメリットのみある"],"answer":1,"explanation":"現代日本の食の多様化・個食化は①孤食（一人での食事）による食の楽しさ・コミュニケーションの減少②家族・地域の食文化・料理技術の継承困難③個人の嗜好優先による栄養バランスの偏り④「こ食」問題（固食・粉食・濃食等）等の課題があります。","frequency":"high","is_trend":true,"frequency_reason":"食育の課題"},{"id":"fc_065","subject":"食文化概論","question":"調理師法の制定年として正しいものはどれか。","choices":["1958年（昭和33年）","1900年（明治33年）","2000年（平成12年）","2020年（令和2年）"],"answer":0,"explanation":"調理師法は1958年（昭和33年）5月10日に制定されました。これにより日本初の国家資格としての「調理師」が誕生しました。5月10日は「調理師の日」として制定されています。法の目的は調理師の資質を向上させることにより「国民の食生活の向上に資すること」です。","frequency":"high","is_trend":false,"frequency_reason":"最頻出"},{"id":"fc_066","subject":"食文化概論","question":"調理師免許の取得方法として正しいものはどれか。","choices":["調理師養成施設の卒業","2年以上の実務経験＋調理師試験合格","以上のいずれか","医師免許の取得"],"answer":2,"explanation":"調理師免許の取得方法は2通りで①厚生労働大臣指定の調理師養成施設（調理師学校）を卒業する②飲食店等で2年以上の調理業務経験＋都道府県知事の調理師試験に合格、のいずれかが必要です。免許は都道府県知事が交付します。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_067","subject":"食文化概論","question":"調理師の業務独占について正しい記述はどれか。","choices":["調理師でなければ調理業務はできない","調理師は名称独占資格で、業務独占ではない","調理師でなければ料理を作れない","医師と同じ業務独占資格"],"answer":1,"explanation":"調理師は「名称独占資格」で「業務独占資格」ではありません。つまり、調理師の資格を持たなくても調理業務は行えますが、「調理師」を名乗ることはできません。施設への設置努力義務があり、衛生・栄養面での専門性が期待されています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_068","subject":"食文化概論","question":"「スローフード運動」の提唱国・特徴として正しいものはどれか。","choices":["イタリアで提唱・伝統食文化保護","アメリカで提唱・ファストフード推進","日本で提唱・米食推進","フランスで提唱・ワイン消費促進"],"answer":0,"explanation":"スローフード運動は1986年イタリアでカルロ・ペトリーニにより提唱されました。①消えゆく伝統的な食材・料理を守る②質の良い食材を提供する小生産者を守る③子供を含む消費者に味の教育、を3つの理念とします。ファストフード文化への対抗として始まり世界に広がりました。","frequency":"medium","is_trend":true,"frequency_reason":"食文化保護"},{"id":"fc_069","subject":"食文化概論","question":"食育基本法の目的として正しいものはどれか。","choices":["国民が生涯にわたって健全な心身を培い豊かな人間性を育むための食育推進","食料の自給率向上のみ","学校給食の改善のみ","農業従事者の支援のみ"],"answer":0,"explanation":"食育基本法（2005年制定）の目的は「国民が生涯にわたって健全な心身を培い、豊かな人間性を育むことができるよう、食育を総合的かつ計画的に推進すること」です。家庭・学校・地域・生産者等が連携した取り組みが重要で、食育推進基本計画が5年ごとに策定されます。","frequency":"high","is_trend":true,"frequency_reason":"食育重要"},{"id":"fc_070","subject":"食文化概論","question":"年越しそばの習慣の由来として正しいものはどれか。","choices":["江戸時代から始まった習慣で「細く長く＝長寿・縁を細く長く続ける」等の意味が込められている","明治時代に西洋から伝わった","そばを食べないと年を越せない決まりがある","由来は全く不明"],"answer":0,"explanation":"年越しそばは江戸時代中期頃から始まった習慣で、主な意味・由来は①そばの細く長い形から「長寿・縁起」②そばは切れやすいことから「一年の苦労・厄災を断ち切る」等諸説あります。大晦日（12月31日）の夜に食べる日本の代表的な年中行事食です。","frequency":"high","is_trend":false,"frequency_reason":"年中行事食頻出"},{"id":"fc_071","subject":"食文化概論","question":"「節分の食文化」として正しいものはどれか。","choices":["うなぎを食べる","豆まき（大豆）・恵方巻き（その年の恵方を向いて太巻きを丸かじり）が代表的な食文化","刺身を食べる","精進料理を食べる"],"answer":1,"explanation":"節分（2月3日頃）の食文化は①豆まき：炒り大豆を撒いて鬼（邪気）を払い、年齢の数だけ食べる②恵方巻き：その年の恵方を向いて太巻きを黙って丸かじりする（関西から全国に広まった）③いわしを焼いて食べる（鬼が嫌うにおいで邪気払い）等があります。","frequency":"high","is_trend":false,"frequency_reason":"年中行事頻出"},{"id":"fc_072","subject":"食文化概論","question":"「ひな祭り（上巳の節句）」に食べる伝統的な食べ物として正しいものはどれか。","choices":["おせち料理","ちらし寿司・ひし餅・白酒・ひなあられが代表的","七草がゆ","柏餅"],"answer":1,"explanation":"ひな祭り（3月3日・上巳の節句）の伝統的食べ物は①ちらし寿司（具材それぞれに縁起の意味）②ひし餅（菱形・桃・白・緑の三色）③白酒（米麹・みりんで作る甘酒）④ひなあられ（桜・緑・黄・白の四色）です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_073","subject":"食文化概論","question":"土用の丑の日に食べるものとして正しいものはどれか（fc_073）。","choices":["うなぎ","そば","もち","ぜんざい"],"answer":0,"explanation":"土用の丑の日（夏の土用、7月下旬〜8月上旬）にはうなぎを食べる習慣があります。江戸時代に蘭学者・平賀源内が「丑の日にうなぎ」を広めたと伝えられ、夏バテ防止の滋養食として現代まで続いています。","frequency":"high","is_trend":false,"frequency_reason":"頻出"},{"id":"fc_074","subject":"食文化概論","question":"「彼岸（おはぎ・ぼたもち）」の食文化として正しいものはどれか。","choices":["彼岸とは全く関係ない","春彼岸の「ぼたもち」・秋彼岸の「おはぎ」はもち米とあんこを使い、小豆の赤色が邪気を払うとして先祖に供える食べ物","彼岸には断食する","彼岸には肉料理を食べる"],"answer":1,"explanation":"お彼岸（春分・秋分の日を中心とした7日間）には先祖供養のためにぼたもち（春・牡丹の花に見立て）・おはぎ（秋・萩の花に見立て）を仏壇に供えます。小豆の赤色が魔除け・邪気払いの意味を持つとされます。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_075","subject":"食文化概論","question":"「お食い初め（百日祝い）」の意味と内容として正しいものはどれか。","choices":["生後100日頃に赤ちゃんが一生食べ物に困らないようにと願い、食事を食べさせる真似をする儀式","生後100日で断乳する儀式","生後100日で離乳食を完了させる儀式","100種類の食べ物を食べる儀式"],"answer":0,"explanation":"お食い初め（食い初め・百日祝い）は生後100日頃に「一生食べ物に困らないように」と願い行う儀式で①一汁三菜の正式な祝い膳（鯛の塩焼き・お赤飯・煮物・香の物・汁物）②歯固めの石③大人が食べさせる真似をする等の形式があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_076","subject":"食文化概論","question":"「フェアトレード（公正取引）」の説明として正しいものはどれか。","choices":["安く輸入することを推進する仕組み","途上国の生産者が適正な価格・労働条件で生産した商品を認証し、消費者が適正価格で購入することで生産者の生活向上を支援する仕組み","国産品のみを使う仕組み","輸出を禁止する仕組み"],"answer":1,"explanation":"フェアトレードは途上国の生産者（コーヒー・カカオ・紅茶・バナナ等の農産物）が過度な搾取を受けず、適正な価格・安全な労働環境・地域社会への還元等を確保した条件で生産した商品を国際認証し、消費者が購入することで生産者の自立・生活向上を支援する取り組みです。","frequency":"medium","is_trend":true,"frequency_reason":"SDGs・倫理的消費"},{"id":"fc_077","subject":"食文化概論","question":"「エシカル消費（倫理的消費）」の説明として正しいものはどれか。","choices":["最も安い商品を選ぶ消費行動","人・社会・環境・地域に配慮した消費行動（フェアトレード・オーガニック・地産地消・エコ商品の選択等）","輸入品のみを選ぶ","価格のみで選ぶ"],"answer":1,"explanation":"エシカル消費（倫理的消費）は消費者が商品・サービスの選択時に人（労働者・生産者）・社会・環境・地域への配慮を考慮する消費行動です。フェアトレード商品・オーガニック食品・地産地消・エコ認証商品等が含まれます。SDGsの目標12（持続可能な消費）と深く関連します。","frequency":"medium","is_trend":true,"frequency_reason":"エシカル消費推進"},{"id":"fc_078","subject":"食文化概論","question":"食品ロスゼロを目指すための消費者ができる行動として正しいものはどれか。","choices":["買い物は多めに買って廃棄する","必要な量だけ購入・計画的な食品管理・賞味期限の正しい理解・てまえどり（手前の商品を選ぶ）・残り食材の活用等","食品ロスは飲食店のみの問題","賞味期限が過ぎたら全て捨てる"],"answer":1,"explanation":"食品ロス削減のために消費者ができる行動は①計画的な買い物②冷蔵庫の在庫確認③「てまえどり」：陳列棚の手前（消費期限近い商品）から選ぶ④賞味期限・消費期限の正しい理解（賞味期限後も直ちに廃棄は不要）⑤残り食材の創意工夫した活用等です。","frequency":"high","is_trend":true,"frequency_reason":"食品ロス削減"},{"id":"fc_079","subject":"食文化概論","question":"「ガストロノミー（gastronomy）」の意味として正しいものはどれか。","choices":["胃の病気","食と文化・科学・芸術・社会の関係を探求する「美食学」・食の学問","調理器具の名前","レストランの種類"],"answer":1,"explanation":"ガストロノミーはギリシャ語「gastr（胃・食）」＋「nomos（法則・学問）」に由来し、食と文化・科学・芸術・社会・歴史の関係を探求する「美食学」です。料理・食材・飲料・食習慣・食文化・食科学等を包括した総合的な食の学問です。","frequency":"low","is_trend":false,"frequency_reason":""},{"id":"fc_080","subject":"食文化概論","question":"「培養肉（細胞農業）」について正しいものはどれか。","choices":["従来の畜産と全く同じ方法","動物の細胞を培養して食用の肉を生産する技術で、環境負荷・動物福祉・食料安全保障の観点から注目されている","すでに全世界で普及している","日本では開発されていない"],"answer":1,"explanation":"培養肉（クリーンミート・細胞農業）は動物から採取した幹細胞等を培養して食用の肉組織を生産する技術です。①温室効果ガス排出・水・土地利用の大幅削減②動物を屠殺しない③食料安全保障への貢献等のメリットが期待されています。2023年にアメリカで承認・市販が始まりました。","frequency":"low","is_trend":true,"frequency_reason":"フードテック最前線"},{"id":"fc_081","subject":"食文化概論","question":"日本の「国民食」といえる料理の特徴として正しいものはどれか。","choices":["日本に国民食はない","ラーメン・カレーライス・寿司等は出自は外国でも日本独自に発展し「日本の国民食」として定着している","全て江戸時代以前から存在する","一種類しかない"],"answer":1,"explanation":"ラーメン（中国・江戸末期伝来→日本独自に多様な地方ラーメン文化発展）・カレーライス（インド→英国→明治日本→独自の「日本式カレー」）・寿司（東南アジア起源→江戸時代の握り寿司→現代の多様化）等は外国起源ながら日本独自に発展・定着した「日本の国民食」です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_082","subject":"食文化概論","question":"地産地消の意義として誤っているものはどれか。","choices":["新鮮な食材の入手","地域経済の活性化","輸送による環境負荷の低減","食料自給率の低下"],"answer":3,"explanation":"地産地消は食料自給率を高める効果があり、低下させるものではありません。地産地消の意義は①新鮮な食材②地域経済活性化③輸送負荷（フードマイレージ）低減④食文化継承⑤生産者と消費者の距離縮小⑥食料自給率向上等です。","frequency":"medium","is_trend":true,"frequency_reason":"食育・環境"},{"id":"fc_083","subject":"食文化概論","question":"日本の食料自給率（カロリーベース、近年）として正しいものはどれか。","choices":["約38%","約60%","約80%","約100%"],"answer":0,"explanation":"日本のカロリーベース食料自給率は約38%（2022年度）で、先進国の中で最低水準です。生産額ベースでは約58%（2022年度）。米はほぼ100%自給ですが、小麦・大豆・飼料穀物等の輸入依存度が高いことが要因です。食料安全保障上の重要課題となっています。","frequency":"high","is_trend":true,"frequency_reason":"食料安全保障"},{"id":"fc_084","subject":"食文化概論","question":"「食の砂漠化（フードデザート）」への対策として飲食・調理の専門家にできることとして正しいものはどれか。","choices":["関係ない・対策は不要","移動販売・宅食・地域食堂・調理教室等を通じて食へのアクセスと食の楽しさを地域に届けることができる","大型スーパーの出店のみ","全て行政の仕事"],"answer":1,"explanation":"フードデザート（食の砂漠：新鮮・健康的な食品へのアクセスが困難な地域）への対策として調理・飲食の専門家は①移動販売車による食品・惣菜の提供②宅食（配食サービス）③子ども食堂・地域食堂の運営支援④調理教室・食育活動による食の自立支援等を通じて直接貢献できます。","frequency":"low","is_trend":true,"frequency_reason":"地域貢献"},{"id":"fc_085","subject":"食文化概論","question":"ミシュランガイドに関する記述として正しいものはどれか。","choices":["フランスのタイヤ会社が発行する世界的グルメガイド","三つ星が最高評価","日本では2007年から東京版が発行","以上すべて正しい"],"answer":3,"explanation":"ミシュランガイドは1900年にフランスのミシュラン社（タイヤメーカー）がドライバー向けに発行を始めたグルメガイドで、現在は世界的な権威となっています。三つ星（その料理を味わうために旅行する価値のある卓越した料理）が最高評価です。日本版は2007年に東京版から始まりました。","frequency":"medium","is_trend":true,"frequency_reason":"国際的評価"},{"id":"fc_086","subject":"食文化概論","question":"「ソムリエ」の役割として正しいものはどれか。","choices":["料理を作る専門家","ワイン等の飲料を専門とし、料理との相性（マリアージュ）を提案する飲料のスペシャリスト","食品安全を管理する資格","栄養指導を行う専門家"],"answer":1,"explanation":"ソムリエはレストラン・ホテル等でワイン等の飲料の専門家として①ワインの仕入れ・セラー管理②客への提案・サービス③料理との相性（マリアージュ）の提案④ワインテイスティング等を行います。日本ソムリエ協会（JSA）等の認定資格があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_087","subject":"食文化概論","question":"「フードコーディネーター」の主な業務として正しいものはどれか。","choices":["食品の製造管理のみ","食の企画・演出・スタイリング（料理撮影・メニュー開発・フードプロデュース・食育等）を行う食の総合プロデューサー","医療機関での栄養指導","食品衛生の監視"],"answer":1,"explanation":"フードコーディネーターは食に関わる企画・演出・プロデュースを行う職で①料理・食品の撮影スタイリング②メニュー開発・商品開発③フードイベントの企画・運営④食育・料理教室の開催⑤食に関するメディアのコンテンツ制作等を行います。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_088","subject":"食文化概論","question":"「パティシエ（patissier）」と「ブーランジェ（boulanger）」の違いとして正しいものはどれか。","choices":["全く同じ職業","パティシエは菓子・デザート専門（製菓）、ブーランジェはパン専門（製パン）のフランス語の職名","パティシエはパン職人","ブーランジェは菓子職人"],"answer":1,"explanation":"パティシエ（pâtissier）はケーキ・チョコレート・プティフール等の洋菓子・デザートを専門とするフランス語の職名、ブーランジェ（boulanger）はフランスパン・クロワッサン等のパンを専門とする職名です。日本では製菓衛生師（国家資格）等の資格があります。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_089","subject":"食文化概論","question":"「昆虫食」の現状と将来性として正しいものはどれか。","choices":["昆虫食は全く普及していない","FAO（国連食糧農業機関）が推奨・世界で20億人が昆虫を食べており、高たんぱく・低環境負荷の代替タンパク源として注目されている","日本では全面禁止","栄養価がない"],"answer":1,"explanation":"FAOは2013年の報告書「食用昆虫」で昆虫食を将来の食料問題解決策として推奨しました。現在世界約80カ国・20億人以上が昆虫を食べており、コオロギ・ミールワーム等は①高たんぱく②低温室効果ガス③少ない土地・水で生産可能等のメリットがあります。","frequency":"low","is_trend":true,"frequency_reason":"代替タンパク質"},{"id":"fc_090","subject":"食文化概論","question":"「食文化と環境の持続可能性」について正しいものはどれか。","choices":["食文化は環境と無関係","日本の伝統的食文化（一汁三菜・旬の食材・発酵食品・もったいない精神等）は環境負荷が低く持続可能な食の在り方として世界から再評価されている","伝統食文化は時代遅れ","現代の食文化のみが正しい"],"answer":1,"explanation":"日本の伝統的食文化は①一汁三菜（植物性中心・バランス）②旬の食材の利用（フードマイレージ低・旬の食材は栄養価高）③発酵食品（保存性・うまみ・微生物活用）④もったいない精神（食品ロス削減）⑤里山・里海の恵みを生かした持続可能な農漁業等、現代のSDGsの観点からも再評価されています。","frequency":"high","is_trend":true,"frequency_reason":"SDGsと食文化"},{"id":"fc_091","subject":"食文化概論","question":"「食文化の継承」において調理師が果たす役割として正しいものはどれか。","choices":["食文化の継承は料理人の仕事ではない","郷土料理・伝統的調理技術・行事食等を現代に生かし・後世に伝えることは調理師の重要な使命の一つ","古い料理を変えてはいけない","食文化は自然に継承される"],"answer":1,"explanation":"調理師は食文化の専門職として①郷土料理・伝統的調理技術の記録・継承②季節の行事食・通過儀礼食の実践③食材の生産背景・文化的意味を食べる人に伝える④現代のニーズに応じた食文化のアレンジ・発展⑤次世代調理師への技術・文化の伝承等の役割を担っています。","frequency":"high","is_trend":true,"frequency_reason":"調理師の使命"},{"id":"fc_092","subject":"食文化概論","question":"「フードツーリズム（食の観光）」の説明として正しいものはどれか。","choices":["旅行中に食事をしないこと","旅先の食文化・郷土料理・食品産業等を主な目的として楽しむ観光スタイル","食品工場のみを見学する","料理教室のみに参加する"],"answer":1,"explanation":"フードツーリズムは旅先の食文化・郷土料理・地場産品・食品産業（農場・醸造所・市場等）・料理教室等を主な動機・目的とした観光スタイルです。地域の食文化の保護・継承・経済活性化に貢献します。インバウンド誘致の重要な要素となっています。","frequency":"low","is_trend":true,"frequency_reason":"食のインバウンド"},{"id":"fc_093","subject":"食文化概論","question":"韓国料理の特徴として正しいものはどれか。","choices":["辛い料理が全くない","キムチ・プルコギ・ビビンバ・チゲ等の発酵食品・焼き肉・鍋料理が特徴で唐辛子・にんにく・ごま油をよく使う","日本料理と全く同じ","米食文化がない"],"answer":1,"explanation":"韓国料理の特徴は①キムチ（白菜等の唐辛子漬け・発酵食品）②プルコギ・サムギョプサル等の焼き肉文化③ビビンバ・クッパ・チゲ（鍋）④唐辛子・にんにく・ごま油・コチュジャン等の使用⑤ナムル（野菜の和え物）等、日本・中国の影響を受けつつ独自の食文化を発展させています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_094","subject":"食文化概論","question":"「食の記憶（フードメモリー）」が食文化継承に重要な理由として正しいものはどれか。","choices":["食の記憶は不要","幼少期の食体験・家庭の味・地域の食文化の記憶がアイデンティティを形成し、文化継承の核となる","記憶は食と無関係","料理のレシピだけで文化は継承できる"],"answer":1,"explanation":"食の記憶（フードメモリー）は幼少期に体験した家庭料理・地域の食・行事食等の記憶で、個人・集団のアイデンティティ形成に深く関わります。「おふくろの味」「ふるさとの食」のように感情と結びついた食の記憶は文化継承の核となります。食育・料理教室・家族での共食がこの記憶を作る重要な機会です。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_095","subject":"食文化概論","question":"精進料理の特徴として誤っているものはどれか。","choices":["動物性食品を使わない","植物性食品（野菜・豆・穀類）が中心","五葷（ねぎ・にんにく等）も避ける","魚介類は使用する"],"answer":3,"explanation":"精進料理は仏教の「不殺生戒」に基づき、魚介類を含む動物性食品を一切使用しません。植物性食品（野菜・豆・穀類・海藻・きのこ等）を使用し、五葷（ごくん：ねぎ・にら・にんにく・らっきょう・あさつき）も修行の妨げとして避けます。鎌倉時代に道元によって体系化されました。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_096","subject":"食文化概論","question":"「いただきます」「ごちそうさま」という日本固有の食事の挨拶が示す文化的意義として正しいものはどれか。","choices":["単なる形式的な習慣","食材・命・生産者・調理者への感謝の精神を表し、和食文化の精神性（もったいない等）と深く結びついている","外国でも同じ挨拶が使われる","子どもだけが行う習慣"],"answer":1,"explanation":"「いただきます」は「命（食材）をいただく」感謝、「ごちそうさま」は「ご馳走（馳せ走り食材を集めた）への感謝」を意味します。日本の食文化の精神性（自然への感謝・もったいない・生命尊重）と深く結びついており、和食のユネスコ登録でも「食材への敬意」として国際的に注目されています。","frequency":"medium","is_trend":false,"frequency_reason":""},{"id":"fc_097","subject":"食文化概論","question":"箸のマナーで「忌み箸（嫌い箸）」として誤っているものはどれか。","choices":["刺し箸（食べ物に箸を刺す）","寄せ箸（箸で食器を引き寄せる）","握り箸（拳で握る）","置き箸（食事中に箸を箸置きに置く）"],"answer":3,"explanation":"置き箸（食事中に箸を箸置きに置く）は普通の動作で忌み箸ではありません。忌み箸は①刺し箸②寄せ箸③握り箸④涙箸（汁を垂らす）⑤渡し箸（食器の上に箸を渡す）⑥探り箸（中をかき混ぜる）⑦移り箸（料理間を行き来）⑧空箸（食べずに戻す）等多数あり、和食の重要マナーです。","frequency":"high","is_trend":false,"frequency_reason":"マナー頻出"},{"id":"fc_098","subject":"食文化概論","question":"「食品ロスゼロを目指すための消費者ができる行動」について正しいものはどれか（fc_098）。","choices":["買い物は多めに買って廃棄する","必要な量だけ購入・計画的な食品管理・賞味期限の正しい理解・てまえどり・残り食材の活用等","食品ロスは飲食店のみの問題","賞味期限が過ぎたら全て捨てる"],"answer":1,"explanation":"食品ロス削減のために消費者ができる行動は①計画的な買い物（買い過ぎない）②冷蔵庫の在庫確認③「てまえどり」：陳列棚の手前から選ぶ④賞味期限・消費期限の正しい理解（賞味期限後も直ちに廃棄は不要）⑤残り食材の創意工夫した活用⑥外食での食べ残し削減等です。","frequency":"high","is_trend":true,"frequency_reason":"食品ロス削減"},{"id":"fc_099","subject":"食文化概論","question":"「HACCP義務化（2021年）」が飲食店・食品事業者の食文化に与えた影響として正しいものはどれか。","choices":["食文化に全く影響しない","衛生管理の体系化・記録の義務化により、食の安全が担保された調理・提供の文化が促進された","料理の味が変わった","メニューが減少した"],"answer":1,"explanation":"HACCP完全義務化（2021年6月）は食品事業者の衛生管理を科学的・体系的に行う文化の定着を促進しました。①温度管理・記録の習慣化②危害要因の事前分析・対策③スタッフへの衛生教育の徹底④食品の安全性の向上等により、食を提供する側の文化・意識が変化しました。","frequency":"medium","is_trend":true,"frequency_reason":"食の安全文化"},{"id":"fc_100","subject":"食文化概論","question":"これからの調理師に求められる資質として最も適切なものはどれか。","choices":["調理技術・知識の継続的な向上","食の安全・衛生管理の徹底","多様な食ニーズ（アレルギー・宗教・健康）への対応と食文化の継承・社会への貢献","以上全て"],"answer":3,"explanation":"調理師は①調理技術の継続研鑽②食の安全・衛生管理③栄養・健康への配慮④多様な食ニーズ対応（アレルギー・宗教・ヴィーガン等）⑤食品ロス・環境配慮⑥食文化の継承・発展⑦地域・社会への貢献等の幅広い資質が求められます。調理師法の目的「国民の食生活の向上に資する」がその根拠です。","frequency":"high","is_trend":true,"frequency_reason":"専門職の使命"}];;

/* ===========================
   localStorage ユーティリティ
=========================== */
function getWrongIds()       { try { return new Set(JSON.parse(localStorage.getItem(LS_WRONG)||'[]')); } catch(e){ return new Set(); } }
function saveWrongIds(s)     { localStorage.setItem(LS_WRONG, JSON.stringify([...s])); }
function getHistory()        { try { return JSON.parse(localStorage.getItem(LS_HISTORY)||'[]'); } catch(e){ return []; } }
function saveHistory(h)      { localStorage.setItem(LS_HISTORY, JSON.stringify(h)); }
function getCleared()        { try { return new Set(JSON.parse(localStorage.getItem(LS_CLEARED)||'[]')); } catch(e){ return new Set(); } }
function saveCleared(s)      { localStorage.setItem(LS_CLEARED, JSON.stringify([...s])); }

function addWrong(id)    { const s = getWrongIds(); s.add(id); saveWrongIds(s); }
function removeWrong(id) { const s = getWrongIds(); s.delete(id); saveWrongIds(s); }

/* ===========================
   音声（Web Speech API）
=========================== */
const synth = window.speechSynthesis;

function populateVoices() {
  const voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
  if (!voices.length) return;
  const sel = document.getElementById('voice-select');
  const saved = localStorage.getItem(LS_VOICE);
  sel.innerHTML = '';
  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    const g = /nanami|haruka|sayaka|kyoko|女|female/i.test(v.name) ? '👩'
             : /keita|ichiro|otoya|男|male/i.test(v.name) ? '👨' : '🎙️';
    opt.textContent = `${g} ${v.name.replace(/Microsoft /,'').replace(/ - .+/,'')}`;
    opt.selected = (v.name === saved);
    sel.appendChild(opt);
  });
  selectedVoice = voices.find(v => v.name === saved) || voices[0];
  if (!saved) sel.value = selectedVoice.name;
}
// iOS Safari対応: onvoiceschanged + 複数回リトライ
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = populateVoices;
// iOSはvoicesの準備が遅いため間隔を空けて複数回試みる
[300, 800, 1500, 3000, 5000].forEach(ms => setTimeout(populateVoices, ms));
// iOS Safari最重要対策: ユーザーの最初のタッチ後に再ロード
// （iOSはユーザー操作前はgetVoices()が空を返す仕様）
(function addVoiceTouchFallback() {
  let loaded = false;
  function tryAfterTouch() {
    if (loaded) return;
    // 短いダミー発話でSpeechSynthesisを起動させる
    const dummy = new SpeechSynthesisUtterance('');
    dummy.volume = 0;
    synth.speak(dummy);
    synth.cancel();
    // 少し待ってから再取得
    setTimeout(function() {
      populateVoices();
      const voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
      if (voices.length) loaded = true;
    }, 200);
  }
  // タッチ・クリックどちらでも対応
  document.addEventListener('touchstart', tryAfterTouch, {once: true});
  document.addEventListener('click',      tryAfterTouch, {once: true});
})();

function onVoiceChange() {
  const voices = synth.getVoices().filter(v => v.lang.startsWith('ja'));
  const sel = document.getElementById('voice-select');
  selectedVoice = voices.find(v => v.name === sel.value) || voices[0];
  localStorage.setItem(LS_VOICE, sel.value);
}

function onRateChange() {
  speechRate = parseFloat(document.getElementById('rate-select').value);
  localStorage.setItem(LS_RATE, speechRate.toString());
}

// 速度の復元
(function initRate(){
  const saved = localStorage.getItem(LS_RATE);
  if (saved) {
    speechRate = parseFloat(saved);
    document.getElementById('rate-select').value = saved;
  }
})();

// 自動読み上げ設定の復元
(function initAutoSpeech(){
  const saved = localStorage.getItem(LS_AUTO_SP);
  if (saved !== null) {
    autoSpeech = (saved === 'true');
    const btn = document.getElementById('auto-speech-btn');
    btn.textContent = autoSpeech ? '🔊 自動読み' : '🔇 OFF';
    btn.classList.toggle('on', autoSpeech);
  }
})();

function speak(text) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = speechRate;
  utt.pitch = 1.0;
  if (selectedVoice) utt.voice = selectedVoice;
  utt.onstart = () => document.getElementById('speech-q-btn')?.classList.add('speaking');
  utt.onend   = () => document.getElementById('speech-q-btn')?.classList.remove('speaking');
  utt.onerror = () => document.getElementById('speech-q-btn')?.classList.remove('speaking');
  synth.speak(utt);
}
function stopSpeech() { synth.cancel(); document.getElementById('speech-q-btn')?.classList.remove('speaking'); }
function speakQuestion() {
  const q = quizQuestions[currentQIndex];
  if (q) speak(`問題。${q.question}`);
}
function toggleAutoSpeech() {
  autoSpeech = !autoSpeech;
  const btn = document.getElementById('auto-speech-btn');
  btn.textContent = autoSpeech ? '🔊 自動読み' : '🔇 OFF';
  btn.classList.toggle('on', autoSpeech);
  localStorage.setItem(LS_AUTO_SP, autoSpeech.toString());
  if (!autoSpeech) stopSpeech();
}
