=========================== */
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

// 正解：ピロン♪
// 正解：明るいキラキラ上昇音（ミソシミ＋高音キラッ）
function playCorrect() {
  try {
    const ctx = getCtx();
    // メイン上昇ライン（高めの音程・triangle で明るく）
    [[659.25,0,.28],[783.99,.1,.26],[987.77,.2,.26],[1318.5,.32,.4]].forEach(([f,d,dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle'; o.frequency.value = f;
      const t = ctx.currentTime + d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.28,t+.015);
      g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.start(t); o.stop(t+dur);
    });
    // キラッ（超高音・短く）
    [2637, 3136].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = ctx.currentTime + 0.35 + i*0.06;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.15,t+.01);
      g.gain.exponentialRampToValueAtTime(.001,t+.15);
      o.start(t); o.stop(t+.15);
    });
  } catch(e){}
}
// 不正解：ブブブー！（連続強め・テレビクイズのアウト音）
function playWrong() {
  try {
    const ctx = getCtx();
    // ブ×3連打 → 長めのブーーー！
    // 各「ブ」は下降する重い矩形波
    [0, 0.18, 0.36].forEach((d, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      o.connect(filter); filter.connect(g); g.connect(ctx.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(180, ctx.currentTime + d);
      o.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + d + 0.15);
      filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 2;
      const t = ctx.currentTime + d;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.45, t + 0.01);
      g.gain.setValueAtTime(0.45, t + 0.10);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      o.start(t); o.stop(t + 0.17);
    });
    // 最後の長いブーーー！（0.55秒後に始まる・1秒弱）
    const buzz = ctx.createOscillator(), buzzG = ctx.createGain();
    const buzzFilter = ctx.createBiquadFilter();
    buzz.connect(buzzFilter); buzzFilter.connect(buzzG); buzzG.connect(ctx.destination);
    buzz.type = 'sawtooth';
    buzz.frequency.setValueAtTime(160, ctx.currentTime + 0.55);
    buzz.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 1.3);
    buzzFilter.type = 'lowpass'; buzzFilter.frequency.value = 700; buzzFilter.Q.value = 3;
    buzzG.gain.setValueAtTime(0, ctx.currentTime + 0.55);
    buzzG.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.57);
    buzzG.gain.setValueAtTime(0.5, ctx.currentTime + 1.1);
    buzzG.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.35);
    buzz.start(ctx.currentTime + 0.55);
    buzz.stop(ctx.currentTime + 1.36);
  } catch(e){}
}
// 次の問題：ジャラン↑！！（上昇コード・クイズ出題感）
function playSwipe() {
  try {
    const ctx = getCtx();
    // フェーズ1: タン・タン・タン（タムを叩くような短い音×3）
    [0, 0.13, 0.26].forEach((d, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      // 徐々に音程を上げて緊張感
      o.frequency.value = 220 + i * 80;
      const t = ctx.currentTime + d;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.28, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    });
    // フェーズ2: ジャラン↑！（上昇アルペジオ・一気に高く）
    // C4→E4→G4→C5→E5（明るく派手に上昇）
    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.value = f;
      const t = ctx.currentTime + 0.42 + i * 0.055;
      const dur = 0.55 - i * 0.04;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.32 - i * 0.02, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    });
    // フェーズ3: 最後にジャーン！（全音一斉・派手な締め）
    [523.25, 659.25, 783.99, 1046.5].forEach((f) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = f;
      const t = ctx.currentTime + 0.75;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o.start(t); o.stop(t + 0.55);
    });
  } catch(e){}
}

function switchTab(tab) {
  document.getElementById('tab-study-content').style.display  = tab==='study'   ? 'block' : 'none';
  document.getElementById('tab-history-content').style.display = tab==='history' ? 'block' : 'none';

/* ===========================
   モード変更
=========================== */
function onModeChange() {
  // iOS Safari対応: checkedを確実に取得
  const checked = document.querySelector('input[name=mode]:checked');
  if (!checked) return;
  const mode = checked.value;
  currentMode = mode;
  document.querySelectorAll('.mode-item').forEach(item => item.classList.remove('selected'));
  document.getElementById(`mode-${mode}-item`).classList.add('selected');

  // 科目グリッドの表示/非表示
  const grid = document.getElementById('subjects-grid');
  const title = document.getElementById('subjects-title');
  if (mode === 'subject') {
    grid.style.display = '';
    title.style.display = '';
    title.textContent = '📋 科目を選択（複数可）';
  } else {
    grid.style.display = 'none';
    title.style.display = 'none';
    currentSubjects.clear();
  }
  updateStartButton();
}

/* ===========================
   科目選択画面初期化
=========================== */
function initSelectScreen() {
  const subjects = [...new Set(QUESTIONS.map(q => q.subject))];
  const wrongIds = getWrongIds();
  const cleared = getCleared();
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';

  const icons = {'食品衛生学':'🦠','食品学':'🌾','栄養学':'🥦','公衆衛生学':'🏙️','調理理論':'🔥','食文化概論':'🗾'};

  subjects.forEach(subj => {
    const qs = QUESTIONS.filter(q => q.subject === subj);
    const weakCount = qs.filter(q => wrongIds.has(q.id)).length;
    const isCleared = cleared.has(subj);
    // iOS Safari対応: divではなくbuttonを使用（clickイベントが確実に発火）
    const div = document.createElement('button');
    div.type = 'button';
    div.className = 'subject-card' + (isCleared ? ' cleared' : '') + (currentSubjects.has(subj) ? ' selected' : '');
    div.dataset.subject = subj;
    div.onclick = () => toggleSubject(div);
    div.innerHTML = `
      <div class="subject-icon">${icons[subj]||'📚'}</div>
      <div class="subject-name">${subj}</div>
      <div class="subject-meta">${qs.length}問収録</div>
      ${weakCount > 0 ? `<div class="subject-weak">⚠️ 苦手 ${weakCount}問</div>` : ''}
      ${isCleared ? `<div class="subject-cleared-badge">🏆 制覇済み</div>` : ''}
    `;
    grid.appendChild(div);
  });
}

function toggleSubject(card) {
  const subj = card.dataset.subject;
  if (currentSubjects.has(subj)) {
    currentSubjects.delete(subj);
    card.classList.remove('selected');
  } else {
    currentSubjects.add(subj);
    card.classList.add('selected');
  }
  updateStartButton();
}

function updateStartButton() {
  const btn = document.getElementById('start-btn');
  if (currentMode === 'subject') {
    if (currentSubjects.size === 0) {
      btn.disabled = true;
      btn.textContent = '科目を選択してスタート';
    } else {
      btn.disabled = false;
      const cnt = parseInt(document.getElementById('mode-subject-count').value);
      btn.textContent = `${currentSubjects.size}科目 × ${cnt}問でスタート →`;
    }
  } else if (currentMode === 'random') {
    btn.disabled = false;
    const cnt = document.getElementById('mode-random-count').value;
    btn.textContent = `ランダム ${cnt}問でスタート →`;
  } else if (currentMode === 'weak') {
    const wrongIds = getWrongIds();
    if (wrongIds.size === 0) {
      btn.disabled = true;
      btn.textContent = '苦手問題はまだありません';
    } else {
      btn.disabled = false;
      btn.textContent = `苦手問題 ${wrongIds.size}問で復習スタート →`;
    }
  }
}

document.getElementById('mode-subject-count').addEventListener('change', updateStartButton);
document.getElementById('mode-random-count').addEventListener('change', updateStartButton);

/* ===========================
   画面切替
=========================== */
function showScreen(id) {
  ['screen-select','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}

/* ===========================
   クイズ開始
=========================== */
function startQuiz() {
  let pool = [];
  let modeLabel = '';

  if (currentMode === 'subject') {
    const cnt = parseInt(document.getElementById('mode-subject-count').value);
    [...currentSubjects].forEach(subj => {
      const subjQs = QUESTIONS.filter(q => q.subject === subj);
      // 各科目から指定問数をランダムに
      const shuffled = [...subjQs].sort(() => Math.random() - .5);
      pool.push(...shuffled.slice(0, cnt));
    });
    modeLabel = `科目別 ${cnt}問×${currentSubjects.size}科目`;
  } else if (currentMode === 'random') {
    const cnt = parseInt(document.getElementById('mode-random-count').value);
    pool = [...QUESTIONS].sort(() => Math.random() - .5).slice(0, cnt);
    modeLabel = `ランダム ${cnt}問`;
  } else if (currentMode === 'weak') {
    const wrongIds = getWrongIds();
    pool = QUESTIONS.filter(q => wrongIds.has(q.id));
    pool.sort(() => Math.random() - .5);
    modeLabel = `苦手復習 ${pool.length}問`;
  }

  if (!pool.length) { alert('出題する問題がありません'); return; }

  quizQuestions = pool;
  currentQIndex = 0;
  correctCount = 0;
  sessionResults = [];
  sessionSubjects = new Set(pool.map(q => q.subject));

  // 科目バッジ表示用
  const subjLabel = sessionSubjects.size === 1 ? [...sessionSubjects][0] : modeLabel;

  showScreen('screen-quiz');
  document.getElementById('quiz-subject-badge').textContent = subjLabel;
  renderQuestion();
}

/* ===========================
   問題描画
=========================== */
function renderQuestion() {
  const q = quizQuestions[currentQIndex];
  const total = quizQuestions.length;
  const wrongIds = getWrongIds();

  document.getElementById('progress-text').textContent = `${currentQIndex+1} / ${total}問`;
  document.getElementById('progress-fill').style.width = `${(currentQIndex/total)*100}%`;
  document.getElementById('q-num').textContent = `問題 ${currentQIndex+1}`;
  document.getElementById('question-text').textContent = q.question;

  // 頻出バッジ
  const fb = document.getElementById('badge-freq');
  if (q.frequency === 'high') {
    fb.className = 'badge freq-high';
    fb.textContent = `🔥 頻出${q.frequency_reason ? '｜'+q.frequency_reason : ''}`;
    fb.style.display = 'inline-flex';
  } else if (q.frequency === 'medium') {
    fb.className = 'badge freq-mid'; fb.textContent = '📘 標準'; fb.style.display = 'inline-flex';
  } else {
    fb.className = 'badge freq-low'; fb.textContent = '📄 稀少'; fb.style.display = 'inline-flex';
  }
  document.getElementById('badge-trend').style.display = q.is_trend ? 'inline-flex' : 'none';
  document.getElementById('badge-wrong-prev').style.display = wrongIds.has(q.id) ? 'inline-flex' : 'none';

  // 選択肢
  const labels = ['ア','イ','ウ','エ'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  document.getElementById('answer-feedback').classList.remove('show','correct-fb','wrong-fb');
  document.getElementById('explanation-wrap').classList.remove('show');
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent =
    currentQIndex >= quizQuestions.length - 1 ? '結果を見る →' : '次の問題 →';
  answered = false;

  if (autoSpeech) setTimeout(() => speakQuestion(), 200);
}

/* ===========================
   回答処理
=========================== */
function selectAnswer(selected) {
  if (answered) return;
  answered = true;
  stopSpeech();

  const q = quizQuestions[currentQIndex];
  const isCorrect = selected === q.answer;
  const labels = ['ア','イ','ウ','エ'];

  if (isCorrect) { playCorrect(); correctCount++; }
  else           { playWrong(); }

  sessionResults.push({ id: q.id, correct: isCorrect, subject: q.subject });
  if (isCorrect) removeWrong(q.id);
  else           addWrong(q.id);

  document.querySelectorAll('.choice-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    if (i === selected && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('answer-feedback');
  if (isCorrect) {
    fb.className = 'answer-feedback show correct-fb';
    fb.innerHTML = '✅ 正解！';
  } else {
    fb.className = 'answer-feedback show wrong-fb';
    fb.innerHTML = `❌ 不正解。正解は「${labels[q.answer]}：${q.choices[q.answer]}」`;
  }

  document.getElementById('explanation-body').textContent = q.explanation;
  document.getElementById('explanation-wrap').classList.add('show');
  document.getElementById('next-btn').disabled = false;
}

/* ===========================
   次の問題
=========================== */
function nextQuestion() {
  stopSpeech();
  playSwipe(); // シュワッ
  currentQIndex++;
  if (currentQIndex >= quizQuestions.length) { showResult(); return; }
  renderQuestion();
}

/* ===========================
   結果表示 & 履歴保存 & お祝い判定
=========================== */
function showResult() {
  stopSpeech();
  const total = quizQuestions.length;
  const pct   = Math.round((correctCount / total) * 100);
  const isPerfect = (correctCount === total);
  const pass  = pct >= 60;

  // 履歴保存
  const record = {
    date: new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    subjects: [...sessionSubjects],
    mode: currentMode,
    total, correct: correctCount,
    pct, pass, perfect: isPerfect,
    results: sessionResults.map(r => ({
      id: r.id,
      question: QUESTIONS.find(q=>q.id===r.id)?.question || '',
      correct: r.correct,
      subject: r.subject
    }))
  };
  const hist = getHistory();
  hist.unshift(record);
  if (hist.length > 50) hist.pop();
  saveHistory(hist);

  // 全問正解時の科目達成判定
  let newlyClearedSubjects = [];
  let allCleared = false;
  if (isPerfect) {
    const cleared = getCleared();
    sessionSubjects.forEach(subj => {
      if (!cleared.has(subj)) {
        cleared.add(subj);
        newlyClearedSubjects.push(subj);
      }
    });
    saveCleared(cleared);
    // 全6科目制覇？
    const allSubjects = [...new Set(QUESTIONS.map(q => q.subject))];
    allCleared = allSubjects.every(s => cleared.has(s));
  }

  // 結果画面
  showScreen('screen-result');
  document.getElementById('result-pct').textContent = pct + '%';
  const circle = document.getElementById('result-circle');
  circle.className = 'result-circle ' + (isPerfect ? 'perfect' : (pass ? 'pass' : 'fail'));
  document.getElementById('result-title').textContent =
    isPerfect ? '全問正解！素晴らしい！🎉' : (pass ? '合格ライン達成！🎉' : 'もう少し復習が必要です');
  document.getElementById('result-detail').textContent =
    `${[...sessionSubjects].join('・')} ／ ${correctCount}問正解 ／ 全${total}問`;
  document.getElementById('result-mode-label').textContent =
    sessionSubjects.size === 1 ? [...sessionSubjects][0] : `${sessionSubjects.size}科目`;
  document.getElementById('result-score-label').textContent = `${correctCount} / ${total}問`;
  document.getElementById('result-bar').style.width = pct + '%';

  const freqHigh = quizQuestions.filter(q=>q.frequency==='high').length;
  const trend    = quizQuestions.filter(q=>q.is_trend).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip"><div class="stat-num">${correctCount}</div><div class="stat-label">正解</div></div>
    <div class="stat-chip"><div class="stat-num">${total-correctCount}</div><div class="stat-label">不正解</div></div>
    <div class="stat-chip"><div class="stat-num">${freqHigh}</div><div class="stat-label">🔥頻出</div></div>
    <div class="stat-chip"><div class="stat-num">${trend}</div><div class="stat-label">📡トレンド</div></div>
  `;

  let msg = '';
  if (isPerfect) {
    msg = '完璧です！素晴らしい成績です。この調子で他のモードや科目もチャレンジしましょう！';
  } else if (pass) {
    msg = '合格ライン（60%以上）をクリア！この調子で全問正解を目指しましょう。';
  } else {
    msg = '解説をしっかり確認してもう一度チャレンジしてみましょう。間違えた問題は苦手リストに自動登録されます。';
  }
  document.getElementById('result-message').textContent = msg;

  // お祝い演出（少し遅れて表示）
  if (allCleared && newlyClearedSubjects.length > 0) {
    setTimeout(() => showCelebration('grand', newlyClearedSubjects), 800);
  } else if (newlyClearedSubjects.length > 0) {
    setTimeout(() => showCelebration('subject', newlyClearedSubjects), 800);
  }
}

/* ===========================
   お祝いオーバーレイ
=========================== */
function showCelebration(type, subjects) {
  const overlay = document.getElementById('celebration');
  const icon = document.getElementById('celeb-icon');
  const title = document.getElementById('celeb-title');
  const text = document.getElementById('celeb-text');

  if (type === 'grand') {
    icon.textContent = '🏆🎆🎉';
    title.textContent = '全科目制覇！おめでとう！🎊';
    text.innerHTML = `あなたは全6科目すべてを<br>全問正解で達成しました！<br><br>調理師試験合格は目前です！<br>真の食のプロフェッショナルへ。`;
    playGrandFanfare();
  } else {
    icon.textContent = '🎉';
    title.textContent = '科目制覇おめでとう！';
    text.innerHTML = `「${subjects.join('・')}」を<br>全問正解で達成しました！<br><br>この調子で他の科目も頑張りましょう！`;
    playSubjectFanfare();
  }
  overlay.classList.add('show');
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  stopSpeech();
}

/* ===========================
   履歴画面レンダリング
=========================== */
function renderHistory() {
  const hist     = getHistory();
  const wrongIds = getWrongIds();
  const listEl   = document.getElementById('history-list');
  const weakEl   = document.getElementById('weak-list');

  // 学習履歴
  if (!hist.length) {
    listEl.innerHTML = '<div class="history-empty">📭 まだ学習履歴がありません。<br>問題を解くと自動的に記録されます。</div>';
  } else {
    listEl.innerHTML = '<div class="history-list">' +
      hist.map(h => {
        const subjLabel = (h.subjects && h.subjects.length) ? h.subjects.join('・') : (h.subject || 'ランダム');
        const passClass = h.perfect ? 'perfect' : (h.pass ? 'pass' : 'fail');
        const passText = h.perfect ? '🏆 全問正解' : (h.pass ? '✅ 合格' : '❌ 不合格');
        return `
        <div class="history-item">
          <div class="history-top">
            <span class="history-date">${h.date}</span>
            <span class="history-subject">${subjLabel}</span>
            <span class="history-pass ${passClass}">${passText}</span>
            <span class="history-score">${h.pct}%</span>
          </div>
          <div class="history-detail">
            ${h.results.map((r,i) => `
              <span class="h-q-chip ${r.correct?'correct':'wrong'}" title="${(r.question||'').replace(/"/g,'&quot;')}">
                問${i+1} ${r.correct?'○':'×'}
              </span>
            `).join('')}
          </div>
        </div>`;
      }).join('') +
    '</div>';
  }

  // 苦手問題リスト
  const weakQs = QUESTIONS.filter(q => wrongIds.has(q.id));
  if (!weakQs.length) {
    weakEl.innerHTML = '<div class="history-empty">🎉 苦手問題はありません！<br>間違えた問題がここに自動登録されます。</div>';
  } else {
    // ショートカットボタン＋タップで即出題リスト
    weakEl.innerHTML =
      // E: 苦手モードショートカットボタン
      `<button class="weak-shortcut-btn" onclick="startWeakModeFromList()">
        ⚠️ 苦手問題モードでスタート
        <span class="weak-count-badge">${weakQs.length}問</span>
      </button>` +
      // D: タップで即出題リスト
      '<div class="weak-list">' +
      weakQs.map(q => `
        <div class="weak-item" onclick="startSingleQuestion('${q.id}')">
          <div class="weak-item-body">
            <div class="weak-item-subject">${q.subject}</div>
            ${q.question}
          </div>
          <div class="weak-item-arrow">▶</div>
        </div>
      `).join('') +
      '</div>';
  }
}

/* ===========================
   ナビゲーション
=========================== */
function goToSelect() {
  stopSpeech();
  showScreen('screen-select');
  initSelectScreen();
  updateStartButton();
}

// E: 苦手モードショートカット（履歴タブから直接スタート）
function startWeakModeFromList() {
  const wrongIds = getWrongIds();
  if (!wrongIds.size) return;
  // 学習タブに切り替えてから苦手モードで開始
  switchTab('study');
  currentMode = 'weak';
  // ラジオボタンを苦手モードに切り替え
  const weakRadio = document.querySelector('input[name=mode][value="weak"]');
  if (weakRadio) weakRadio.checked = true;
  onModeChange();
  startQuiz();
}

// D: 苦手リストの1問をタップして即出題
function startSingleQuestion(qId) {
  const q = QUESTIONS.find(q => q.id === qId);
  if (!q) return;
  // 学習タブに切り替え
  switchTab('study');
  // その1問だけをセットして出題
  quizQuestions = [q];
  currentQIndex = 0;
  correctCount = 0;
  sessionResults = [];
  sessionSubjects = new Set([q.subject]);
  showScreen('screen-quiz');
  document.getElementById('quiz-subject-badge').textContent = `⚠️ ${q.subject}`;
  renderQuestion();
}

function retryQuiz() { startQuiz(); }

function clearHistory() {
  if (!confirm('学習履歴・苦手リスト・制覇記録をすべて削除しますか？\nこの操作は取り消せません。')) return;
  localStorage.removeItem(LS_HISTORY);
  localStorage.removeItem(LS_WRONG);
  localStorage.removeItem(LS_CLEARED);
  renderHistory();
  initSelectScreen();
  updateStartButton();
}

/* ===========================
   初期化
=========================== */
initSelectScreen();
updateStartButton();
</script>
